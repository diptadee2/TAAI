<!DOCTYPE html>
<html lang="en" data-density="normal" data-cards="shadowed">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAI · GATE DA Courses</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --bg-soft: #FBF9FF;
  --ink: #14102B;
  --ink-dim: #4A4270;
  --ink-soft: #857CAE;
  --line: #ECE6F8;
  --card: #FFFFFF;

  --pink: #FF7FB7;
  --pink-soft: #FFD6E8;
  --purple: #8B5CF6;
  --purple-soft: #E6DCFF;
  --blue: #4D8BFF;
  --blue-soft: #D6E4FF;
  --lilac: #C4B0FF;

  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 36px;

  --shadow-sm: 0 1px 0 rgba(20,16,43,0.04), 0 2px 6px rgba(20,16,43,0.04);
  --shadow-md: 0 2px 0 rgba(20,16,43,0.03), 0 12px 32px rgba(107,75,255,0.08);
  --shadow-lg: 0 24px 60px rgba(107,75,255,0.16);

  --font-display: 'Fraunces', ui-serif, serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;

  --gutter: 32px;
  --section-pad: 96px;
}

[data-cards="shadowed"] .card { box-shadow: var(--shadow-md); border: 1px solid transparent; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5; }
.mono { font-family: var(--font-mono); font-size: .78rem; letter-spacing: .02em; text-transform: uppercase; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 max(var(--gutter), 24px); }

/* Nav */
.nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.50); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); overflow: visible; transition: background .25s ease, backdrop-filter .25s ease; }
.nav.menu-open { background: rgba(248,246,255,0.72); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 86px; padding: 0 32px 0 20px; overflow: visible; }
.nav-logo {
  display: flex; align-items: center; text-decoration: none;
  transition: transform .22s ease-out, opacity .22s ease;
}
.nav-logo svg, .nav-logo img { width: 180px; height: auto; }
.nav-logo:hover { transform: translateY(-2px); opacity: 0.82; }
.nav-logo:active { transform: translateY(1px); opacity: 1; transition-duration: .08s; }
@media (hover: hover) {
  .nav-logo { position: relative; }
  .nav-logo::after { content: 'Home'; position: absolute; bottom: -34px; left: 50%; transform: translateX(-50%) translateY(8px) scale(0.88); font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--purple); background: linear-gradient(135deg, rgba(249,247,255,0.97), rgba(241,237,255,0.97)); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(139,92,246,0.22); border-radius: 20px; padding: 4px 13px; opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .24s cubic-bezier(.34,1.15,.64,1); white-space: nowrap; box-shadow: 0 4px 18px rgba(139,92,246,0.13), 0 1px 4px rgba(0,0,0,0.05); }
  .nav-logo:hover::after { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
.nav-links { display: flex; gap: 36px; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; position: relative;}
.nav-links a { color: var(--ink-dim); text-decoration: none; transition: color .2s, transform .3s cubic-bezier(.34,1.1,.64,1); position: relative; z-index: 1; cursor: pointer; display: inline-block; }
.nav-links a::after { content: ''; position: absolute; inset: -14px -10px; z-index: 0; }
.nav-links a:hover, .nav-links a.active { color: var(--purple); transform: scale(1.08) translateY(-1px); }
.nav-pill {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 34px; border-radius: 10px; pointer-events: none; z-index: 0;
  overflow: hidden;
  background: linear-gradient(
    150deg,
    rgba(255,255,255,0.36) 0%,
    rgba(180,155,255,0.14) 40%,
    rgba(139,92,246,0.10) 68%,
    rgba(255,255,255,0.24) 100%
  );
  background-size: 300% 300%;
  border: 1px solid rgba(255,255,255,0.55);
  backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  box-shadow:
    0 2px 12px rgba(139,92,246,0.10),
    inset 0 1.5px 0 rgba(255,255,255,0.82),
    inset 0 -1px 0 rgba(100,80,200,0.08),
    inset 1px 0 0 rgba(255,255,255,0.32),
    inset -1px 0 0 rgba(255,255,255,0.32);
  animation: water-flow 4s ease-in-out infinite;
  transition: left .3s cubic-bezier(0.34,1.2,0.64,1), width .28s cubic-bezier(0.34,1.15,0.64,1), opacity .2s ease;
}
.nav-pill::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(125deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.0) 52%);
  animation: glass-shine 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes water-flow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes glass-shine {
  0%, 100% { opacity: 1; transform: translateX(0); }
  50% { opacity: 0.35; transform: translateX(10px); }
}
.nav-cta { display: flex; gap: 10px; align-items: center; }
.btn-nav-signin { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: rgba(139,92,246,0.07); color: var(--ink); border: 1px solid rgba(139,92,246,0.22); backdrop-filter: blur(10px) saturate(150%); -webkit-backdrop-filter: blur(10px) saturate(150%); box-shadow: 0 1px 2px rgba(139,92,246,0.06), inset 0 1px 0 rgba(255,255,255,0.7); transition: background .2s, transform .32s cubic-bezier(.34,1.1,.64,1), box-shadow .2s, backdrop-filter .2s; white-space: nowrap; }
.btn-nav-signin:hover { background: rgba(139,92,246,0.13); transform: scale(1.06) translateY(-1px); backdrop-filter: blur(18px) saturate(220%) brightness(1.04); -webkit-backdrop-filter: blur(18px) saturate(220%) brightness(1.04); box-shadow: 0 6px 20px rgba(139,92,246,0.18), inset 0 1px 0 rgba(255,255,255,0.85), 0 0 0 1px rgba(139,92,246,0.12); }
.btn-nav-signup { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: linear-gradient(160deg, rgba(147,105,255,0.92), rgba(107,75,255,0.88)); color: #fff; border: 1px solid rgba(255,255,255,0.22); backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%); box-shadow: 0 2px 10px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.28); transition: transform .32s cubic-bezier(.34,1.1,.64,1), box-shadow .2s; white-space: nowrap; }
.btn-nav-signup:hover { transform: scale(1.06) translateY(-1px); box-shadow: 0 8px 24px rgba(107,75,255,0.45), inset 0 1px 0 rgba(255,255,255,0.36); }
.btn-nav-contact { font-size: 14px; font-weight: 500; color: var(--ink-dim); text-decoration: none; padding: 10px 20px; border-radius: 8px; background: none; border: none; box-shadow: none; transition: color .2s, transform .32s cubic-bezier(.34,1.1,.64,1), background .2s; white-space: nowrap; }
.btn-nav-contact:hover { color: var(--purple); background: rgba(139,92,246,0.07); transform: scale(1.06) translateY(-1px); }
.phone-icon { display: inline-flex; align-items: center; margin-right: 5px; transform-origin: 50% 55%; }
.btn-nav-contact:hover .phone-icon { animation: phone-ring 0.52s ease-in-out; }
.nav-cta .btn-nav-signin,
.nav-cta .btn-nav-signup,
.nav-cta .btn-nav-contact { position: relative; overflow: hidden; }
.nav-cta .btn-nav-signin::before,
.nav-cta .btn-nav-signup::before,
.nav-cta .btn-nav-contact::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(108deg, transparent 20%, rgba(255,255,255,0.42) 48%, rgba(210,195,255,0.25) 56%, transparent 74%);
  transform: translateX(-120%) skewX(-12deg);
  pointer-events: none;
  border-radius: inherit;
  transition: none;
}
.nav-cta .btn-nav-signin:hover::before,
.nav-cta .btn-nav-signup:hover::before,
.nav-cta .btn-nav-contact:hover::before {
  transform: translateX(220%) skewX(-12deg);
  transition: transform .52s cubic-bezier(.2,.8,.4,1);
}
@keyframes phone-ring {
  0%,100% { transform: rotate(0); }
  12%     { transform: rotate(-22deg); }
  28%     { transform: rotate(18deg); }
  44%     { transform: rotate(-12deg); }
  60%     { transform: rotate(8deg); }
  76%     { transform: rotate(-4deg); }
  90%     { transform: rotate(2deg); }
}
/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 999px; font-family: var(--font-body); font-size: 15px; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease, background .15s, color .15s; white-space: nowrap; }
.btn-primary { background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 55%, var(--blue) 100%); color: #fff; box-shadow: 0 8px 24px rgba(139,92,246,0.25); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(139,92,246,0.35); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn-ghost:hover { background: var(--ink); color: #fff; }
.btn-soft { background: var(--purple-soft); color: var(--ink); border: 1px solid transparent; }
.btn-soft:hover { background: var(--lilac); }
.btn-lg { padding: 15px 28px; font-size: 16px; }
.btn-full { width: 100%; justify-content: center; }

/* Page hero */
.page-hero { padding: 72px 0 56px; position: relative; overflow: hidden; }
.page-hero::before { content: ''; position: absolute; top: -120px; right: -120px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, var(--pink-soft) 0%, transparent 70%); pointer-events: none; }
.page-hero::after { content: ''; position: absolute; bottom: -120px; left: -100px; width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(circle, var(--blue-soft) 0%, transparent 70%); pointer-events: none; }
.page-hero-inner { position: relative; z-index: 1; }
.page-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 20px; }
.page-eyebrow::before { content: ''; display: inline-block; width: 20px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }
.page-hero h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(42px, 5.5vw, 80px); line-height: 0.95; letter-spacing: -0.04em; margin-bottom: 22px; }
.page-hero h1 em { font-style: normal; background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
.page-hero-sub { font-size: 19px; color: var(--ink-dim); max-width: 600px; line-height: 1.5; margin-bottom: 36px; }

/* Section */
.section { padding: var(--section-pad) 0; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 16px; }
.section-eyebrow::before { content: ''; display: inline-block; width: 20px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }
.section h2 { font-family: var(--font-display); font-size: clamp(30px, 3.8vw, 52px); font-weight: 600; letter-spacing: -0.035em; line-height: 1; margin-bottom: 16px; }
.section h2 em { font-style: normal; background: linear-gradient(120deg, var(--pink), var(--purple), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.section-sub { font-size: 17px; color: var(--ink-dim); line-height: 1.5; max-width: 560px; margin-bottom: 48px; }

/* ── Flagship spotlight ──────────────────────────────── */
.flagship { padding: 0 0 var(--section-pad); }
.flagship-wrap {
  position: relative;
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(20,16,43,0.22), 0 0 0 1px rgba(20,16,43,0.06);
}
.flagship-poster { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
.flagship-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(14,10,36,0.92) 0%, rgba(14,10,36,0.45) 40%, transparent 70%);
  display: flex; align-items: flex-end;
  padding: 48px;
}
.flagship-content { width: 100%; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.flagship-meta { display: flex; flex-direction: column; gap: 10px; }
.flagship-eyebrow-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.flagship-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,224,67,0.13); border: 1px solid rgba(255,224,67,0.32);
  border-radius: 999px; padding: 5px 13px 5px 9px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: #FFE043;
  position: relative; overflow: hidden;
}
.flagship-eyebrow::after {
  content: ''; position: absolute; top: 0; left: -80%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,224,67,0.28), transparent);
  animation: badge-sweep 2.6s ease-in-out infinite 0.8s;
}
@keyframes badge-sweep { 0% { left: -80%; } 100% { left: 180%; } }
.flagship-eyebrow-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #FF6B35; flex-shrink: 0;
  animation: dot-pulse 1.5s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.8); }
  60% { box-shadow: 0 0 0 5px rgba(255,107,53,0); }
}
.flagship-chart { display: inline-flex; align-items: flex-end; gap: 3px; height: 20px; padding: 0 2px; }
.flagship-chart-bar {
  width: 4px; border-radius: 2px 2px 1px 1px;
  background: rgba(255,224,67,0.75);
  transform-origin: bottom center;
  animation: chart-pulse 1.9s ease-in-out infinite;
}
@keyframes chart-pulse {
  0%, 100% { transform: scaleY(1); opacity: 0.65; }
  50%       { transform: scaleY(1.22); opacity: 1; }
}
.flagship-label { font-family: var(--font-display); font-size: clamp(22px,3vw,36px); font-weight: 600; letter-spacing: -0.03em; color: #fff; line-height: 1.1; }
.flagship-actions { display: flex; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
.btn-play {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.18); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.38); color: #fff;
  padding: 12px 22px; border-radius: 999px;
  font-size: 14px; font-weight: 600; text-decoration: none;
  transition: background .2s, transform .15s, box-shadow .2s;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.25);
}
.btn-play:hover { background: rgba(255,255,255,0.26); transform: translateY(-1px); }
.btn-play-dot { width: 28px; height: 28px; border-radius: 50%; background: #fff; display: grid; place-items: center; flex-shrink: 0; transition: opacity .24s ease, transform .32s cubic-bezier(.16,1,.3,1); }
.btn-play-dot svg { color: var(--purple); margin-left: 2px; }
.btn-play.btn-swap:hover .btn-play-dot { opacity: 0; transform: translateY(-120%); }
.btn-swap { position: relative; overflow: hidden; }
.btn-swap::before { content: attr(data-swap-hover); display: block; height: 0; overflow: hidden; visibility: hidden; pointer-events: none; }
.btn-swap .swap-default, .btn-swap .swap-hover { display: block; transition: transform .32s cubic-bezier(.16,1,.3,1), opacity .24s ease; }
.btn-swap .swap-hover { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; transform: translateY(100%); opacity: 0; }
.btn-swap:hover .swap-default { transform: translateY(-100%); opacity: 0; }
.btn-swap:hover .swap-hover   { transform: translateY(0);     opacity: 1; }
.btn-play.btn-swap:hover { background: linear-gradient(135deg, #FF416C 0%, #FF0000 55%, #CC0022 100%); border-color: transparent; color: #fff; box-shadow: 0 8px 28px rgba(255,0,0,0.38), 0 2px 8px rgba(255,65,108,0.22); }
.btn-primary.btn-swap:hover { background: linear-gradient(135deg, #FF416C 0%, #FF0000 55%, #CC0022 100%); box-shadow: 0 8px 28px rgba(255,0,0,0.38), 0 2px 8px rgba(255,65,108,0.22); }
@keyframes btn-attract {
  0%   { box-shadow: 0 8px 24px rgba(139,92,246,0.30), 0 0 0 0px  rgba(139,92,246,0.45); }
  65%  { box-shadow: 0 8px 24px rgba(139,92,246,0.30), 0 0 0 12px rgba(139,92,246,0);    }
  100% { box-shadow: 0 8px 24px rgba(139,92,246,0.30), 0 0 0 0px  rgba(139,92,246,0);    }
}
.btn-attract { animation: btn-attract 2.2s ease-out infinite; }
.btn-attract:hover { animation: none; }
.btn-enroll {
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff; padding: 12px 26px; border-radius: 999px;
  font-size: 14px; font-weight: 600; text-decoration: none;
  box-shadow: 0 4px 20px rgba(139,92,246,0.4);
  transition: transform .15s, box-shadow .15s;
  white-space: nowrap;
}
.btn-enroll:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,92,246,0.5); }
.flagship-mobile-actions { display: none; }
@media (max-width: 768px) {
  .flagship { display: none; }
}

/* Faculty section */
.faculty-grid { display: grid; grid-template-columns: 1.42fr 1fr; gap: 20px; align-items: start; }
.faculty-card { border-radius: var(--radius-xl); padding: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; transition: transform .38s cubic-bezier(.34,1.05,.64,1), box-shadow .38s ease, opacity .32s ease; cursor: default; }
.faculty-grid:has(.faculty-card:hover) .faculty-card:not(:hover) { opacity: 0.52; transform: scale(0.982); }
.faculty-card:hover { transform: translateY(-7px) scale(1.006); }
.faculty-primary:hover { box-shadow: 0 28px 72px rgba(139,92,246,0.34), 0 8px 24px rgba(139,92,246,0.2); }
.faculty-secondary:hover { box-shadow: 0 22px 52px rgba(139,92,246,0.15), 0 6px 18px rgba(0,0,0,0.1); }
.faculty-primary::after { content: ''; position: absolute; inset: 0; background: linear-gradient(108deg, transparent 28%, rgba(255,255,255,0.055) 50%, transparent 72%); transform: translateX(-110%); animation: faculty-shimmer 4.5s ease-in-out 1.5s infinite; pointer-events: none; }
@keyframes faculty-shimmer { 0% { transform: translateX(-110%); } 28%, 100% { transform: translateX(110%); } }
.faculty-photo-wrap { aspect-ratio: 3/2; overflow: hidden; flex-shrink: 0; }
.faculty-photo-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; transition: transform .55s cubic-bezier(.25,.46,.45,.94); }
.faculty-secondary .faculty-photo-wrap img { object-position: center center; }
.faculty-card:hover .faculty-photo-wrap img { transform: scale(1.06); }
.faculty-photo-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.faculty-primary .faculty-photo-placeholder { background: rgba(139,92,246,0.14); }
.faculty-secondary .faculty-photo-placeholder { background: var(--purple-soft); }
.faculty-photo-placeholder-icon { width: 44px; height: 44px; border-radius: 50%; border: 2px dashed; display: flex; align-items: center; justify-content: center; }
.faculty-primary .faculty-photo-placeholder-icon { border-color: rgba(196,176,255,0.4); color: rgba(196,176,255,0.5); }
.faculty-secondary .faculty-photo-placeholder-icon { border-color: rgba(139,92,246,0.3); color: rgba(139,92,246,0.4); }
.faculty-photo-placeholder-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
.faculty-primary .faculty-photo-placeholder-label { color: rgba(196,176,255,0.4); }
.faculty-secondary .faculty-photo-placeholder-label { color: rgba(139,92,246,0.35); }
.faculty-body { padding: 28px 32px 32px; display: flex; flex-direction: column; gap: 22px; flex: 1; }
.faculty-primary { background: linear-gradient(150deg, #14102B 0%, #1e1152 55%, #170e45 100%); border: 1.5px solid rgba(139,92,246,0.28); }
.faculty-secondary { background: var(--card); border: 1.5px solid var(--line); }
.faculty-role { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; padding: 4px 11px; border-radius: 999px; margin-bottom: 14px; }
.faculty-primary .faculty-role { color: var(--lilac); background: rgba(139,92,246,0.18); border: 1px solid rgba(139,92,246,0.25); }
.faculty-secondary .faculty-role { color: var(--ink-soft); background: rgba(139,92,246,0.06); border: 1px solid var(--line); }
.faculty-name { font-family: var(--font-display); font-size: clamp(22px, 2vw, 28px); font-weight: 600; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 8px; }
.faculty-primary .faculty-name { color: #fff; }
.faculty-secondary .faculty-name { color: var(--ink); }
.faculty-blurb { font-size: 14px; line-height: 1.55; }
.faculty-primary .faculty-blurb { color: rgba(255,255,255,0.48); }
.faculty-secondary .faculty-blurb { color: var(--ink-dim); }
.faculty-creds { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.faculty-cred-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--ink-dim); }
.faculty-cred-air { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.03em; line-height: 1; background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.faculty-subjects-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.faculty-primary .faculty-subjects-label { color: rgba(255,255,255,0.32); }
.faculty-secondary .faculty-subjects-label { color: var(--ink-soft); }
.faculty-tags { display: flex; flex-wrap: wrap; gap: 7px; }
.faculty-tag { font-size: 12.5px; font-weight: 500; padding: 5px 13px; border-radius: 999px; transition: transform .18s ease, background .18s ease, border-color .18s ease; animation: tag-pop .4s cubic-bezier(.34,1.3,.64,1) both; }
@keyframes tag-pop { from { opacity: 0; transform: scale(0.8) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.faculty-primary .faculty-tag { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.82); border: 1px solid rgba(255,255,255,0.12); }
.faculty-secondary .faculty-tag { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(139,92,246,0.18); }
.faculty-primary .faculty-tag:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.28); transform: scale(1.09); }
.faculty-secondary .faculty-tag:hover { background: rgba(139,92,246,0.18); border-color: rgba(139,92,246,0.38); transform: scale(1.09); }
@media (max-width: 768px) { .faculty-grid { grid-template-columns: 1fr; } }

/* Combos grid — redesigned */
.combos-grid { display: grid; grid-template-columns: 1.42fr 1fr 1fr; gap: 20px; align-items: start; }
.combo-card {
  border-radius: var(--radius-xl); padding: 36px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  transition: transform .38s cubic-bezier(.4,0,.2,1), box-shadow .38s ease,
              opacity .32s ease, filter .32s ease;
  background: var(--card); border: 1.5px solid var(--line);
}
.combo-card:hover { transform: translateY(-10px); box-shadow: 0 28px 60px rgba(107,75,255,0.13); }
.combo-card.featured {
  background: linear-gradient(150deg, #14102B 0%, #221260 55%, #1a0d50 100%);
  border-color: rgba(139,92,246,0.35);
  box-shadow: 0 20px 60px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.07);
}
.combo-card.featured:hover { transform: translateY(-12px); box-shadow: 0 36px 80px rgba(107,75,255,0.44), inset 0 1px 0 rgba(255,255,255,0.07); }
.combo-card.featured::before {
  content: ''; position: absolute; top: -50px; right: -50px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.32) 0%, transparent 70%);
  pointer-events: none;
}
.combo-card.featured::after {
  content: ''; position: absolute; bottom: -30px; left: -30px;
  width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,127,183,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.combo-accent { position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.combo-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  align-self: flex-start; margin-bottom: 22px; position: relative; z-index: 1;
}
.combo-badge.best { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; box-shadow: 0 4px 14px rgba(139,92,246,0.4); }
.combo-badge.popular { background: var(--purple-soft); color: var(--purple); }
.combo-badge.combo { background: var(--blue-soft); color: var(--blue); }
.combo-title { font-family: var(--font-display); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 6px; position: relative; z-index: 1; }
.combo-card.featured .combo-title { color: #fff; font-size: 30px; }
.combo-validity { font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); margin-bottom: 18px; letter-spacing: .08em; position: relative; z-index: 1; }
.combo-card.featured .combo-validity { color: rgba(255,255,255,0.38); }
.combo-divider { height: 1px; background: var(--line); margin: 0 0 18px; position: relative; z-index: 1; }
.combo-card.featured .combo-divider { background: rgba(255,255,255,0.1); }
.combo-includes-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 14px; position: relative; z-index: 1; }
.combo-card.featured .combo-includes-label { color: rgba(255,255,255,0.38); }
.combo-includes { flex: 1; margin-bottom: 24px; position: relative; z-index: 1; }
.combo-includes ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
.combo-includes li {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 14px; color: var(--ink-dim); line-height: 1.45;
  opacity: 0.5; transform: translateX(-5px);
  transition: opacity .28s ease var(--delay, 0ms), transform .28s ease var(--delay, 0ms);
}
.combo-card:hover .combo-includes li { opacity: 1; transform: translateX(0); }
.combo-card.featured .combo-includes li { opacity: 1; transform: translateX(0); color: rgba(255,255,255,0.78); }
.combo-check {
  width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  background: var(--purple-soft);
}
.combo-card.featured .combo-check { background: rgba(255,255,255,0.13); }
.combo-check svg { width: 10px; height: 8px; overflow: visible; }
.combo-check svg path {
  stroke: var(--purple); fill: none;
  stroke-dasharray: 14; stroke-dashoffset: 14;
  transition: stroke-dashoffset .32s ease var(--delay, 0ms);
}
.combo-card:hover .combo-check svg path { stroke-dashoffset: 0; }
.combo-card.featured .combo-check svg path { stroke: rgba(255,255,255,0.85); stroke-dashoffset: 0; }
.combo-price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 22px; position: relative; z-index: 1; }
.combo-price { font-family: var(--font-display); font-size: 38px; font-weight: 600; letter-spacing: -0.04em; }
.combo-card.featured .combo-price { color: #fff; font-size: 44px; }
.combo-price-old { font-size: 15px; color: var(--ink-soft); text-decoration: line-through; }
.combo-card.featured .combo-price-old { color: rgba(255,255,255,0.36); }
.combo-discount { font-size: 11px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--pink), var(--purple)); padding: 4px 10px; border-radius: 999px; }
.combo-card .btn { position: relative; z-index: 1; }
.combo-num {
  position: absolute; top: 22px; right: 24px; z-index: 0;
  font-family: var(--font-display); font-size: 52px; font-weight: 700;
  letter-spacing: -0.05em; line-height: 1; pointer-events: none;
  opacity: 0.08; transition: opacity .32s ease, color .32s ease;
}
.combo-card:hover .combo-num { opacity: 0.15; }
.combo-card.featured .combo-num { opacity: 0.14; color: #fff; }
.combo-card.featured:hover .combo-num { opacity: 0.22; }

/* Individual courses — redesigned */
.courses-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
.course-card {
  border-radius: var(--radius-xl); padding: 28px 24px 24px;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  border: 1.5px solid var(--line); background: var(--card);
  transition: transform .38s cubic-bezier(.4,0,.2,1), box-shadow .38s ease;
}
.ticket-notch {
  position: relative; height: 0;
  margin: 16px -24px; z-index: 3;
}
.ticket-notch::before, .ticket-notch::after {
  content: ''; position: absolute;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg);
  top: 0;
}
.ticket-notch::before { left: 0; transform: translate(-50%, -50%); }
.ticket-notch::after  { right: 0; transform: translate(50%, -50%); }
.ticket-notch-line {
  position: absolute; top: 0; left: 11px; right: 11px;
  transform: translateY(-50%);
  border-top: 1.5px dashed rgba(0,0,0,0.1);
  transition: border-color .28s ease;
}
.course-card:hover .ticket-notch-line { border-color: rgba(255,255,255,0.22); }
.course-card::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  background: var(--course-grad); opacity: 0.18;
  transition: opacity .38s ease;
}
.course-card:hover { transform: translateY(-10px); box-shadow: 0 24px 56px var(--course-shadow, rgba(107,75,255,0.25)); }
.course-card:hover::before { opacity: 1; }
.course-accent { display: none; }
.course-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: grid; place-items: center; color: #fff; margin-bottom: 20px;
  position: relative; z-index: 1;
  transition: transform .38s cubic-bezier(.34,1.3,0.64,1), box-shadow .38s ease;
}
.course-card:hover .course-icon { transform: scale(1.16) translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.28); }
.course-title {
  font-family: var(--font-display); font-size: 20px; font-weight: 600;
  letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 6px;
  position: relative; z-index: 1; transition: color .28s ease;
}
.course-card:hover .course-title { color: #fff; }
.course-validity {
  font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft);
  margin-bottom: 14px; letter-spacing: .06em;
  position: relative; z-index: 1; transition: color .28s ease;
}
.course-card:hover .course-validity { color: rgba(255,255,255,0.45); }
.course-topics {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; gap: 7px; margin-bottom: 0;
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .28s ease, opacity .2s ease, margin-bottom .28s ease;
}
.course-card:hover .course-topics {
  max-height: 120px; opacity: 1; margin-bottom: 16px;
  transition: max-height .55s cubic-bezier(0.25,0.46,0.45,0.94), opacity .4s ease .06s, margin-bottom .55s cubic-bezier(0.25,0.46,0.45,0.94);
}
.course-topic {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: rgba(255,255,255,0.82); line-height: 1.35;
  transform: translateY(8px); opacity: 0;
  transition: transform .22s ease, opacity .22s ease;
}
.course-card:hover .course-topic {
  transform: translateY(0); opacity: 1;
  transition: transform .42s cubic-bezier(0.25,0.46,0.45,0.94) var(--td, 0ms), opacity .38s ease var(--td, 0ms);
}
.course-topic::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.55); flex-shrink: 0; }
.course-price-row {
  display: flex; align-items: baseline; gap: 8px;
  margin-top: auto; margin-bottom: 18px; position: relative; z-index: 1;
}
.course-price {
  font-family: var(--font-display); font-size: 26px; font-weight: 600;
  letter-spacing: -0.03em; transition: color .28s ease;
}
.course-card:hover .course-price { color: #fff; }
.course-price-old { font-size: 13px; color: var(--ink-soft); text-decoration: line-through; transition: color .28s ease; }
.course-card:hover .course-price-old { color: rgba(255,255,255,0.42); }
.course-card .btn-ghost { position: relative; z-index: 1; transition: background .28s ease, color .28s ease, border-color .28s ease; }
.course-card:hover .btn-ghost { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.42); }

/* Coming soon card */
.placement-card {
  background: linear-gradient(150deg, #14102B 0%, #1c1255 55%, #0a1020 100%);
  border-radius: var(--radius-xl); padding: 56px 64px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center;
  border: 1.5px solid rgba(139,92,246,0.24);
  position: relative; overflow: hidden;
  transition: border-color .3s ease, box-shadow .3s ease;
}
.placement-card:hover { border-color: rgba(139,92,246,0.42); box-shadow: 0 32px 80px rgba(139,92,246,0.18); }
.placement-card::before {
  content: ''; position: absolute; width: 560px; height: 480px; border-radius: 50%; pointer-events: none;
  background: radial-gradient(ellipse, rgba(139,92,246,0.14) 0%, transparent 70%);
  top: -200px; right: -80px;
}
.placement-card::after {
  content: ''; position: absolute; width: 320px; height: 280px; border-radius: 50%; pointer-events: none;
  background: radial-gradient(ellipse, rgba(255,65,108,0.1) 0%, transparent 70%);
  bottom: -100px; left: 80px;
}
.placement-left { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 0; }
.placement-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 999px; font-size: 11.5px; font-weight: 600;
  background: rgba(139,92,246,0.14); border: 1px solid rgba(139,92,246,0.3);
  color: var(--lilac); margin-bottom: 18px; align-self: flex-start;
}
.placement-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lilac); animation: live-blink 2s ease-in-out infinite; }
.placement-title {
  font-family: var(--font-display); font-size: clamp(26px,2.8vw,38px); font-weight: 600;
  letter-spacing: -0.03em; line-height: 1.1; color: #fff; margin-bottom: 14px;
}
.placement-title em { background: linear-gradient(120deg, var(--purple), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; font-style: normal; }
.placement-desc { font-size: 14.5px; color: rgba(255,255,255,0.48); line-height: 1.65; margin-bottom: 28px; }
.placement-btns { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-ghost-light { background: transparent; color: rgba(255,255,255,0.7); border: 1.5px solid rgba(255,255,255,0.22); }
.btn-ghost-light:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.4); }
.placement-right { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 20px; }
.placement-cat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 7px; }
.placement-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.placement-chip {
  padding: 6px 13px; border-radius: 999px; font-size: 12px; font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.05);
  transition: background .22s ease, border-color .22s ease, color .22s ease, transform .22s cubic-bezier(.34,1.3,.64,1);
  cursor: default;
}
.placement-chip.chip-purple:hover { background: rgba(139,92,246,0.22); border-color: rgba(139,92,246,0.45); color: var(--lilac); transform: scale(1.07); }
.placement-chip.chip-blue:hover   { background: rgba(77,139,255,0.18);  border-color: rgba(77,139,255,0.4);  color: #8FC8FF; transform: scale(1.07); }
.placement-chip.chip-pink:hover   { background: rgba(255,127,183,0.18); border-color: rgba(255,127,183,0.4); color: var(--pink); transform: scale(1.07); }
.placement-divider { height: 1px; background: rgba(255,255,255,0.07); }

/* Every course includes — tab showcase (mirrors Why TAAI on landing page) */
.incl-layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: stretch; }
.incl-tabs { display: flex; flex-direction: column; gap: 6px; }
.incl-tab {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 16px; border-radius: var(--radius-md);
  cursor: pointer; text-align: left; width: 100%;
  background: none; border: 1.5px solid transparent;
  transition: background .2s, border-color .2s, box-shadow .2s, transform .18s;
  font-family: inherit;
}
.incl-tab:hover { background: #fff; border-color: var(--line); }
.incl-tab.active { background: #fff; border-color: var(--line); box-shadow: var(--shadow-md); transform: translateX(5px); }
.incl-tab-icon { width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0; display: grid; place-items: center; color: #fff; transition: transform .2s; }
.incl-tab.active .incl-tab-icon { transform: scale(1.1); }
.incl-tab-info { min-width: 0; flex: 1; }
.incl-tab-label { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); line-height: 1.2; }
.incl-tab-sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.incl-tab-chevron { margin-left: auto; flex-shrink: 0; opacity: 0; transform: translateX(-4px); transition: opacity .2s, transform .2s; color: var(--purple); }
.incl-tab.active .incl-tab-chevron { opacity: 1; transform: translateX(0); }
.incl-panel {
  border-radius: var(--radius-xl); background: var(--ink);
  padding: 48px; position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
  min-height: 440px;
}
.incl-orb1, .incl-orb2 { position: absolute; border-radius: 50%; pointer-events: none; transition: background .55s ease; }
.incl-orb1 { width: 340px; height: 340px; top: -100px; right: -70px; opacity: 0.22; filter: blur(72px); }
.incl-orb2 { width: 200px; height: 200px; bottom: -60px; left: -30px; opacity: 0.14; filter: blur(56px); }
.incl-icon-bg { position: absolute; top: 36px; right: 36px; pointer-events: none; color: #fff; }
.incl-icon-bg svg { width: 108px; height: 108px; opacity: 0.05; }
@keyframes inclIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.incl-content { position: relative; z-index: 1; animation: inclIn 0.32s cubic-bezier(.4,0,.2,1) both; }
.incl-eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 14px; }
.incl-ptitle { font-family: var(--font-display); font-size: clamp(26px,3vw,40px); font-weight: 600; letter-spacing: -0.035em; line-height: 1.06; color: #fff; margin-bottom: 16px; }
.incl-pdesc { font-size: 15px; color: rgba(255,255,255,0.56); line-height: 1.66; margin-bottom: 32px; max-width: 400px; }
.incl-pstat { display: flex; align-items: baseline; gap: 10px; }
.incl-pstat-num { font-family: var(--font-display); font-size: clamp(34px, 5vw, 52px); font-weight: 600; letter-spacing: -0.05em; line-height: 1; }
.incl-pstat-lbl { font-size: 13px; color: rgba(255,255,255,0.42); }
@media (max-width: 1024px) { .incl-layout { grid-template-columns: 1fr; } }

/* Scroll fade-in */
.fade-in { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1); }
.fade-in.visible { opacity: 1; transform: translateY(0); }
@media (max-width: 768px) {
  .fade-in { transform: translateY(36px) scale(0.96); transition: opacity .58s cubic-bezier(.34,1.1,.64,1), transform .58s cubic-bezier(.34,1.1,.64,1); }
  .fade-in.visible { transform: translateY(0) scale(1); }
}

/* Footer */
.footer { padding: 40px 0; border-top: 1px solid var(--line); }
.footer-inner { display: flex; flex-direction: row; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-socials { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.footer-socials a {
  width: 54px; height: 54px; border-radius: 50%;
  display: grid; place-items: center;
  background: var(--bg-soft); color: var(--ink-dim);
  border: 1px solid var(--line); text-decoration: none;
  transition: background .28s cubic-bezier(.4,0,.2,1), color .28s cubic-bezier(.4,0,.2,1), transform .28s cubic-bezier(.34,1.15,.64,1), border-color .28s;
}
.footer-socials a:hover { background: var(--purple); color: #fff; border-color: var(--purple); transform: translateY(-3px); }
.footer-socials a svg { display: block; width: 22px; height: 22px; }
.footer-copy { font-size: 12px; color: var(--ink-soft); letter-spacing: .02em; }
.footer-email { font-size: 12px; color: var(--ink-dim); text-decoration: none; letter-spacing: .02em; transition: color .2s; }
.footer-email:hover { color: var(--purple); }

@media (max-width: 1024px) {
  .combos-grid { grid-template-columns: 1fr; }
  .courses-grid { grid-template-columns: repeat(3, 1fr); }
  .included-grid { grid-template-columns: repeat(2, 1fr); }
}
/* Mobile accordion for "every course includes" */
.incl-accordion { display: flex; flex-direction: column; gap: 8px; }
.incl-accordion-item { border-radius: var(--radius-md); border: 1.5px solid var(--line); background: #fff; overflow: hidden; }

.incl-accordion-item.active .incl-accordion-chevron { transform: rotate(90deg); }
.incl-accordion-body {

@media (max-width: 768px) {
  :root { --section-pad: 56px; }

  .btn-nav-contact { display: none; }
  .courses-grid { grid-template-columns: 1fr; }
  .included-grid { grid-template-columns: 1fr; }
  .placement-card { grid-template-columns: minmax(0, 1fr); gap: 0; padding: 32px 24px 36px; align-items: start; overflow: hidden; }
  .placement-card::before, .placement-card::after { display: none; }
  .placement-left, .placement-right { min-width: 0; }

  .footer-inner { flex-direction: column; align-items: center; text-align: center; }
  .footer-socials a { width: 44px; height: 44px; }
  .footer-socials a svg { width: 18px; height: 18px; }
}

/* ── Touch-device interaction overrides ─────────────────────── */
@media (hover: none) {
  /* Kill hover lifts — replace with tap feedback */
  .combo-card:hover,
  .combo-card.featured:hover { transform: none; }
  .combo-card:active { transform: scale(0.975); transition-duration: .12s; }
  .combo-card.featured:active { transform: scale(0.975); transition-duration: .12s; }
  .course-card:hover { transform: none; box-shadow: none; }
  .course-card:hover::before { opacity: 0.18; }
  .course-card:hover .course-icon { transform: none; box-shadow: none; }
  .course-card:hover .course-title { color: inherit; }
  .course-card:hover .course-validity { color: var(--ink-soft); }
  .course-card:hover .course-topics { max-height: 0; opacity: 0; margin-bottom: 0; }
  .course-card:active { transform: scale(0.975); transition-duration: .12s; }
  /* Combo includes — show without hover */
  .combo-includes li { opacity: 1; transform: translateX(0); }
  .combo-check svg path { stroke-dashoffset: 0; }
  /* Restore featured-card box-shadow */
  .combo-card.featured:hover { box-shadow: 0 20px 60px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.07); }
}

/* ── Featured card float (mobile only, after reveal) ────────── */
@keyframes card-float {
  0%, 100% { transform: translateY(0) scale(1); }
  50%       { transform: translateY(-8px) scale(1); }
}
@media (max-width: 768px) {
  .combo-card.featured.visible { animation: card-float 3.8s ease-in-out 0.5s infinite; }
  .combo-card.featured.visible:active { animation-play-state: paused; transform: scale(0.975); }
}

/* YouTube link wiggle */
@keyframes yt-wiggle {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-1.5deg); }
  45%  { transform: rotate(1deg); }
  68%  { transform: rotate(-0.5deg); }
  85%  { transform: rotate(0.2deg); }
  100% { transform: rotate(0deg); }
}
a[href*="youtube"]:hover svg, a[href*="youtu.be"]:hover svg {
  animation: yt-wiggle 0.6s cubic-bezier(.4,0,.2,1);
}
/* ── Mobile hamburger menu ──────────────────────────── */
.nav-hamburger { display: none; flex-direction: column; gap: 5px; align-items: center; justify-content: center; width: 40px; height: 40px; border: none; background: none; cursor: pointer; border-radius: 8px; transition: background .2s; flex-shrink: 0; padding: 0; }

.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
@keyframes menuItemIn { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }

.mobile-menu-actions .btn-nav-signup::after { content: ''; position: absolute; top: -50%; left: -75%; width: 50%; height: 200%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent); transform: skewX(-15deg); transition: left .55s ease; pointer-events: none; }
.mobile-menu-actions .btn-nav-signup:hover::after, .mobile-menu-actions .btn-nav-signup:active::after { left: 130%; }
.mobile-menu-actions .btn-nav-signup:hover { box-shadow: 0 6px 28px rgba(109,40,217,0.5), inset 0 1px 0 rgba(255,255,255,0.18); transform: translateY(-1px); }

.mobile-menu-actions .btn-nav-signup:hover .mobile-btn-arrow, .mobile-menu-actions .btn-nav-signup:active .mobile-btn-arrow { transform: translateX(4px); }

@media (max-width: 768px) { .nav-hamburger { display: flex; } .nav-cta { display: none; } .nav-inner { height: 64px; padding: 0 14px; position: relative; justify-content: flex-end; } .mobile-menu { top: 64px; } .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); } .nav-logo:hover { transform: translateX(-50%) translateY(-2px); } .nav-logo:active { transform: translateX(-50%) translateY(1px); } .nav-logo svg, .nav-logo img { width: 150px; height: auto; } .nav-hamburger span { background: var(--purple); } }

};

function TAAILogo() {
  return <img src="logo.png" alt="TAAI" />;
}

function Nav() {
  const linksRef = React.useRef(null);
  const [pill, setPill] = React.useState({ left: 0, width: 0, visible: false });
  const resetTimer = React.useRef(null);

  const moveTo = React.useCallback((el) => {
    if (resetTimer.current) { clearTimeout(resetTimer.current); resetTimer.current = null; }
    if (!el) return;
    setPill({ left: el.offsetLeft - 10, width: el.offsetWidth + 20, visible: true });
  }, []);

  const reset = React.useCallback(() => {
    resetTimer.current = setTimeout(() => {
      const active = linksRef.current && linksRef.current.querySelector('a.active');
      if (active) moveTo(active); else setPill(p => ({ ...p, visible: false }));
    }, 60);
  }, [moveTo]);

  React.useEffect(() => { reset(); }, [reset]);

  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return;
    const close = e => { if (!e.target.closest('.nav') && !e.target.closest('.mobile-menu')) setMenuOpen(false); };
    document.addEventListener('pointerdown', close);
    return () => document.removeEventListener('pointerdown', close);
  }, [menuOpen]);

  return (
    <>
      <nav className={`nav${menuOpen ? ' menu-open' : ''}`}>
        <div className="nav-inner" onMouseLeave={reset}>
          <a href="index.html" className="nav-logo">
            <TAAILogo />
          </a>
          <div className="nav-links" ref={linksRef}>
            <div className="nav-pill" style={{ left: pill.left, width: pill.width, opacity: pill.visible ? 1 : 0 }} />
            {NAV_LINKS.map((l) => (
              <a key={l.href} href={l.href} className={l.active ? 'active' : ''}
                 onMouseEnter={(e) => moveTo(e.currentTarget)}>{l.label}</a>

function Faculty() {
  const [airNum, setAirNum] = React.useState(94);
  const airRaf = React.useRef(null);
  const triggered = React.useRef(false);
  const gridRef = React.useRef(null);

  React.useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !triggered.current) {
        triggered.current = true;
        obs.disconnect();
        const START = 560, END = 94, DURATION = 1300;
        const t0 = performance.now();
        const step = (now) => {
          const p = Math.min((now - t0) / DURATION, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          setAirNum(Math.round(START + (END - START) * eased));
          if (p < 1) airRaf.current = requestAnimationFrame(step);
        };
        airRaf.current = requestAnimationFrame(step);
      }
    }, { threshold: 0.25 });
    if (gridRef.current) obs.observe(gridRef.current);
    return () => { obs.disconnect(); cancelAnimationFrame(airRaf.current); };
  }, []);

  return (
    <section className="section" style={{ background: 'var(--bg-soft)', paddingTop: 'var(--section-pad)' }}>
      <div className="container">
        <div className="section-eyebrow fade-in">Faculty</div>
