<!DOCTYPE html>
<html lang="en" data-density="normal" data-cards="shadowed">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAI · Student Testimonials — Real Ranks, Real Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --bg-soft: #FBF9FF;
  --ink: #14102B;
  --ink-dim: #4A4270;
  --ink-soft: #857CAE;
  --line: #ECE6F8;
  --card: #FFFFFF;
  --pink: #FF7FB7;
  --pink-soft: #FFD6E8;
  --purple: #8B5CF6;
  --purple-soft: #E6DCFF;
  --blue: #4D8BFF;
  --blue-soft: #D6E4FF;
  --lilac: #C4B0FF;
  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 36px;
  --shadow-sm: 0 1px 0 rgba(20,16,43,0.04), 0 2px 6px rgba(20,16,43,0.04);
  --shadow-md: 0 2px 0 rgba(20,16,43,0.03), 0 12px 32px rgba(107,75,255,0.08);
  --shadow-lg: 0 24px 60px rgba(107,75,255,0.16);
  --font-display: 'Fraunces', ui-serif, serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
  --gutter: 32px;
  --section-pad: 96px;
}

[data-cards="shadowed"] .card { box-shadow: var(--shadow-md); border: 1px solid transparent; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 max(var(--gutter), 24px); }

/* ── Nav ─────────────────────────────────────────────── */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(255,255,255,0.55); -webkit-backdrop-filter: saturate(180%) blur(20px); backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--line); overflow: visible; }
.nav-spacer { height: 86px; }
.nav.menu-open { background: rgba(248,246,255,0.82); }
.nav-inner { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; height: 86px; padding: 0 32px 0 20px; overflow: visible; }
.nav-logo {
  display: flex; align-items: center; text-decoration: none;
  transition: transform .22s ease-out, opacity .22s ease;
}
.nav-logo svg, .nav-logo img { width: 180px; height: auto; }
.nav-logo:hover { transform: translateY(-2px); opacity: 0.82; }
.nav-logo:active { transform: translateY(1px); opacity: 1; transition-duration: .08s; }
@media (hover: hover) {
  .nav-logo { position: relative; }
  .nav-logo::after { content: 'Home'; position: absolute; bottom: -34px; left: 50%; transform: translateX(-50%) translateY(8px) scale(0.88); font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--purple); background: linear-gradient(135deg, rgba(249,247,255,0.97), rgba(241,237,255,0.97)); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(139,92,246,0.22); border-radius: 20px; padding: 4px 13px; opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .24s cubic-bezier(.34,1.15,.64,1); white-space: nowrap; box-shadow: 0 4px 18px rgba(139,92,246,0.13), 0 1px 4px rgba(0,0,0,0.05); }
  .nav-logo:hover::after { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
.nav-links { display: flex; gap: 36px; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; position: relative;}
.nav-links a { color: var(--ink-dim); text-decoration: none; transition: color .2s, transform .3s cubic-bezier(.34,1.1,.64,1); position: relative; z-index: 1; cursor: pointer; display: inline-block; }
.nav-links a::after { content: ''; position: absolute; inset: -14px -10px; z-index: 0; }
.nav-links a:hover, .nav-links a.active { color: var(--purple); transform: scale(1.08) translateY(-1px); }
.nav-pill {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 34px; border-radius: 10px; pointer-events: none; z-index: 0;
  overflow: hidden;
  background: linear-gradient(
    150deg,
    rgba(255,255,255,0.36) 0%,
    rgba(180,155,255,0.14) 40%,
    rgba(139,92,246,0.10) 68%,
    rgba(255,255,255,0.24) 100%
  );
  background-size: 300% 300%;
  border: 1px solid rgba(255,255,255,0.55);
  backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  box-shadow:
    0 2px 12px rgba(139,92,246,0.10),
    inset 0 1.5px 0 rgba(255,255,255,0.82),
    inset 0 -1px 0 rgba(100,80,200,0.08),
    inset 1px 0 0 rgba(255,255,255,0.32),
    inset -1px 0 0 rgba(255,255,255,0.32);
  animation: water-flow 4s ease-in-out infinite;
  transition: left .3s cubic-bezier(0.34,1.2,0.64,1), width .28s cubic-bezier(0.34,1.15,0.64,1), opacity .2s ease;
}
.nav-pill::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(125deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.0) 52%);
  animation: glass-shine 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes water-flow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes glass-shine {
  0%, 100% { opacity: 1; transform: translateX(0); }
  50% { opacity: 0.35; transform: translateX(10px); }
}
.nav-cta { display: flex; gap: 10px; align-items: center; }
.btn-nav-signin { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: rgba(139,92,246,0.07); color: var(--ink); border: 1px solid rgba(139,92,246,0.22); backdrop-filter: blur(10px) saturate(150%); -webkit-backdrop-filter: blur(10px) saturate(150%); box-shadow: 0 1px 2px rgba(139,92,246,0.06), inset 0 1px 0 rgba(255,255,255,0.7); transition: background .2s, transform .32s cubic-bezier(.34,1.1,.64,1), box-shadow .2s, backdrop-filter .2s; white-space: nowrap; }
.btn-nav-signin:hover { background: rgba(139,92,246,0.13); transform: scale(1.06) translateY(-1px); backdrop-filter: blur(18px) saturate(220%) brightness(1.04); -webkit-backdrop-filter: blur(18px) saturate(220%) brightness(1.04); box-shadow: 0 6px 20px rgba(139,92,246,0.18), inset 0 1px 0 rgba(255,255,255,0.85), 0 0 0 1px rgba(139,92,246,0.12); }
.btn-nav-signup { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: linear-gradient(160deg, rgba(147,105,255,0.92), rgba(107,75,255,0.88)); color: #fff; border: 1px solid rgba(255,255,255,0.22); backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%); box-shadow: 0 2px 10px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.28); transition: transform .32s cubic-bezier(.34,1.1,.64,1), box-shadow .2s; white-space: nowrap; }
.btn-nav-signup:hover { transform: scale(1.06) translateY(-1px); box-shadow: 0 8px 24px rgba(107,75,255,0.45), inset 0 1px 0 rgba(255,255,255,0.36); }
.btn-nav-contact { font-size: 14px; font-weight: 500; color: var(--ink-dim); text-decoration: none; padding: 10px 20px; border-radius: 8px; background: none; border: none; box-shadow: none; transition: color .2s, transform .32s cubic-bezier(.34,1.1,.64,1), background .2s; white-space: nowrap; }
.btn-nav-contact:hover { color: var(--purple); background: rgba(139,92,246,0.07); transform: scale(1.06) translateY(-1px); }
.phone-icon { display: inline-flex; align-items: center; margin-right: 5px; transform-origin: 50% 55%; }
.btn-nav-contact:hover .phone-icon { animation: phone-ring 0.52s ease-in-out; }
.nav-cta .btn-nav-signin,
.nav-cta .btn-nav-signup,
.nav-cta .btn-nav-contact { position: relative; overflow: hidden; }
.nav-cta .btn-nav-signin::before,
.nav-cta .btn-nav-signup::before,
.nav-cta .btn-nav-contact::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(108deg, transparent 20%, rgba(255,255,255,0.42) 48%, rgba(210,195,255,0.25) 56%, transparent 74%);
  transform: translateX(-120%) skewX(-12deg);
  pointer-events: none;
  border-radius: inherit;
  transition: none;
}
.nav-cta .btn-nav-signin:hover::before,
.nav-cta .btn-nav-signup:hover::before,
.nav-cta .btn-nav-contact:hover::before {
  transform: translateX(220%) skewX(-12deg);
  transition: transform .52s cubic-bezier(.2,.8,.4,1);
}
@keyframes phone-ring {
  0%,100% { transform: rotate(0); }
  12%     { transform: rotate(-22deg); }
  28%     { transform: rotate(18deg); }
  44%     { transform: rotate(-12deg); }
  60%     { transform: rotate(8deg); }
  76%     { transform: rotate(-4deg); }
  90%     { transform: rotate(2deg); }
}
/* ── Buttons ─────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 999px; font-family: var(--font-body); font-size: 15px; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: transform .15s, box-shadow .15s; }
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; box-shadow: 0 4px 20px rgba(139,92,246,0.3); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
.btn-ghost:hover { border-color: var(--purple); color: var(--purple); }

/* ── Hero ────────────────────────────────────────────── */
.hero {
  padding: 80px 0 72px;
  position: relative; overflow: hidden;
  background: var(--bg);
  text-align: center;
}
.hero-orb-1 { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, var(--pink-soft) 0%, transparent 65%); top: -200px; right: -100px; pointer-events: none; animation: orb-drift 13s ease-in-out infinite; }
.hero-orb-2 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, var(--blue-soft) 0%, transparent 65%); bottom: -180px; left: -120px; pointer-events: none; animation: orb-drift 17s ease-in-out infinite reverse; }
.hero-inner { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--purple); margin-bottom: 24px;
}
.hero-eyebrow::before { content: ''; display: inline-block; width: 18px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }
.hero h1 {
  font-family: var(--font-display); font-weight: 600;
  font-size: clamp(44px, 5.5vw, 76px);
  line-height: 0.95; letter-spacing: -0.04em;
  margin-bottom: 24px;
}
.hero h1 em { font-style: normal; background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%); background-size: 200% 200%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: gradient-shift 5s ease infinite; }
.hero-sub { font-size: 18px; color: var(--ink-dim); line-height: 1.6; max-width: 560px; margin: 0 auto 36px; }
.hero-stats { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
.hero-stat { text-align: center; }
.hero-stat-num { font-family: var(--font-display); font-size: 40px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; background: linear-gradient(120deg, var(--pink), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero-stat-label { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
.hero-stat-div { width: 1px; height: 40px; background: var(--line); }

/* ── Stats strip ─────────────────────────────────────── */
.strip { padding: 56px 0; background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%); color: #fff; position: relative; overflow: hidden; }
.strip::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 120%, rgba(255,255,255,0.1) 0%, transparent 65%); pointer-events: none; }
.strip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; max-width: 720px; margin: 0 auto; }
.strip-item { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 0 32px; position: relative; }
.strip-item + .strip-item::before { content: ''; position: absolute; left: 0; top: 10%; height: 80%; width: 1px; background: rgba(255,255,255,0.22); }
.strip-num { font-family: var(--font-display); font-size: clamp(36px, 5vw, 56px); font-weight: 600; letter-spacing: -0.04em; line-height: 1; margin-bottom: 8px; }
.strip-label { font-size: 12px; color: rgba(255,255,255,0.72); text-transform: uppercase; letter-spacing: .1em; }
.strip-sub { font-size: 11px; color: rgba(255,255,255,0.42); letter-spacing: .05em; margin-top: 4px; font-style: italic; }
.strip-note { text-align: center; font-size: 12px; color: rgba(255,255,255,0.38); letter-spacing: .05em; font-style: italic; margin-top: 20px; padding: 0 20px; }

/* ── Section base ────────────────────────────────────── */
.section { padding: var(--section-pad) 0; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 18px; }
.section-eyebrow::before { content: ''; display: inline-block; width: 18px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }
.section-header { margin-bottom: 0; }
.section-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 56px; gap: 24px; flex-wrap: wrap; }
.section-head-left { max-width: 720px; }
.results-grid { display: flex; flex-direction: column; gap: 16px; }
.results-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.result-card { border-radius: var(--radius-md); padding: 24px; border: 1px solid var(--line); background: #fff; text-align: left; transition: transform .2s ease; }
.result-card:hover { transform: translateY(-3px); }
.result-card .big { font-family: var(--font-display); font-size: clamp(32px, 5vw, 48px); font-weight: 600; letter-spacing: -0.04em; line-height: 1; background: linear-gradient(120deg, var(--pink), var(--purple), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.result-card .lbl { font-size: 13px; color: var(--ink-dim); margin-top: 8px; }
.result-hero {
  border-radius: var(--radius-lg); padding: 48px 56px;
  background: linear-gradient(135deg, #14102B 0%, #221260 55%, #1a0d50 100%);
  border: 1px solid rgba(139,92,246,0.35);
  box-shadow: 0 12px 48px rgba(107,75,255,0.28);
  position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 48px;
}
.result-hero::before {
  content: ''; position: absolute; top: -80px; right: -60px;
  width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,127,183,0.2) 0%, transparent 68%);
  pointer-events: none;
}
.result-hero::after {
  content: ''; position: absolute; bottom: -60px; left: 20%;
  width: 240px; height: 240px; border-radius: 50%;
  background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 68%);
  pointer-events: none;
}
.result-hero-num {
  font-family: var(--font-display); font-size: clamp(80px, 10vw, 120px);
  font-weight: 600; letter-spacing: -0.05em; line-height: 1;
  background: linear-gradient(120deg, var(--pink), var(--lilac));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  position: relative; z-index: 1; flex-shrink: 0;
}
.result-hero-text { position: relative; z-index: 1; }
.result-hero-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 10px; }
.result-hero-label { font-family: var(--font-display); font-size: clamp(22px,2.8vw,34px); font-weight: 600; letter-spacing: -0.025em; color: #fff; line-height: 1.15; margin-bottom: 10px; }
.result-hero-sub { font-size: 15px; color: rgba(255,255,255,0.45); line-height: 1.55; max-width: 360px; }
.section-h2 { font-family: var(--font-display); font-size: clamp(30px,3.8vw,50px); font-weight: 600; letter-spacing: -0.035em; line-height: 1; }
.section-h2 em { font-style: normal; background: linear-gradient(120deg, var(--pink), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.section-h2 em.blue { background: linear-gradient(120deg, var(--purple), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }

/* ── Gallery masonry ─────────────────────────────────── */
.gallery-masonry {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin-top: 48px;
  align-items: start;
}
.gallery-col { display: flex; flex-direction: column; gap: 24px; }
.from-left  { --tx: -36px; }
.from-right { --tx:  36px; }
.gallery-item {
  position: relative;
}
.gallery-img-wrap {
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow:
    0 2px 8px rgba(20,16,43,0.06),
    0 8px 28px rgba(255,127,183,0.2),
    0 18px 52px rgba(139,92,246,0.14);
  transition: transform .5s cubic-bezier(0.16,1,0.3,1), box-shadow .5s ease;
}
.gallery-item:hover .gallery-img-wrap {
  transform: translateY(-6px);
  box-shadow:
    0 4px 12px rgba(20,16,43,0.08),
    0 14px 38px rgba(255,127,183,0.3),
    0 28px 68px rgba(139,92,246,0.22);
}
.gallery-img-wrap img { width: 100%; display: block; }
.gallery-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 4px 0;
  flex-wrap: wrap;
}
.gallery-air-badge {
  display: inline-flex;
  align-items: center;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 13px;
  border-radius: 999px;
  letter-spacing: .06em;
}

/* ── Batch divider ───────────────────────────────────── */
.batch-divider {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 0 0 56px;
}
.batch-divider-line { flex: 1; height: 1px; background: var(--line); }
.batch-divider-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  white-space: nowrap;
  padding: 6px 16px;
  border: 1px solid var(--line);
  border-radius: 999px;
}

/* ── Featured cards ──────────────────────────────────── */
.featured-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-top: 40px; }
.feat-card {
  background: var(--ink);
  border-radius: var(--radius-xl);
  padding: 40px;
  color: #fff;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; gap: 20px;
}
.feat-card::before {
  content: '';
  position: absolute; top: -80px; right: -60px;
  width: 260px; height: 260px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,127,183,0.2) 0%, transparent 70%);
  pointer-events: none;
}
.feat-card::after {
  content: '';
  position: absolute; bottom: -60px; left: -40px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(77,139,255,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.feat-rank { display: inline-flex; align-items: baseline; gap: 6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; color: rgba(255,255,255,0.5); text-transform: uppercase; }
.feat-rank-num { font-family: var(--font-display); font-size: 64px; font-weight: 600; letter-spacing: -0.05em; line-height: 1; background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.feat-quote { font-size: 16px; line-height: 1.65; color: rgba(255,255,255,0.82); font-style: italic; flex: 1; }
.feat-author { display: flex; align-items: center; gap: 14px; }
.feat-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0; }
.feat-name { font-weight: 600; font-size: 15px; color: #fff; }
.feat-role { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* ── Testimonials grid ───────────────────────────────── */
.testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
.testi-card {
  background: var(--card);
  border-radius: var(--radius-lg);
  padding: 28px;
  display: flex; flex-direction: column; gap: 16px;
  transition: transform .2s, box-shadow .2s;
}
.testi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.testi-rank-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--purple-soft); color: var(--purple); font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: .06em; padding: 5px 12px; border-radius: 999px; width: fit-content; }
.testi-rank-badge span { font-family: var(--font-display); font-size: 18px; font-weight: 700; }
.testi-quote { font-size: 14px; line-height: 1.7; color: var(--ink-dim); font-style: italic; flex: 1; }
.testi-author { display: flex; align-items: center; gap: 12px; padding-top: 4px; border-top: 1px solid var(--line); }
.testi-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0; }
.testi-name { font-weight: 600; font-size: 14px; color: var(--ink); }
.testi-role { font-size: 12px; color: var(--ink-soft); margin-top: 1px; }

/* ── Video thumbnails ────────────────────────────────── */
.vthumb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.vthumb-header-label { font-size: 12px; font-weight: 700; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .09em; }
.vthumb-header-all { font-size: 13px; color: var(--purple); font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: color .2s; }
.vthumb-header-all:hover { color: var(--pink); }
.vthumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.vthumb { text-decoration: none; color: inherit; display: block; }
.vthumb-wrap { position: relative; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
.vthumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease, opacity .3s ease; opacity: 0.9; }
.vthumb:hover .vthumb-wrap img { transform: scale(1.04); opacity: 0.72; }
.vthumb-play-overlay { position: absolute; inset: 0; display: grid; place-items: center; opacity: 0; transition: opacity .25s ease; }
.vthumb:hover .vthumb-play-overlay { opacity: 1; }
.vthumb-info { padding: 10px 2px 0; }
.vthumb-air-badge { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--purple); background: var(--purple-soft); padding: 2px 8px; border-radius: 999px; display: inline-block; margin-bottom: 5px; }
.vthumb-name { font-size: 13px; font-weight: 600; color: var(--ink); display: block; }
.vthumb-batch { font-size: 12px; color: var(--ink-soft); display: block; margin-top: 1px; }

/* ── Video CTA ───────────────────────────────────────── */
.video-cta { background: var(--bg-soft); border-radius: var(--radius-xl); padding: 56px 48px; display: flex; align-items: center; justify-content: space-between; gap: 40px; border: 1px solid var(--line); }
.video-cta-left h2 { font-family: var(--font-display); font-size: clamp(28px,3vw,42px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 14px; }
.video-cta-left h2 em { font-style: normal; background: linear-gradient(120deg, var(--pink), var(--purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.video-cta-left p { font-size: 15px; color: var(--ink-dim); line-height: 1.6; max-width: 440px; }
.video-cta-right { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; flex-shrink: 0; }

/* ── Footer ──────────────────────────────────────────── */
.footer { padding: 40px 0; border-top: 1px solid var(--line); }
.footer-inner { display: flex; flex-direction: row; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-socials { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.footer-socials a { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; background: var(--bg-soft); color: var(--ink-dim); border: 1px solid var(--line); text-decoration: none; transition: background .28s cubic-bezier(.4,0,.2,1), color .28s, transform .28s cubic-bezier(.34,1.15,.64,1), border-color .28s; }
.footer-socials a:hover { background: var(--purple); color: #fff; border-color: var(--purple); transform: translateY(-3px); }
.footer-socials a svg { display: block; width: 22px; height: 22px; }
.footer-copy { font-size: 12px; color: var(--ink-soft); letter-spacing: .02em; }
.footer-email { font-size: 12px; color: var(--ink-dim); text-decoration: none; letter-spacing: .02em; transition: color .2s; }
.footer-email:hover { color: var(--purple); }

/* ── Keyframes ───────────────────────────────────────── */
@keyframes orb-drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%       { transform: translate(20px, -16px) scale(1.05); }
  66%       { transform: translate(-12px, 12px) scale(0.96); }
}
@keyframes gradient-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes reveal {
  from { opacity: 0; transform: translate(var(--tx, 0px), var(--ty, 28px)) scale(var(--ts, 0.97)); }
  to   { opacity: 1; transform: translate(0px, 0px) scale(1); }
}

/* ── Scroll reveal ───────────────────────────────────── */
.fade-in {
  animation: reveal 0.78s cubic-bezier(0.16, 1, 0.3, 1) var(--delay, 0ms) both paused;
  will-change: transform, opacity;
}
.fade-in.visible { animation-play-state: running; }
@media (max-width: 768px) {
  .fade-in { animation-duration: .6s; animation-timing-function: cubic-bezier(.34,1.1,.64,1); }
  /* reduce lateral slide on mobile — full width feels jarring */
  .feat-card:nth-child(odd)  { --tx: -22px; --ty: 0px; }
  .feat-card:nth-child(even) { --tx:  22px; --ty: 0px; }
  .testi-card:nth-child(odd)  { --tx: -22px; --ty: 0px; }
  .testi-card:nth-child(even) { --tx:  22px; --ty: 0px; }
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 1024px) {
  .featured-grid { grid-template-columns: 1fr; }
  .vthumb-grid { grid-template-columns: 1fr 1fr; }
  .testi-grid { grid-template-columns: 1fr 1fr; }
  .video-cta { flex-direction: column; align-items: flex-start; }
  .video-cta-right { align-items: flex-start; }
  .gallery-masonry { grid-template-columns: 1fr; }
  .gallery-col:first-child .gallery-item:nth-child(odd)  { --tx: -44px; }
  .gallery-col:first-child .gallery-item:nth-child(even) { --tx:  44px; }
  .gallery-col:last-child  .gallery-item:nth-child(odd)  { --tx: -44px; }
  .gallery-col:last-child  .gallery-item:nth-child(even) { --tx:  44px; }
}
@media (max-width: 768px) {
  :root { --section-pad: 60px; }
  .nav-links { display: none; }
  .btn-nav-contact { display: none; }
  .testi-grid { grid-template-columns: 1fr; }
  .vthumb-grid { grid-template-columns: 1fr; }
  .strip-grid { grid-template-columns: repeat(3,1fr); gap: 0; }
  .strip-item { padding: 0 16px; }
  .hero-stats { gap: 20px; }
  .hero-stat-div { display: none; }
  .feat-card { padding: 28px 24px; }
  .feat-rank-num { font-size: 48px; }
  .video-cta { padding: 36px 24px; }
  .result-hero { flex-direction: column; align-items: flex-start; gap: 20px; padding: 32px 24px; }
  .result-hero-num { font-size: 72px; }
  .result-hero-label { font-size: 24px; }
  .result-hero-text { display: flex; flex-direction: column; }
  .result-hero-label { order: 1; }
  .result-hero-eyebrow { order: 2; margin-bottom: 0; margin-top: 8px; }
  .result-hero-sub { order: 3; }
  .results-row { grid-template-columns: 1fr; }
  .feat-card:nth-child(odd)  { --tx: -44px; --ty: 0px; }
  .feat-card:nth-child(even) { --tx:  44px; --ty: 0px; }
  .testi-card:nth-child(odd)  { --tx: -44px; --ty: 0px; }
  .testi-card:nth-child(even) { --tx:  44px; --ty: 0px; }
  .footer-inner { flex-direction: column; align-items: center; text-align: center; }
  .footer-socials a { width: 44px; height: 44px; }
  .footer-socials a svg { width: 18px; height: 18px; }
}

/* ── Touch-device overrides ──────────────────────────── */
@media (hover: none) {
  .testi-card:hover { transform: none; box-shadow: none; }
  .testi-card:active { transform: scale(0.975); transition-duration: .12s; }
  .result-card:hover { transform: none; }
  .result-card:active { transform: scale(0.975); transition-duration: .12s; }
  .gallery-item:hover .gallery-img-wrap { transform: none; box-shadow: 0 2px 8px rgba(20,16,43,0.06), 0 8px 28px rgba(255,127,183,0.2), 0 18px 52px rgba(139,92,246,0.14); }
}

/* YouTube link wiggle */
@keyframes yt-wiggle {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-1.5deg); }
  45%  { transform: rotate(1deg); }
  68%  { transform: rotate(-0.5deg); }
  85%  { transform: rotate(0.2deg); }
  100% { transform: rotate(0deg); }
}
a[href*="youtube"]:hover svg, a[href*="youtu.be"]:hover svg {
  animation: yt-wiggle 0.6s cubic-bezier(.4,0,.2,1);
}
/* ── Mobile hamburger menu ──────────────────────────── */
.nav-hamburger { display: none; flex-direction: column; gap: 5px; align-items: center; justify-content: center; width: 40px; height: 40px; border: none; background: none; cursor: pointer; border-radius: 8px; transition: background .2s; flex-shrink: 0; padding: 0; }
.nav-hamburger:hover { background: rgba(139,92,246,0.08); }
.nav-hamburger span { display: block; width: 22px; height: 2px; border-radius: 2px; background: var(--ink); transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .2s; }
.nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu { position: fixed; top: 86px; left: 0; right: 0; z-index: 49; background: rgba(248,246,255,0.72); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border-bottom: 1px solid rgba(139,92,246,0.15); padding: 8px 12px 20px; display: flex; flex-direction: column; gap: 2px; transform: translateY(-10px); opacity: 0; pointer-events: none; transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .22s ease; box-shadow: 0 8px 40px rgba(20,16,43,0.12); overflow: hidden; }
.mobile-menu::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--purple), rgba(139,92,246,0.15)); pointer-events: none; }
.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
@keyframes menuItemIn { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
.mobile-menu-link { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-radius: 12px; font-size: 14px; font-weight: 700; color: var(--ink-dim); text-decoration: none; letter-spacing: .05em; text-transform: uppercase; transition: background .18s, color .18s, transform .12s ease; position: relative; }
.mobile-menu.open .mobile-menu-link { animation: menuItemIn .3s both cubic-bezier(.4,0,.2,1); }
.mobile-menu-link:active { transform: scale(0.97) !important; }
.mobile-menu-link:hover { background: rgba(139,92,246,0.08); color: var(--purple); }
.mobile-menu-link.active { background: rgba(139,92,246,0.1); color: var(--purple); }
.mobile-menu-link.active::before { content: ''; position: absolute; left: 0; top: 22%; bottom: 22%; width: 3px; border-radius: 2px; background: var(--purple); }
.mobile-menu-link-icon { opacity: 0.5; flex-shrink: 0; transition: opacity .18s; display: flex; align-items: center; }
.mobile-menu-link.active .mobile-menu-link-icon, .mobile-menu-link:hover .mobile-menu-link-icon { opacity: 1; }
.mobile-menu-link-label { flex: 1; }
.mobile-menu-link-chevron { opacity: 0.22; flex-shrink: 0; display: flex; align-items: center; transition: opacity .18s, transform .2s; }
.mobile-menu-link:hover .mobile-menu-link-chevron, .mobile-menu-link.active .mobile-menu-link-chevron { opacity: 0.65; transform: translateX(3px); }
.mobile-menu-divider { height: 1px; background: linear-gradient(90deg, rgba(139,92,246,0.25), rgba(139,92,246,0.06), transparent); margin: 8px 4px; }
.mobile-menu-actions { display: flex; flex-direction: column; gap: 10px; padding-top: 4px; }
.mobile-menu.open .mobile-menu-divider { animation: menuItemIn .25s both cubic-bezier(.4,0,.2,1); animation-delay: .22s; }
.mobile-menu.open .mobile-menu-actions { animation: menuItemIn .3s both cubic-bezier(.4,0,.2,1); animation-delay: .28s; }
.mobile-menu.open .mobile-menu-contact { animation: menuItemIn .3s both cubic-bezier(.4,0,.2,1); animation-delay: .34s; }
.mobile-menu-actions .btn-nav-signin { display: flex; justify-content: space-between; align-items: center; width: 100%; border-radius: 12px; padding: 14px 18px; font-size: 15px; background: rgba(139,92,246,0.07); color: var(--purple); border: 1.5px solid rgba(139,92,246,0.28); box-shadow: none; transition: background .2s, border-color .2s, box-shadow .2s, transform .12s; }
.mobile-menu-actions .btn-nav-signin:hover { background: rgba(139,92,246,0.13); border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); transform: none; }
.mobile-menu-actions .btn-nav-signin:active { transform: scale(0.97); background: rgba(139,92,246,0.18); }
.mobile-menu-actions .btn-nav-signup { display: flex; justify-content: space-between; align-items: center; width: 100%; border-radius: 12px; padding: 14px 18px; font-size: 15px; position: relative; overflow: hidden; background: linear-gradient(135deg, #9333ea, #7c3aed, #6d28d9); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 20px rgba(109,40,217,0.38), inset 0 1px 0 rgba(255,255,255,0.18); transition: box-shadow .2s, transform .12s; }
.mobile-menu-actions .btn-nav-signup::after { content: ''; position: absolute; top: -50%; left: -75%; width: 50%; height: 200%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent); transform: skewX(-15deg); transition: left .55s ease; pointer-events: none; }
.mobile-menu-actions .btn-nav-signup:hover::after, .mobile-menu-actions .btn-nav-signup:active::after { left: 130%; }
.mobile-menu-actions .btn-nav-signup:hover { box-shadow: 0 6px 28px rgba(109,40,217,0.5), inset 0 1px 0 rgba(255,255,255,0.18); transform: translateY(-1px); }
.mobile-menu-actions .btn-nav-signup:active { transform: scale(0.97); }
.mobile-btn-arrow { display: flex; align-items: center; transition: transform .2s ease; }
.mobile-menu-actions .btn-nav-signin:hover .mobile-btn-arrow, .mobile-menu-actions .btn-nav-signin:active .mobile-btn-arrow { transform: translateX(4px); }
.mobile-menu-actions .btn-nav-signup:hover .mobile-btn-arrow, .mobile-menu-actions .btn-nav-signup:active .mobile-btn-arrow { transform: translateX(4px); }
.mobile-menu-contact { display: flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 16px; font-size: 13px; font-weight: 600; color: var(--ink-dim); text-decoration: none; border-radius: 10px; transition: color .18s, background .18s; letter-spacing: .04em; text-transform: uppercase; }
.mobile-menu-contact:hover { color: var(--purple); background: rgba(139,92,246,0.06); }
@media (max-width: 768px) { .nav-hamburger { display: flex; } .nav-cta { display: none; } .nav-inner { height: 64px; padding: 0 14px; position: relative; justify-content: flex-end; } .mobile-menu { top: 64px; } .nav-spacer { height: 64px; } .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); } .nav-logo:hover { transform: translateX(-50%) translateY(-2px); } .nav-logo:active { transform: translateX(-50%) translateY(1px); } .nav-logo svg, .nav-logo img { width: 150px; height: auto; } .nav-hamburger span { background: var(--purple); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">

const Icon = {
  ArrowRight: ({ s=16 }) => <svg width={s} height={s} viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L8 3M13 8L8 13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  Play: () => <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="8" stroke="currentColor" strokeWidth="1.5"/><path d="M7 6.5L12 9L7 11.5V6.5Z" fill="currentColor"/></svg>,
};

function TAAILogo() {
  return <img src="logo.png" alt="TAAI" />;
}

const NAV_LINKS = [
  { label: 'Courses',      href: 'courses.html'                        },
  { label: 'Test Series',  href: 'test-series.html'                    },
  { label: 'Testimonials', href: 'testimonials.html', active: true     },
];
const MENU_ICONS = {
  'index.html':        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 12L12 4L21 12V20C21 20.6 20.6 21 20 21H15V16H9V21H4C3.4 21 3 20.6 3 20V12Z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" /></svg>,
  'courses.html':      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M4 5C4 4 4.5 3 6 3H11V20H6C4.5 20 4 19 4 18V5Z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" /><path d="M20 5C20 4 19.5 3 18 3H13V20H18C19.5 20 20 19 20 18V5Z" stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" /></svg>,
  'test-series.html':  <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" strokeWidth="1.7" /><circle cx="12" cy="12" r="4" stroke="currentColor" strokeWidth="1.7" /><circle cx="12" cy="12" r="1.5" fill="currentColor" /></svg>,
  'testimonials.html': <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="8" cy="9" r="3" stroke="currentColor" strokeWidth="1.7" /><circle cx="16" cy="9" r="3" stroke="currentColor" strokeWidth="1.7" /><path d="M3 19C3 16 5 14 8 14C11 14 13 16 13 19" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /><path d="M13 19C13 16 15 14 18 14C19 14 20 14.3 21 15" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" /></svg>,
};

function Nav() {
  const linksRef = React.useRef(null);
  const [pill, setPill] = React.useState({ left: 0, width: 0, visible: false });
  const resetTimer = React.useRef(null);

  const moveTo = React.useCallback((el) => {
    if (resetTimer.current) { clearTimeout(resetTimer.current); resetTimer.current = null; }
    if (!el) return;
    setPill({ left: el.offsetLeft - 10, width: el.offsetWidth + 20, visible: true });
  }, []);

  const reset = React.useCallback(() => {
    resetTimer.current = setTimeout(() => {
      const active = linksRef.current && linksRef.current.querySelector('a.active');
      if (active) moveTo(active); else setPill(p => ({ ...p, visible: false }));
    }, 60);
  }, [moveTo]);

  React.useEffect(() => { reset(); }, [reset]);

  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return;
    const close = e => { if (!e.target.closest('.nav') && !e.target.closest('.mobile-menu')) setMenuOpen(false); };
    document.addEventListener('pointerdown', close);
    return () => document.removeEventListener('pointerdown', close);
  }, [menuOpen]);

  return (
    <>
      <nav className={`nav${menuOpen ? ' menu-open' : ''}`}>
        <div className="nav-inner" onMouseLeave={reset}>
          <a href="index.html" className="nav-logo">
            <TAAILogo />
          </a>
          <div className="nav-links" ref={linksRef}>
            <div className="nav-pill" style={{ left: pill.left, width: pill.width, opacity: pill.visible ? 1 : 0 }} />
            {NAV_LINKS.map((l) => (
              <a key={l.href} href={l.href} className={l.active ? 'active' : ''}
                 onMouseEnter={(e) => moveTo(e.currentTarget)}>{l.label}</a>
            ))}
          </div>
          <div className="nav-cta">
            <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signin" className="btn-nav-signin">Sign In</a>
            <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signup" className="btn-nav-signup">Sign Up</a>
            <a href="contact.html" className="btn-nav-contact"><span className="phone-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg></span>Contact Us</a>
          </div>
          <button className={`nav-hamburger${menuOpen ? ' open' : ''}`} onClick={() => setMenuOpen(o => !o)} aria-label="Toggle menu">
            <span /><span /><span />
          </button>
        </div>
      </nav>
      <div className={`mobile-menu${menuOpen ? ' open' : ''}`}>
        {[{ label: 'Home', href: 'index.html' }, ...NAV_LINKS].map((l, i) => (

function AnimatedNum({ to, suffix = '', duration = 1400 }) {
  const [val, setVal] = React.useState(0);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    let started = false;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting && !started) {
          started = true;
          const start = performance.now();
          const tick = now => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setVal(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.3 });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  return <span ref={ref} style={{ fontVariantNumeric: 'tabular-nums' }}>{val}{suffix}</span>;
}

// ── App ───────────────────────────────────────────────────────────
function App() {
  React.useEffect(() => {
    const mobile = window.matchMedia('(max-width: 768px)').matches;
    const io = new IntersectionObserver(entries => {
      const hit = entries.filter(e => e.isIntersecting);
      hit.sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      hit.forEach((e, i) => {
        io.unobserve(e.target);
        const delay = Math.min(i, 5) * (mobile ? 80 : 40);
        if (delay) setTimeout(() => e.target.classList.add('visible'), delay);
        else e.target.classList.add('visible');
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-in').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <div className="nav-spacer" />
      <Hero />
      <Strip />
      <ThisYearGallery />
      <PreviousBatch />
      <VideoCTA />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
