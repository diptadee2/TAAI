<!DOCTYPE html>
<html lang="en" data-density="normal" data-cards="shadowed">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAI · Test Series — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --bg-soft: #FBF9FF;
  --ink: #14102B;
  --ink-dim: #4A4270;
  --ink-soft: #857CAE;
  --line: #ECE6F8;
  --card: #FFFFFF;

  --pink: #FF7FB7;
  --pink-soft: #FFD6E8;
  --purple: #8B5CF6;
  --purple-soft: #E6DCFF;
  --blue: #4D8BFF;
  --blue-soft: #D6E4FF;
  --lilac: #C4B0FF;

  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 36px;

  --shadow-sm: 0 1px 0 rgba(20,16,43,0.04), 0 2px 6px rgba(20,16,43,0.04);
  --shadow-md: 0 2px 0 rgba(20,16,43,0.03), 0 12px 32px rgba(107,75,255,0.08);
  --shadow-lg: 0 24px 60px rgba(107,75,255,0.16);
  --shadow-xl: 0 40px 80px rgba(107,75,255,0.22);

  --font-display: 'Fraunces', ui-serif, serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;

  --gutter: 32px;
  --section-pad: 96px;
}

[data-cards="shadowed"] .card { box-shadow: var(--shadow-md); border: 1px solid transparent; }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5; }
.mono { font-family: var(--font-mono); font-size: .78rem; letter-spacing: .06em; text-transform: uppercase; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 max(var(--gutter), 24px); }

/* ── Nav ─────────────────────────────────────────────── */
.nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.50); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); overflow: visible; }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 86px; padding: 0 32px 0 20px; overflow: visible; }
.nav-logo {
  display: flex; align-items: center; text-decoration: none;
  transition: transform .22s ease-out, opacity .22s ease;
}
.nav-logo svg, .nav-logo img { height: 38px; width: auto; }
.nav-logo:hover { transform: translateY(-2px); opacity: 0.82; }
.nav-logo:active { transform: translateY(1px); opacity: 1; transition-duration: .08s; }
.nav-links { display: flex; gap: 36px; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; position: relative;}
.nav-links a { color: var(--ink-dim); text-decoration: none; transition: color .2s; position: relative; z-index: 1; cursor: pointer; }
.nav-links a::after { content: ''; position: absolute; inset: -14px -10px; z-index: 0; }
.nav-links a:hover, .nav-links a.active { color: var(--purple); }
.nav-pill {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 34px; border-radius: 10px; pointer-events: none; z-index: 0;
  overflow: hidden;
  background: linear-gradient(
    150deg,
    rgba(255,255,255,0.36) 0%,
    rgba(180,155,255,0.14) 40%,
    rgba(139,92,246,0.10) 68%,
    rgba(255,255,255,0.24) 100%
  );
  background-size: 300% 300%;
  border: 1px solid rgba(255,255,255,0.55);
  backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  box-shadow:
    0 2px 12px rgba(139,92,246,0.10),
    inset 0 1.5px 0 rgba(255,255,255,0.82),
    inset 0 -1px 0 rgba(100,80,200,0.08),
    inset 1px 0 0 rgba(255,255,255,0.32),
    inset -1px 0 0 rgba(255,255,255,0.32);
  animation: water-flow 4s ease-in-out infinite;
  transition: left .3s cubic-bezier(0.34,1.2,0.64,1), width .28s cubic-bezier(0.34,1.15,0.64,1), opacity .2s ease;
}
.nav-pill::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(125deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.0) 52%);
  animation: glass-shine 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes water-flow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes glass-shine {
  0%, 100% { opacity: 1; transform: translateX(0); }
  50% { opacity: 0.35; transform: translateX(10px); }
}
.nav-cta { display: flex; gap: 10px; align-items: center; }
.btn-nav-signin { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: rgba(139,92,246,0.07); color: var(--ink); border: 1px solid rgba(139,92,246,0.22); backdrop-filter: blur(10px) saturate(150%); -webkit-backdrop-filter: blur(10px) saturate(150%); box-shadow: 0 1px 2px rgba(139,92,246,0.06), inset 0 1px 0 rgba(255,255,255,0.7); transition: background .2s, transform .18s, box-shadow .2s; white-space: nowrap; }
.btn-nav-signin:hover { background: rgba(139,92,246,0.13); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.7); }
.btn-nav-signup { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: linear-gradient(160deg, rgba(147,105,255,0.92), rgba(107,75,255,0.88)); color: #fff; border: 1px solid rgba(255,255,255,0.22); backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%); box-shadow: 0 2px 10px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.28); transition: transform .18s, box-shadow .2s; white-space: nowrap; }
.btn-nav-signup:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(107,75,255,0.38), inset 0 1px 0 rgba(255,255,255,0.28); }
.btn-nav-contact { font-size: 14px; font-weight: 500; color: var(--ink-dim); text-decoration: none; padding: 10px 20px; border-radius: 8px; background: none; border: none; box-shadow: none; transition: color .2s, transform .18s; white-space: nowrap; }
.btn-nav-contact:hover { color: var(--purple); background: rgba(139,92,246,0.07); transform: translateY(-1px); }
.phone-icon { display: inline-flex; align-items: center; margin-right: 5px; transform-origin: 50% 55%; }
.btn-nav-contact:hover .phone-icon { animation: phone-ring 0.52s ease-in-out; }
@keyframes phone-ring {
  0%,100% { transform: rotate(0); }
  12%     { transform: rotate(-22deg); }
  28%     { transform: rotate(18deg); }
  44%     { transform: rotate(-12deg); }
  60%     { transform: rotate(8deg); }
  76%     { transform: rotate(-4deg); }
  90%     { transform: rotate(2deg); }
}
/* ── Buttons ─────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 999px; font-family: var(--font-body); font-size: 15px; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: transform .15s, box-shadow .15s, background .15s, color .15s; white-space: nowrap; }
.btn-primary { background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 55%, var(--blue) 100%); color: #fff; box-shadow: 0 8px 24px rgba(139,92,246,0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(139,92,246,0.4); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn-ghost:hover { background: var(--ink); color: #fff; }
.btn-lg { padding: 16px 32px; font-size: 16px; }

/* ── Hero ────────────────────────────────────────────── */
.hero {
  padding: 80px 0 100px;
  position: relative; overflow: hidden;
  background: var(--bg);
}
.hero-bg-orb-1 {
  position: absolute; width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, var(--pink-soft) 0%, transparent 65%);
  top: -200px; right: -180px; pointer-events: none;
}
.hero-bg-orb-2 {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, var(--blue-soft) 0%, transparent 65%);
  bottom: -200px; left: -160px; pointer-events: none;
}
.hero-bg-orb-3 {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, var(--purple-soft) 0%, transparent 65%);
  top: 40%; left: 38%; pointer-events: none;
}
.hero-inner {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: 1fr 1.5fr; gap: 96px; align-items: center;
}
.hero-coming-badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 16px; border-radius: 999px; margin-bottom: 28px;
  background: var(--ink); color: #fff;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em;
}
.hero-coming-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--pink);
  animation: blink 1.8s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
@keyframes fly-in-left  { from { opacity:0; transform:translateX(-56px); } to { opacity:1; transform:translateX(0); } }
@keyframes fly-in-right { from { opacity:0; transform:translateX( 56px); } to { opacity:1; transform:translateX(0); } }
@keyframes imac-rise    { from { opacity:0; transform:translateY(32px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }

.hero h1 {
  font-family: var(--font-display); font-weight: 600;
  font-size: clamp(46px, 5.8vw, 84px);
  line-height: 0.95; letter-spacing: -0.04em;
  margin-bottom: 28px;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.hero-sub { font-size: 18px; color: var(--ink-dim); line-height: 1.6; max-width: 480px; margin-bottom: 36px; }

.hero-notify-form {
  display: flex; gap: 0; max-width: 440px;
  background: #fff; border-radius: 999px;
  border: 1.5px solid var(--line);
  padding: 5px;
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.hero-notify-form input {
  flex: 1; border: none; background: none; outline: none;
  padding: 11px 18px; font: inherit; font-size: 14px; color: var(--ink); min-width: 0;
}
.hero-notify-form input::placeholder { color: var(--ink-soft); }
.hero-notify-msg { margin-top: 14px; font-size: 13px; min-height: 18px; color: var(--ink-soft); }
.hero-notify-msg.success { color: var(--purple); font-weight: 500; }
.hero-notify-msg.error { color: var(--pink); }

.hero-trust { display: flex; gap: 24px; align-items: center; margin-top: 28px; flex-wrap: wrap; }
.hero-trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
.hero-trust-dot { width: 6px; height: 6px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--pink)); }

/* ── Device Mockup Scene ────────────────────────────── */
.hero-visual { position: relative; margin-left: auto; }
.device-scene {
  position: relative;
  width: 100%;
  overflow: visible;
}

/* iMac — normal flow, defines scene height */
.imac-group {
  width: 100%;
  position: relative; z-index: 1;
  animation: imac-rise 1s cubic-bezier(.65,0,.35,1) 0.1s both;
}
.imac-monitor {
  width: 100%;
  background: #f0f0f2;
  border-radius: 14px;
  padding: 8px 8px 44px;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.09), 0 30px 80px rgba(0,0,0,0.2), 0 10px 24px rgba(0,0,0,0.1);
}
.imac-screen { border-radius: 7px; overflow: hidden; background: #000; }
.mac-window  { border-radius: 0; overflow: hidden; }
.mac-titlebar {
  background: #2C2C2E; padding: 0 16px; height: 36px;
  display: flex; align-items: center; position: relative; user-select: none;
}
.mac-lights { display: flex; align-items: center; gap: 7px; }
.mac-btn { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.mac-btn-red    { background: #FF5F57; }
.mac-btn-yellow { background: #FEBC2E; }
.mac-btn-green  { background: #28C840; }
.mac-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.6); white-space: nowrap; pointer-events: none;
}
.mac-carousel { position: relative; overflow: hidden; aspect-ratio: 16/9; }
.mac-carousel-track { position: absolute; inset: 0; display: flex; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
.mac-carousel-slide { min-width: 100%; flex-shrink: 0; position: relative; }
.mac-carousel-slide img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; object-fit: cover; }
.mac-carousel-dots {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 7px; z-index: 2;
}
.mac-carousel-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.4); cursor: pointer;
  transition: background .2s, transform .2s; border: none; padding: 0;
}
.mac-carousel-dot.active { background: #fff; transform: scale(1.4); }
.imac-neck {
  width: 8%; height: 50px;
  background: linear-gradient(to bottom, #dcdcde, #b8b8bc);
  clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
  margin-top: -1px;
}
.imac-base {
  width: 38%; height: 11px;
  background: linear-gradient(to bottom, #d4d4d6, #aeaeb2);
  border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* iPad — bottom-left, shifted outside iMac edge */
.ipad-group {
  position: absolute; bottom: 0; left: -9%;
  width: 34%; z-index: 2;
  animation: fly-in-left 1s cubic-bezier(.65,0,.35,1) 0.35s both;
}
.ipad-pencil {
  position: absolute;
  width: 82%;
  top: -7%;
  left: 9%;
  filter: drop-shadow(0 5px 12px rgba(0,0,0,0.32));
  animation: pencil-settle 1s cubic-bezier(.65,0,.35,1) 0.65s both;
  z-index: 4;
  cursor: default;
  transition: transform .5s cubic-bezier(.34,1.15,.64,1), filter .4s ease;
}
.ipad-pencil:hover {
  transform: translateY(-6px);
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.36));
}
@keyframes pencil-settle {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ipad-frame {
  background: #1c1c1e; border-radius: 12px; padding: 7px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
}
.ipad-screen { position: relative; background: #000; border-radius: 6px; overflow: hidden; aspect-ratio: 4/3; }

/* iPhone — bottom-right, shifted outside iMac edge */
.iphone-group {
  position: absolute; bottom: 0; right: -7%;
  width: 16%; z-index: 3;
  animation: fly-in-right 1s cubic-bezier(.65,0,.35,1) 0.55s both;
}
.iphone-frame {
  background: #1c1c1e; border-radius: 18px; padding: 11px 6px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
  position: relative;
}

.iphone-screen { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 9/19.5; }

/* Shared carousel for iPad + iPhone */
.device-carousel { position: absolute; inset: 0; overflow: hidden; }
.device-carousel-track { position: absolute; inset: 0; display: flex; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
.device-carousel-slide { min-width: 100%; flex-shrink: 0; position: relative; }
.device-carousel-slide img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; object-fit: cover; }

/* ── Stats strip ─────────────────────────────────────── */
.strip {
  padding: 52px 0;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%);
  color: #fff;
}
.strip-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.strip-item { border-left: 1px solid rgba(255,255,255,0.22); padding-left: 28px; }
.strip-item:first-child { border-left: none; padding-left: 0; }
.strip-num { font-family: var(--font-display); font-size: 52px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; margin-bottom: 6px; }
.strip-label { font-size: 13px; color: rgba(255,255,255,0.78); text-transform: uppercase; letter-spacing: .08em; }

/* ── Section base ────────────────────────────────────── */
.section { padding: var(--section-pad) 0; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 18px; }
.section-eyebrow::before { content: ''; display: inline-block; width: 18px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }
.section h2 { font-family: var(--font-display); font-size: clamp(32px, 4vw, 56px); font-weight: 600; letter-spacing: -0.035em; line-height: 1; margin-bottom: 16px; }
.section h2 em { font-style: normal; background: linear-gradient(120deg, var(--pink), var(--purple), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.section-sub { font-size: 17px; color: var(--ink-dim); line-height: 1.6; max-width: 560px; margin-bottom: 56px; }

/* ── Test breakdown ──────────────────────────────────── */
.breakdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@keyframes bd-wiggle {
  0%   { transform: translateY(-7px) rotate(0deg); }
  18%  { transform: translateY(-8px) rotate(-0.7deg); }
  38%  { transform: translateY(-6px) rotate(0.5deg); }
  58%  { transform: translateY(-8px) rotate(-0.3deg); }
  78%  { transform: translateY(-7px) rotate(0.15deg); }
  100% { transform: translateY(-7px) rotate(0deg); }
}
.breakdown-card {
  border-radius: var(--radius-xl); padding: 40px 36px 36px;
  display: flex; flex-direction: column; gap: 0;
  position: relative; overflow: hidden;
  background: var(--ink);
  transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
}
.breakdown-card:hover {
  animation: bd-wiggle 1.2s cubic-bezier(.4,0,.2,1) forwards;
  box-shadow: 0 24px 72px rgba(0,0,0,0.26);
}

/* Radial orb glow per card */
.breakdown-card::after {
  content: ''; position: absolute; border-radius: 50%; pointer-events: none;
  width: 320px; height: 320px; top: -100px; right: -70px;
  opacity: 0.18; filter: blur(72px); transition: opacity .5s;
}
.breakdown-card:hover::after { opacity: 0.32; }
.bd-1::after { background: var(--pink); }
.bd-2::after { background: var(--purple); }
.bd-3::after { background: var(--blue); }

/* Glass shine sweep: BL → TR — wide, slow, elegant */
.breakdown-card::before {
  content: ''; position: absolute; pointer-events: none; z-index: 1;
  /* oversized so the beam is wide and bleeds off all edges */
  inset: -60% -40%;
  background: linear-gradient(
    112deg,
    transparent 28%,
    rgba(255,255,255,0.04) 40%,
    rgba(255,255,255,0.11) 50%,
    rgba(255,255,255,0.04) 60%,
    transparent 72%
  );
  transform: translateX(-110%) translateY(55%) rotate(0deg);
  transition: transform 0s;
}
.breakdown-card:hover::before {
  transform: translateX(110%) translateY(-55%) rotate(0deg);
  transition: transform 1.1s cubic-bezier(.25,.46,.45,.94);
}

.breakdown-icon {
  width: 48px; height: 48px; border-radius: 13px;
  display: grid; place-items: center; color: #fff;
  position: relative; z-index: 2; margin-bottom: 28px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.bd-1 .breakdown-icon { background: linear-gradient(135deg, var(--pink), #C45FCF); }
.bd-2 .breakdown-icon { background: linear-gradient(135deg, var(--purple), var(--blue)); }
.bd-3 .breakdown-icon { background: linear-gradient(135deg, var(--blue), #4DA8FF); }

.breakdown-count {
  font-family: var(--font-display); font-size: 72px; font-weight: 600;
  letter-spacing: -0.05em; line-height: 0.9;
  position: relative; z-index: 2; margin-bottom: 12px;
}
.bd-1 .breakdown-count { color: var(--pink); }
.bd-2 .breakdown-count { color: var(--purple); }
.bd-3 .breakdown-count { color: #7FBFFF; }

.breakdown-title {
  font-family: var(--font-display); font-size: 20px; font-weight: 600;
  letter-spacing: -0.02em; line-height: 1.2;
  color: #fff; position: relative; z-index: 2; margin-bottom: 12px;
}
.breakdown-desc {
  font-size: 14px; color: rgba(255,255,255,0.50); line-height: 1.65;
  position: relative; z-index: 2; margin-bottom: 24px; flex: 1;
}


.breakdown-pills { display: flex; flex-wrap: wrap; gap: 6px; position: relative; z-index: 2; }
.breakdown-pill {
  font-family: var(--font-mono); font-size: 10px; padding: 4px 10px;
  border-radius: 999px; border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.05);
  transition: background .2s, color .2s, border-color .2s;
}
.breakdown-card:hover .breakdown-pill { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }

/* ── Features bento ──────────────────────────────────── */
.features-bento { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
.feat {
  border-radius: 26px; padding: 32px;
  display: flex; flex-direction: column; gap: 16px;
  position: relative; overflow: hidden;
  transition: transform .38s cubic-bezier(.34,1.15,.64,1), box-shadow .32s ease;
  cursor: default;
}
.feat-dark { grid-column: span 7; background: linear-gradient(150deg, #14102B 0%, #1c1255 55%, #0f1a3d 100%); border: 1.5px solid rgba(139,92,246,0.24); }
.feat-dark:hover { transform: translateY(-6px); box-shadow: 0 24px 64px rgba(139,92,246,0.28), 0 0 0 1px rgba(139,92,246,0.3); }
.feat-dark .feat-title { color: #fff; }
.feat-dark .feat-desc { color: rgba(255,255,255,0.46); }
.feat-b { grid-column: span 5; background: #fff; border: 1.5px solid var(--line); }
.feat-b:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(107,75,255,0.1); }
.feat-c { grid-column: span 4; background: linear-gradient(145deg, #fff 0%, var(--blue-soft) 100%); border: 1.5px solid var(--line); }
.feat-c:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(77,139,255,0.1); }
.feat-dark-blue { grid-column: span 5; background: linear-gradient(150deg, #0a1628 0%, #0d1f4d 60%, #080e24 100%); border: 1.5px solid rgba(77,139,255,0.22); }
.feat-dark-blue:hover { transform: translateY(-6px); box-shadow: 0 24px 64px rgba(77,139,255,0.22), 0 0 0 1px rgba(77,139,255,0.24); }
.feat-dark-blue .feat-title { color: #fff; }
.feat-dark-blue .feat-desc { color: rgba(255,255,255,0.45); }
.feat-e { grid-column: span 3; background: linear-gradient(145deg, #fff 0%, var(--pink-soft) 100%); border: 1.5px solid var(--line); }
.feat-e:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(255,127,183,0.12); }
.feat-f { grid-column: span 12; background: linear-gradient(120deg, var(--purple-soft) 0%, var(--pink-soft) 100%); border: 1.5px solid rgba(139,92,246,0.18); flex-direction: row; align-items: center; gap: 40px; padding: 28px 40px; }
.feat-f:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(107,75,255,0.14); }
.feat-icon { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; color: #fff; flex-shrink: 0; }
.feat-dark .feat-icon, .feat-dark-blue .feat-icon { background: rgba(255,255,255,0.1) !important; }
.feat-title { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; color: var(--ink); }
.feat-desc { font-size: 13.5px; color: var(--ink-dim); line-height: 1.6; }
.feat-spacer { flex: 1; min-height: 6px; }
.feat-chip { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 6px 13px; font-size: 11.5px; font-weight: 500; align-self: flex-start; }
.feat-dark .feat-chip, .feat-dark-blue .feat-chip { background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.13); color: rgba(255,255,255,0.68); }
.feat-b .feat-chip, .feat-c .feat-chip, .feat-e .feat-chip { background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.18); color: var(--purple); }
/* Analytics bars */
.feat-bars { display: flex; align-items: flex-end; gap: 6px; height: 58px; margin: 2px 0; }
.feat-bar { flex: 1; border-radius: 5px 5px 0 0; transform-origin: bottom; }
.feat-bar-lo { background: rgba(139,92,246,0.28); }
.feat-bar-md { background: rgba(139,92,246,0.52); }
.feat-bar-hi { background: var(--purple); }
.feat-bar-top { background: linear-gradient(to top, var(--purple), var(--lilac)); }
@keyframes bar-spring {
  0%   { transform: scaleY(0.55); filter: brightness(0.7); }
  55%  { transform: scaleY(1.1);  filter: brightness(1.5); }
  75%  { transform: scaleY(0.96); filter: brightness(1.35); }
  100% { transform: scaleY(1);    filter: brightness(1.35); }
}
.feat-dark:hover .feat-bar { animation: bar-spring .52s cubic-bezier(.34,1.2,.64,1) both; }
.feat-dark:hover .feat-bar:nth-child(1) { animation-delay:   0ms; }
.feat-dark:hover .feat-bar:nth-child(2) { animation-delay:  45ms; }
.feat-dark:hover .feat-bar:nth-child(3) { animation-delay:  90ms; }
.feat-dark:hover .feat-bar:nth-child(4) { animation-delay:  60ms; }
.feat-dark:hover .feat-bar:nth-child(5) { animation-delay:  15ms; }
.feat-dark:hover .feat-bar:nth-child(6) { animation-delay: 105ms; }
.feat-dark:hover .feat-bar:nth-child(7) { animation-delay:  55ms; }
.feat-dark:hover .feat-bar:nth-child(8) { animation-delay:  30ms; }
.feat-analytics-stats { display: flex; gap: 24px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 14px; }
.feat-stat { display: flex; flex-direction: column; gap: 2px; }
@keyframes stat-pop { 0%{transform:scale(1)} 45%{transform:scale(1.1)} 100%{transform:scale(1)} }
.feat-dark:hover .feat-stat-num { animation: stat-pop .38s cubic-bezier(.34,1.3,.64,1) both; }
.feat-dark:hover .feat-stat:nth-child(1) .feat-stat-num { animation-delay:  80ms; }
.feat-dark:hover .feat-stat:nth-child(2) .feat-stat-num { animation-delay: 160ms; }
.feat-dark:hover .feat-stat:nth-child(3) .feat-stat-num { animation-delay: 240ms; }
.feat-stat-num { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; background: linear-gradient(120deg, var(--lilac), #fff); -webkit-background-clip: text; background-clip: text; color: transparent; }
.feat-stat-lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,0.32); }
/* Question palette */
.feat-palette { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin: 4px 0; }
.feat-palette-q { aspect-ratio: 1; border-radius: 7px; font-family: var(--font-mono); font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: transform .18s cubic-bezier(.34,1.4,.64,1), box-shadow .18s ease; user-select: none; }
.feat-palette-q.pq-clickable { cursor: pointer; }
.feat-palette-q.pq-clickable:hover { transform: scale(1.18); box-shadow: 0 3px 10px rgba(139,92,246,0.35); }
.feat-palette-q.pq-clickable:active { transform: scale(0.88); transition-duration: .08s; }
.pq-done { background: var(--purple); color: #fff; }
.pq-curr { background: var(--pink); color: #fff; box-shadow: 0 0 0 2px rgba(255,127,183,0.5); }
.pq-mark { background: linear-gradient(135deg,var(--purple),var(--pink)); color: #fff; }
.pq-skip { background: var(--purple-soft); color: var(--purple); }
.pq-none { background: var(--line); color: var(--ink-soft); }
.feat-palette-hint { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-soft); letter-spacing: .04em; }
.feat-palette-legend { display: flex; gap: 10px; font-size: 9.5px; color: var(--ink-soft); flex-wrap: wrap; }
.feat-palette-legend span { display: flex; align-items: center; gap: 3px; }
.feat-legend-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
/* Time bars — animate fill on card hover */
.feat-time-rows { display: flex; flex-direction: column; gap: 9px; margin: 4px 0; }
.feat-time-row { display: flex; align-items: center; gap: 10px; }
.feat-time-label { width: 36px; color: var(--ink-dim); font-family: var(--font-mono); font-size: 10px; flex-shrink: 0; }
.feat-time-bar-track { flex: 1; height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; }
.feat-time-bar-fill { height: 100%; border-radius: 999px; width: 0; transition: width .65s cubic-bezier(.34,1.1,.64,1); }
.feat-c:hover .feat-time-bar-fill { width: var(--w); }
.feat-c:hover .feat-time-row:nth-child(2) .feat-time-bar-fill { transition-delay:  80ms; }
.feat-c:hover .feat-time-row:nth-child(3) .feat-time-bar-fill { transition-delay: 160ms; }
.feat-c:hover .feat-time-row:nth-child(4) .feat-time-bar-fill { transition-delay: 240ms; }
.feat-time-val { font-size: 10.5px; color: var(--ink-soft); width: 34px; text-align: right; flex-shrink: 0; }
/* Video UI */
.feat-video-row { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.11); border-radius: 14px; padding: 11px 14px; cursor: default; transition: background .22s ease, border-color .22s ease; }
.feat-video-row:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.2); }
.feat-video-play { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg,#FF416C,var(--purple)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(255,65,108,0.45); transition: transform .22s ease, box-shadow .22s ease; }
.feat-video-row:hover .feat-video-play { transform: scale(1.12); box-shadow: 0 6px 22px rgba(255,65,108,0.65); }
.feat-video-right { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 0; }
.feat-video-name { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feat-video-track { height: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
.feat-video-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--purple), #FF416C); transition: width .06s linear; }
.feat-video-sub { font-size: 11px; color: rgba(255,255,255,0.35); }
/* Live badge */
.feat-live { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,65,108,0.1); border: 1px solid rgba(255,65,108,0.24); border-radius: 999px; padding: 5px 12px; font-size: 11px; color: #FF416C; font-weight: 600; align-self: flex-start; }
.feat-live-dot { width: 7px; height: 7px; border-radius: 50%; background: #FF416C; animation: live-blink 1.6s ease-in-out infinite; }
@keyframes live-blink { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(1.7);} }
/* Rank */
.feat-rank-num { font-family: var(--font-display); font-size: clamp(44px,4.5vw,64px); font-weight: 600; letter-spacing: -0.05em; line-height: 1; background: linear-gradient(120deg,var(--pink),var(--purple),var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; flex-shrink: 0; width: clamp(130px,13vw,175px); text-align: center; font-variant-numeric: tabular-nums; transition: transform .3s cubic-bezier(.34,1.2,.64,1); }
.feat-f:hover .feat-rank-num { transform: scale(1.06); }
.feat-rank-label { font-size: 10px; color: var(--ink-soft); font-family: var(--font-mono); letter-spacing: .06em; text-transform: uppercase; }
.feat-rank-divider { width: 1px; align-self: stretch; background: rgba(139,92,246,0.2); flex-shrink: 0; }
.feat-rank-right { display: flex; flex-direction: column; gap: 8px; }

/* ── Discussions section ─────────────────────────────── */
.disc-section { background: linear-gradient(160deg, #0e0b24 0%, #14102b 55%, #0a1020 100%); position: relative; overflow: hidden; }
.disc-section::before {
  content: ''; position: absolute; pointer-events: none;
  width: 700px; height: 500px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(139,92,246,0.18) 0%, transparent 68%);
  top: -180px; left: -120px;
}
.disc-section::after {
  content: ''; position: absolute; pointer-events: none;
  width: 500px; height: 400px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,65,108,0.12) 0%, transparent 68%);
  bottom: -120px; right: -60px;
}
.disc-section .section-eyebrow { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.06); }
.disc-section h2 { color: #fff; }
.disc-section .section-sub { color: rgba(255,255,255,0.48); }
.disc-grid { display: grid; grid-template-columns: 7fr 5fr; gap: 20px; align-items: start; position: relative; z-index: 1; }
.disc-card {
  display: flex; flex-direction: column; text-decoration: none;
  border-radius: var(--radius-xl); overflow: hidden;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  transition: transform .32s cubic-bezier(.34,1.15,.64,1), box-shadow .28s ease, border-color .25s ease;
}
.disc-card:hover { transform: translateY(-7px); box-shadow: 0 24px 64px rgba(139,92,246,0.22); border-color: rgba(139,92,246,0.4); }
.disc-thumb-wrap { position: relative; overflow: hidden; flex-shrink: 0; }
.disc-thumb { width: 100%; aspect-ratio: 16/9; display: block; object-fit: cover; }
.disc-play-btn {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.48); opacity: 0; transition: opacity .22s ease; pointer-events: none;
}
.disc-card:hover .disc-play-btn { opacity: 1; }
.disc-play-circle {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.95);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  transform: scale(0.85); transition: transform .22s cubic-bezier(.34,1.3,.64,1);
}
.disc-card:hover .disc-play-circle { transform: scale(1); }
.disc-meta { padding: 18px 22px 20px; display: flex; align-items: center; gap: 14px; border-top: 1px solid rgba(255,255,255,0.07); }
.disc-meta-left { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.disc-live-tag { display: inline-flex; align-items: center; gap: 5px; background: rgba(255,65,108,0.12); border: 1px solid rgba(255,65,108,0.22); border-radius: 999px; padding: 3px 9px; font-size: 10px; color: #FF416C; font-weight: 600; align-self: flex-start; }
.disc-live-dot { width: 6px; height: 6px; border-radius: 50%; background: #FF416C; animation: live-blink 1.6s ease-in-out infinite; }
.disc-ep { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
.disc-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.78); line-height: 1.4; }
.disc-arrow { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); flex-shrink: 0; transition: background .2s ease, border-color .2s ease, color .2s ease, transform .22s ease; }
.disc-card:hover .disc-arrow { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: rgba(255,255,255,0.85); transform: translate(2px,-2px); }

/* ── Mentor section ──────────────────────────────────── */
.mentor-card {
  display: grid; grid-template-columns: 5fr 7fr; gap: 0; align-items: stretch;
  background: linear-gradient(150deg, #14102B 0%, #1c1255 55%, #0f1a3d 100%);
  border-radius: var(--radius-xl); border: 1.5px solid rgba(139,92,246,0.24);
  overflow: hidden;
}
.quality-left {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 36px; gap: 20px; text-align: center; position: relative; overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.07);
}
.quality-left::before, .quality-left::after {
  content: ''; position: absolute; border-radius: 50%; pointer-events: none;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.quality-left::before { width: 320px; height: 320px; border: 1px solid rgba(139,92,246,0.1); }
.quality-left::after  { width: 200px; height: 200px; border: 1px solid rgba(139,92,246,0.14); }
.quality-icon-circle {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  display: grid; place-items: center; color: #fff;
  box-shadow: 0 12px 40px rgba(139,92,246,0.45); position: relative; z-index: 1;
  transition: background .38s ease, box-shadow .38s ease, transform .32s cubic-bezier(.34,1.2,.64,1);
}
.quality-headline { transition: opacity .22s ease; }
.quality-headline {
  font-family: var(--font-display); font-size: clamp(18px,1.8vw,23px); font-weight: 600;
  letter-spacing: -0.025em; line-height: 1.3; color: #fff; position: relative; z-index: 1;
}
.quality-headline em { background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; font-style: normal; }
.quality-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(139,92,246,0.14); border: 1px solid rgba(139,92,246,0.28);
  border-radius: 999px; padding: 5px 13px;
  font-size: 11px; color: var(--lilac); font-weight: 600; font-family: var(--font-mono);
  position: relative; z-index: 1;
}
.mentor-right { padding: 48px 52px; display: flex; flex-direction: column; justify-content: center; gap: 28px; }
.mentor-quote {
  font-family: var(--font-display); font-size: clamp(20px,2.2vw,28px); font-weight: 600;
  letter-spacing: -0.025em; line-height: 1.3; color: #fff;
}
.mentor-quote em { background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; font-style: normal; }
.mentor-commits { display: flex; flex-direction: column; gap: 9px; }
.mentor-commit {
  display: flex; align-items: center; gap: 15px;
  padding: 14px 18px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  border-left: 3px solid transparent;
  background: rgba(255,255,255,0.04);
  transition: background .22s ease, border-color .22s ease, transform .25s cubic-bezier(.34,1.15,.64,1), opacity .22s ease;
  cursor: default;
}
.mentor-commit.commit-active { background: rgba(139,92,246,0.13); transform: translateX(6px); }
.mentor-commit.commit-inactive { opacity: 0.45; }
.mentor-commit-icon { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; color: #fff; flex-shrink: 0; }
.mentor-commit-text { flex: 1; min-width: 0; }
.mentor-commit-label { font-size: 13.5px; font-weight: 600; color: rgba(255,255,255,0.82); }
.mentor-commit-sub { font-size: 11.5px; color: rgba(255,255,255,0.36); margin-top: 2px; }
.mentor-commit-num { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.04em; color: var(--lilac); flex-shrink: 0; }

/* ── Pricing ─────────────────────────────────────────── */
.pricing-card {
  background: var(--ink); color: #fff;
  border-radius: var(--radius-xl); padding: 64px;
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
}
.pricing-card::before, .pricing-card::after {
  content: ''; position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.04); pointer-events: none;
}
.pricing-card::before { width: 400px; height: 400px; top: -160px; right: -80px; }
.pricing-card::after  { width: 320px; height: 320px; bottom: -140px; left: -60px; }
.pricing-left { position: relative; z-index: 1; }
.pricing-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 600; margin-bottom: 20px; letter-spacing: .04em; }
.pricing-title { font-family: var(--font-display); font-size: 36px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 14px; }
.pricing-subtitle { font-size: 15px; opacity: 0.7; line-height: 1.6; margin-bottom: 28px; max-width: 400px; }
.pricing-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
.pricing-amount { font-family: var(--font-display); font-size: 64px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; }
.pricing-validity { font-size: 13px; opacity: 0.6; }
.pricing-right { position: relative; z-index: 1; }
.pricing-includes { display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px; }
.pricing-include-item { display: flex; align-items: center; gap: 12px; font-size: 14px; opacity: 0.9; }
.pricing-check {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  display: grid; place-items: center;
}
.pricing-notify-form {
  display: flex; gap: 0; background: rgba(255,255,255,0.12);
  border-radius: 999px; padding: 5px;
  border: 1px solid rgba(255,255,255,0.2);
}
.pricing-notify-form input {
  flex: 1; border: none; background: none; outline: none;
  padding: 11px 18px; font: inherit; font-size: 14px; color: #fff; min-width: 0;
}
.pricing-notify-form input::placeholder { color: rgba(255,255,255,0.4); }
.pricing-notify-form .btn-white {
  background: #fff; color: var(--ink); border-radius: 999px;
  padding: 11px 22px; font-size: 14px; font-weight: 600;
  border: none; cursor: pointer; white-space: nowrap;
  transition: transform .15s;
}
.pricing-notify-form .btn-white:hover { transform: scale(1.03); }
.pricing-msg { margin-top: 12px; font-size: 13px; opacity: 0.7; min-height: 18px; }
.pricing-msg.success { opacity: 1; color: #86EFAC; }

/* ── FAQ ─────────────────────────────────────────────── */
.faq-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 64px; }
.faq-list { display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: #fff; border-radius: var(--radius-md);
  border: 1px solid var(--line); border-left: 3px solid transparent;
  overflow: hidden;
  transition: border-color .26s ease, border-left-color .34s cubic-bezier(.34,1.1,.64,1), box-shadow .26s ease;
}
.faq-item.open { border-color: rgba(139,92,246,0.25); border-left-color: var(--purple); box-shadow: 0 6px 28px rgba(139,92,246,0.1); }
.faq-q { width: 100%; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; background: none; border: none; font: inherit; cursor: pointer; text-align: left; font-size: 15px; font-weight: 500; color: inherit; gap: 12px; transition: color .18s ease; }
.faq-q:hover { color: var(--purple); }
.faq-icon { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; display: grid; place-items: center; flex-shrink: 0; transition: transform .44s cubic-bezier(.34,1.6,.64,1); }
.faq-item.open .faq-icon { transform: rotate(45deg); }
.faq-a { height: 0; overflow: hidden; transition: height .38s cubic-bezier(.34,1.05,.64,1); }
.faq-a-inner { padding: 0 24px 20px; font-size: 14px; color: var(--ink-dim); line-height: 1.65; opacity: 0; transform: translateY(-6px); transition: opacity .28s ease .06s, transform .34s cubic-bezier(.34,1.1,.64,1) .03s; }
.faq-item.open .faq-a-inner { opacity: 1; transform: translateY(0); }

/* ── Footer ──────────────────────────────────────────── */
.footer { padding: 40px 0; border-top: 1px solid var(--line); }
.footer-inner { display: flex; flex-direction: row; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-socials { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.footer-socials a { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; background: var(--bg-soft); color: var(--ink-dim); border: 1px solid var(--line); text-decoration: none; transition: background .28s cubic-bezier(.4,0,.2,1), color .28s, transform .28s cubic-bezier(.34,1.15,.64,1), border-color .28s; }
.footer-socials a:hover { background: var(--purple); color: #fff; border-color: var(--purple); transform: translateY(-3px); }
.footer-socials a svg { display: block; width: 22px; height: 22px; }
.footer-copy { font-size: 12px; color: var(--ink-soft); letter-spacing: .02em; }
.footer-email { font-size: 12px; color: var(--ink-dim); text-decoration: none; letter-spacing: .02em; transition: color .2s; }
.footer-email:hover { color: var(--purple); }

/* ── Scroll fade ─────────────────────────────────────── */
.fade-in { opacity: 0; transform: translateY(20px); transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1); }
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 1024px) {
  .hero-inner { grid-template-columns: 1fr; gap: 40px; }
  .ipad-group, .iphone-group { display: none; }
  .breakdown-grid { grid-template-columns: 1fr 1fr; }
  .features-bento { grid-template-columns: 1fr 1fr; }
  .feat-dark,.feat-b,.feat-c,.feat-dark-blue,.feat-e { grid-column: span 1; }
  .feat-f { grid-column: span 2; flex-direction: column; gap: 16px; padding: 28px; }
  .feat-rank-divider { display: none; }
  .mentor-card { grid-template-columns: 1fr; gap: 40px; padding: 40px; }
  .faq-layout { grid-template-columns: 1fr; gap: 32px; }
}
@media (max-width: 768px) {
  :root { --section-pad: 60px; }
  .nav-links { display: none; }
  .btn-nav-contact { display: none; }
  .hero-inner { gap: 40px; }
  .breakdown-grid { grid-template-columns: 1fr; }
  .strip-grid { grid-template-columns: repeat(2,1fr); gap: 28px 16px; }
  .strip-item { border-left: none; padding-left: 0; }
  .features-bento { grid-template-columns: 1fr; }
  .feat-dark,.feat-b,.feat-c,.feat-dark-blue,.feat-e,.feat-f { grid-column: span 1; }
  .feat-f { flex-direction: column; gap: 14px; padding: 28px; }
  .mentor-card { padding: 32px 24px; }
}

/* ── Device pop label ────────────────────────────────── */
.imac-pop-label {
  position: absolute;
  top: 28%; left: 50%;
  opacity: 0; z-index: 10; pointer-events: none;
  text-align: center;
  font-family: 'Geist', var(--font-body);
  font-size: clamp(28px, 4.4vw, 58px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.05;
  background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 52%, var(--blue) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
  transform: translateX(-50%) translateY(-22px) scale(0.88);
  filter: blur(10px);
  /* exit transition — drifts up and dissolves */
  transition: transform 0.42s cubic-bezier(.4,0,.2,1), opacity 0.3s ease, filter 0.36s ease;
}
.imac-pop-label em {
  display: block;
  font-family: 'Geist', var(--font-body);
  font-style: normal;
  font-weight: 700;
  letter-spacing: -0.04em;
}

/* bodies — transition shared */
.imac-body {
  width: 100%; display: flex; flex-direction: column; align-items: center;
  transform-origin: center 60%;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1), opacity 0.44s ease, filter 0.44s ease;
}
.ipad-body {
  position: relative; width: 100%;
  transition: transform 0.52s cubic-bezier(.4,0,.2,1), opacity 0.44s ease, filter 0.44s ease;
}
.iphone-body {
  width: 100%;
  transition: transform 0.52s cubic-bezier(.4,0,.2,1), opacity 0.44s ease, filter 0.44s ease;
}

/* scene hover — all three shrink, label appears */
.scene-hover .imac-body  { transform: scale(0.82) translateY(20px); opacity: 0.22; filter: blur(6px); }
.scene-hover .ipad-body  { transform: scale(0.76) translateY(14px); opacity: 0.18; filter: blur(5px); }
.scene-hover .iphone-body{ transform: scale(0.76) translateY(12px); opacity: 0.18; filter: blur(5px); }
.scene-hover .imac-pop-label {
  transform: translateX(-50%) translateY(-6px) scale(1);
  opacity: 1;
  filter: blur(0px)
    drop-shadow(0 2px 4px rgba(20,16,43,0.22))
    drop-shadow(0 6px 20px rgba(139,92,246,0.38))
    drop-shadow(0 16px 48px rgba(255,127,183,0.28));
  /* entry transition — springs in from below */
  transition: transform 0.62s cubic-bezier(.34,1.18,.64,1), opacity 0.44s ease, filter 0.52s ease;
}

/* YouTube link wiggle */
@keyframes yt-wiggle {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-1.5deg); }
  45%  { transform: rotate(1deg); }
  68%  { transform: rotate(-0.5deg); }
  85%  { transform: rotate(0.2deg); }
  100% { transform: rotate(0deg); }
}
a[href*="youtube"]:hover svg, a[href*="youtu.be"]:hover svg {
  animation: yt-wiggle 0.6s cubic-bezier(.4,0,.2,1);
}

const NAV_LINKS = [
  { label: 'Courses',      href: 'courses.html'                    },

function Nav() {
  const linksRef = React.useRef(null);
  const [pill, setPill] = React.useState({ left: 0, width: 0, visible: false });
  const resetTimer = React.useRef(null);

  const moveTo = React.useCallback((el) => {
    if (resetTimer.current) { clearTimeout(resetTimer.current); resetTimer.current = null; }
    if (!el) return;
    setPill({ left: el.offsetLeft - 10, width: el.offsetWidth + 20, visible: true });
  }, []);

  const reset = React.useCallback(() => {
    resetTimer.current = setTimeout(() => {
      const active = linksRef.current && linksRef.current.querySelector('a.active');
      if (active) moveTo(active); else setPill(p => ({ ...p, visible: false }));
    }, 60);
  }, [moveTo]);

  React.useEffect(() => { reset(); }, [reset]);

  return (
    <nav className="nav">
      <div className="nav-inner" onMouseLeave={reset}>
        <a href="index.html" className="nav-logo">
          <TAAILogo />
        </a>
        <div className="nav-links" ref={linksRef}>
          <div className="nav-pill" style={{ left: pill.left, width: pill.width, opacity: pill.visible ? 1 : 0 }} />
          {NAV_LINKS.map((l) => (
            <a key={l.href} href={l.href} className={l.active ? 'active' : ''}
               onMouseEnter={(e) => moveTo(e.currentTarget)}>{l.label}</a>
          ))}
        </div>
        <div className="nav-cta">
          <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signin" className="btn-nav-signin">Sign In</a>

function NotifyForm({ dark }) {
  const [email, setEmail] = React.useState('');
  const [msg, setMsg]   = React.useState({ type:'', text:'' });
  const submit = e => {
    e.preventDefault();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
      setMsg({ type:'error', text:"Enter a valid email address." }); return;
    }
    setMsg({ type:'success', text:`You're on the list — we'll notify you at ${email}.` });
    setEmail('');
  };
  if (dark) return (
    <>
      <form className="pricing-notify-form" onSubmit={submit} noValidate>
        <input type="email" placeholder="you@college.edu" value={email} onChange={e => setEmail(e.target.value)} />
        <button type="submit" className="btn-white">Notify me</button>
      </form>
      <div className={`pricing-msg ${msg.type}`}>{msg.text}</div>
    </>
  );
  return (
    <>
      <form className="hero-notify-form" onSubmit={submit} noValidate>
        <input type="email" placeholder="you@college.edu" value={email} onChange={e => setEmail(e.target.value)} />
        <button type="submit" className="btn btn-primary" style={{ padding:'10px 20px', fontSize:14 }}>
          Notify me <Icon.ArrowRight s={14} />
        </button>
      </form>

// ── Animated counter ─────────────────────────────────────────────
function AnimatedNum({ to, suffix = '', duration = 1400 }) {
  const [val, setVal] = React.useState(0);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let started = false;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting && !started) {
          started = true;
          const start = performance.now();
          const tick = now => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setVal(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.3 });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  return <span ref={ref} style={{ fontVariantNumeric: 'tabular-nums' }}>{val}{suffix}</span>;
}

  const [rankNum, setRankNum] = React.useState(847);
  const rankRaf = React.useRef(null);
  const [vidPct, setVidPct] = React.useState(0);
  const vidTimer = React.useRef(null);

  const toggleQ = (i) => {
    if (i === 9) return;
    setQs(prev => {
      const next = [...prev];
      const CYCLE = ['none','done','mark','skip'];
      const cur = next[i] === 'curr' ? 'done' : next[i];
      next[i] = CYCLE[(CYCLE.indexOf(cur) + 1) % CYCLE.length];
      return next;
    });
  };

  React.useEffect(() => {
    if (rankRaf.current) cancelAnimationFrame(rankRaf.current);
    if (!rankHov) { setRankNum(847); return; }
    const START = 3200, END = 847, DURATION = 1400;
    const t0 = performance.now();
    const step = (now) => {
      const p = Math.min((now - t0) / DURATION, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setRankNum(Math.round(START + (END - START) * eased));
      if (p < 1) rankRaf.current = requestAnimationFrame(step);
    };
    rankRaf.current = requestAnimationFrame(step);
    return () => { if (rankRaf.current) cancelAnimationFrame(rankRaf.current); };
  }, [rankHov]);

  const startVid = () => {
    if (vidTimer.current) clearInterval(vidTimer.current);
    let p = 0;
    setVidPct(0);
    vidTimer.current = setInterval(() => {
      p = Math.min(100, p + 1.2);
      setVidPct(p);
      if (p >= 100) clearInterval(vidTimer.current);
    }, 60);

  };

function App() {
  React.useEffect(() => {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-in').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <Strip />
      <Breakdown />
      <Features />
      <Discussions />
      <Quality />
      <FAQ />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
