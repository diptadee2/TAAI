<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAI · Contact Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFFFFF;
  --bg-soft: #FBF9FF;
  --ink: #14102B;
  --ink-dim: #4A4270;
  --ink-soft: #857CAE;
  --line: #ECE6F8;
  --card: #FFFFFF;

  --pink: #FF7FB7;
  --pink-soft: #FFD6E8;
  --purple: #8B5CF6;
  --purple-soft: #E6DCFF;
  --blue: #4D8BFF;
  --blue-soft: #D6E4FF;
  --lilac: #C4B0FF;

  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 36px;

  --shadow-sm: 0 1px 0 rgba(20,16,43,0.04), 0 2px 6px rgba(20,16,43,0.04);
  --shadow-md: 0 2px 0 rgba(20,16,43,0.03), 0 12px 32px rgba(107,75,255,0.08);
  --shadow-lg: 0 24px 60px rgba(107,75,255,0.16);

  --font-display: 'Fraunces', ui-serif, serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;

  --gutter: 32px;
  --section-pad: 96px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 max(var(--gutter), 24px); }

/* Nav */
.nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.50); backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); overflow: visible; }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 86px; padding: 0 32px 0 20px; overflow: visible; }
.nav-logo { display: flex; align-items: center; text-decoration: none; transition: transform .22s ease-out, opacity .22s ease; }
.nav-logo svg, .nav-logo img { height: 38px; width: auto; }
.nav-logo:hover { transform: translateY(-2px); opacity: 0.82; }
.nav-logo:active { transform: translateY(1px); opacity: 1; transition-duration: .08s; }
.nav-links { display: flex; gap: 36px; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; position: relative; }
.nav-links a { color: var(--ink-dim); text-decoration: none; transition: color .2s; position: relative; z-index: 1; cursor: pointer; }
.nav-links a::after { content: ''; position: absolute; inset: -14px -10px; z-index: 0; }
.nav-links a:hover, .nav-links a.active { color: var(--purple); }
.nav-pill {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 34px; border-radius: 10px; pointer-events: none; z-index: 0; overflow: hidden;
  background: linear-gradient(150deg, rgba(255,255,255,0.36) 0%, rgba(180,155,255,0.14) 40%, rgba(139,92,246,0.10) 68%, rgba(255,255,255,0.24) 100%);
  background-size: 300% 300%;
  border: 1px solid rgba(255,255,255,0.55);
  backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  box-shadow: 0 2px 12px rgba(139,92,246,0.10), inset 0 1.5px 0 rgba(255,255,255,0.82), inset 0 -1px 0 rgba(100,80,200,0.08), inset 1px 0 0 rgba(255,255,255,0.32), inset -1px 0 0 rgba(255,255,255,0.32);
  animation: water-flow 4s ease-in-out infinite;
  transition: left .3s cubic-bezier(0.34,1.2,0.64,1), width .28s cubic-bezier(0.34,1.15,0.64,1), opacity .2s ease;
}
.nav-pill::before { content: ''; position: absolute; inset: 0; border-radius: inherit; background: linear-gradient(125deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.0) 52%); animation: glass-shine 5s ease-in-out infinite; pointer-events: none; }
@keyframes water-flow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
@keyframes glass-shine { 0%,100% { opacity: 1; transform: translateX(0); } 50% { opacity: 0.35; transform: translateX(10px); } }
.nav-cta { display: flex; gap: 10px; align-items: center; }
.btn-nav-signin { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: rgba(139,92,246,0.07); color: var(--ink); border: 1px solid rgba(139,92,246,0.22); backdrop-filter: blur(10px) saturate(150%); -webkit-backdrop-filter: blur(10px) saturate(150%); box-shadow: 0 1px 2px rgba(139,92,246,0.06), inset 0 1px 0 rgba(255,255,255,0.7); transition: background .2s, transform .18s, box-shadow .2s; white-space: nowrap; }
.btn-nav-signin:hover { background: rgba(139,92,246,0.13); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.7); }
.btn-nav-signup { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: linear-gradient(160deg, rgba(147,105,255,0.92), rgba(107,75,255,0.88)); color: #fff; border: 1px solid rgba(255,255,255,0.22); backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%); box-shadow: 0 2px 10px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.28); transition: transform .18s, box-shadow .2s; white-space: nowrap; }
.btn-nav-signup:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(107,75,255,0.38), inset 0 1px 0 rgba(255,255,255,0.28); }
.btn-nav-contact { font-size: 14px; font-weight: 500; color: var(--purple); text-decoration: none; padding: 10px 20px; border-radius: 8px; background: none; border: none; box-shadow: none; transition: color .2s, transform .18s; white-space: nowrap; }
.btn-nav-contact:hover { background: rgba(139,92,246,0.07); transform: translateY(-1px); }
.phone-icon { display: inline-flex; align-items: center; margin-right: 5px; transform-origin: 50% 55%; }
.btn-nav-contact:hover .phone-icon { animation: phone-ring 0.52s ease-in-out; }
@keyframes phone-ring {
  0%,100% { transform: rotate(0); } 12% { transform: rotate(-22deg); } 28% { transform: rotate(18deg); }
  44% { transform: rotate(-12deg); } 60% { transform: rotate(8deg); } 76% { transform: rotate(-4deg); } 90% { transform: rotate(2deg); }
}
/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 999px; font-family: var(--font-body); font-size: 15px; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease, background .15s, color .15s; white-space: nowrap; }
.btn-primary { background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 55%, var(--blue) 100%); color: #fff; box-shadow: 0 8px 24px rgba(139,92,246,0.25); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(139,92,246,0.35); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
.btn-ghost:hover { border-color: var(--purple); color: var(--purple); }
.btn-lg { padding: 16px 32px; font-size: 16px; }

/* Section */
.section { padding: var(--section-pad) 0; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 16px; }
.section-eyebrow::before { content: ''; display: inline-block; width: 20px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }

/* Fade-in */
.fade-in { opacity: 0; transform: translateY(20px); transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1); }
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ── Page hero ───────────────────────────────────────── */
.contact-hero {
  padding: 80px 0 72px;
  position: relative; overflow: hidden;
  background: linear-gradient(165deg, #fff 0%, var(--bg-soft) 100%);
}
.contact-hero::before {
  content: ''; position: absolute; top: -140px; right: -100px;
  width: 560px; height: 560px; border-radius: 50%;
  background: radial-gradient(circle, var(--pink-soft) 0%, transparent 68%);
  pointer-events: none;
}
.contact-hero::after {
  content: ''; position: absolute; bottom: -100px; left: -80px;
  width: 480px; height: 480px; border-radius: 50%;
  background: radial-gradient(circle, var(--blue-soft) 0%, transparent 68%);
  pointer-events: none;
}
.contact-hero-inner { position: relative; z-index: 1; }
.contact-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--purple); margin-bottom: 20px; }
.contact-eyebrow::before { content: ''; display: inline-block; width: 20px; height: 2px; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 2px; }
.contact-hero h1 { font-family: var(--font-display); font-weight: 600; font-size: clamp(44px, 6vw, 80px); line-height: 0.96; letter-spacing: -0.04em; margin-bottom: 22px; }
.contact-hero h1 em { font-style: normal; background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
.contact-hero-sub { font-size: 19px; color: var(--ink-dim); max-width: 520px; line-height: 1.55; margin-bottom: 48px; }

/* ── Channel cards ───────────────────────────────────── */
.channel-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
.channel-card {
  border-radius: var(--radius-xl); padding: 36px 28px;
  background: var(--ink); position: relative; overflow: hidden;
  display: flex; flex-direction: column; gap: 0;
  text-decoration: none; color: inherit;
  transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
}
.channel-card:hover { transform: translateY(-6px); box-shadow: 0 20px 56px rgba(0,0,0,0.20); }

/* Orb per card */
.channel-card::after { content: ''; position: absolute; border-radius: 50%; pointer-events: none; width: 260px; height: 260px; top: -80px; right: -60px; opacity: 0.20; filter: blur(60px); transition: opacity .5s; }
.channel-card:hover::after { opacity: 0.34; }
.ch-email::after  { background: var(--pink); }
.ch-whatsapp::after { background: #25D366; }
.ch-discord::after  { background: var(--purple); }
.ch-telegram::after { background: var(--blue); }
.ch-linkedin::after { background: #0A66C2; }

/* Glass shine */
.channel-card::before {
  content: ''; position: absolute; inset: -60% -40%; pointer-events: none; z-index: 1;
  background: linear-gradient(112deg, transparent 28%, rgba(255,255,255,0.04) 40%, rgba(255,255,255,0.10) 50%, rgba(255,255,255,0.04) 60%, transparent 72%);
  transform: translateX(-110%) translateY(55%);
  transition: transform 0s;
}
.channel-card:hover::before { transform: translateX(110%) translateY(-55%); transition: transform 1s cubic-bezier(.25,.46,.45,.94); }

.channel-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: grid; place-items: center; color: #fff;
  position: relative; z-index: 2; margin-bottom: 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.ch-email   .channel-icon { background: linear-gradient(135deg, var(--pink), var(--purple)); }
.ch-whatsapp .channel-icon { background: linear-gradient(135deg, #25D366, #128C7E); }
.ch-discord  .channel-icon { background: linear-gradient(135deg, var(--purple), var(--blue)); }
.ch-telegram .channel-icon { background: linear-gradient(135deg, var(--blue), #32A8E0); }
.ch-linkedin .channel-icon { background: linear-gradient(135deg, #0A66C2, #0D87E9); }

.channel-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; position: relative; z-index: 2; }
.channel-name { font-family: var(--font-display); font-size: clamp(15px, 1.4vw, 20px); font-weight: 600; letter-spacing: -0.02em; color: #fff; margin-bottom: 10px; position: relative; z-index: 2; }
.channel-detail { font-size: 13px; color: rgba(255,255,255,0.48); line-height: 1.5; position: relative; z-index: 2; flex: 1; margin-bottom: 28px; }
.channel-cta { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); position: relative; z-index: 2; transition: color .2s, gap .2s; }
.channel-card:hover .channel-cta { color: #fff; gap: 10px; }

/* ── Contact form + info layout ──────────────────────── */
.contact-layout { max-width: none; }
.contact-main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 48px; align-items: start; }
.channels-sidebar { display: flex; flex-direction: column; gap: 10px; }
.channels-sidebar .channel-card {
  padding: 16px 18px; flex-direction: column; gap: 0;
  transition: transform .35s cubic-bezier(.4,0,.2,1), box-shadow .35s ease, padding-bottom .4s cubic-bezier(.16,1,.3,1);
}
.channels-sidebar .channel-card:hover { padding-bottom: 20px; }
.channels-sidebar .channel-card-row { display: flex; align-items: center; gap: 14px; }
.channels-sidebar .channel-icon { width: 40px; height: 40px; margin-bottom: 0; flex-shrink: 0; border-radius: 12px; transition: transform .38s cubic-bezier(.34,1.3,.64,1); }
.channels-sidebar .channel-card:hover .channel-icon { transform: scale(1.1); }
.channels-sidebar .channel-label { display: none; }
.channels-sidebar .channel-name { margin-bottom: 0; flex: 1; font-size: 15px; }
.channels-sidebar .channel-cta { margin-left: auto; white-space: nowrap; }
.channel-detail-clip {
  display: grid; grid-template-rows: 0fr;
  transition: grid-template-rows .45s cubic-bezier(.16,1,.3,1);
}
.channels-sidebar .channel-card:hover .channel-detail-clip { grid-template-rows: 1fr; }
.channels-sidebar .channel-detail {
  overflow: hidden; display: block;
  font-size: 12px; color: rgba(255,255,255,0.52); line-height: 1.55;
  padding-top: 0; padding-left: 54px; margin-bottom: 0;
  opacity: 0; transform: translateY(6px);
  transition: opacity .32s ease .1s, transform .42s cubic-bezier(.16,1,.3,1) .06s;
}
.channels-sidebar .channel-card:hover .channel-detail { opacity: 1; transform: translateY(0); }
@media (max-width: 900px) { .contact-main-grid { grid-template-columns: 1fr; } }

/* Embedded form wrapper */
/* Embedded form */
.form-embed-wrap {
  border-radius: var(--radius-xl); overflow: hidden;
  border: 1px solid var(--line); background: var(--bg-soft);
  min-height: 400px;
}
.form-embed-wrap lyst-mkt-form { display: block; width: 100%; }

/* ── Offer cards ─────────────────────────────────────── */
.offer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.offer-card {
  border-radius: var(--radius-xl); padding: 38px 32px 32px;
  border: 1.5px solid var(--line); background: #fff;
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
  transition: transform .42s cubic-bezier(.16,1,.3,1), box-shadow .42s ease, border-color .42s;
}
.offer-card:hover { transform: translateY(-9px); border-color: transparent; }
.oc-1:hover { box-shadow: 0 24px 64px rgba(255,127,183,0.22), 0 4px 16px rgba(255,127,183,0.1); }
.oc-2:hover { box-shadow: 0 24px 64px rgba(139,92,246,0.22), 0 4px 16px rgba(139,92,246,0.1); }
.oc-3:hover { box-shadow: 0 24px 64px rgba(77,139,255,0.22), 0 4px 16px rgba(77,139,255,0.1); }

/* Top gradient strip */
.offer-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.oc-1::before { background: linear-gradient(90deg, var(--pink), var(--purple)); }
.oc-2::before { background: linear-gradient(90deg, var(--purple), var(--blue)); }
.oc-3::before { background: linear-gradient(90deg, var(--blue), var(--pink)); }

/* Background radial glow sweeps in on hover */
.offer-card::after {
  content: ''; position: absolute; border-radius: 50%;
  width: 340px; height: 340px; bottom: -140px; right: -90px;
  opacity: 0; pointer-events: none;
  transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1);
}
.oc-1::after { background: radial-gradient(circle, rgba(255,127,183,0.18) 0%, transparent 68%); }
.oc-2::after { background: radial-gradient(circle, rgba(139,92,246,0.18) 0%, transparent 68%); }
.oc-3::after { background: radial-gradient(circle, rgba(77,139,255,0.18) 0%, transparent 68%); }
.offer-card:hover::after { opacity: 1; transform: translate(-24px, -24px) scale(1.15); }

/* Ghost number decoration */
.offer-num {
  position: absolute; top: 10px; right: 20px;
  font-family: var(--font-display); font-size: 80px; font-weight: 700; line-height: 1;
  color: var(--ink); opacity: 0.035; pointer-events: none; user-select: none;
  transition: opacity .35s ease, transform .42s cubic-bezier(.16,1,.3,1);
}
.offer-card:hover .offer-num { opacity: 0.07; transform: translateY(-6px) scale(1.05); }

/* Icon */
.offer-icon {
  width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center;
  color: #fff; margin-bottom: 28px;
  transition: transform .38s cubic-bezier(.34,1.4,.64,1), box-shadow .38s ease;
}
.oc-1 .offer-icon { background: linear-gradient(135deg, var(--pink), var(--purple)); box-shadow: 0 4px 16px rgba(255,127,183,0.32); }
.oc-2 .offer-icon { background: linear-gradient(135deg, var(--purple), var(--blue)); box-shadow: 0 4px 16px rgba(139,92,246,0.32); }
.oc-3 .offer-icon { background: linear-gradient(135deg, var(--blue), var(--pink)); box-shadow: 0 4px 16px rgba(77,139,255,0.32); }
.offer-card:hover .offer-icon { transform: scale(1.12) rotate(-5deg); }
.oc-1:hover .offer-icon { box-shadow: 0 8px 28px rgba(255,127,183,0.5); }
.oc-2:hover .offer-icon { box-shadow: 0 8px 28px rgba(139,92,246,0.5); }
.oc-3:hover .offer-icon { box-shadow: 0 8px 28px rgba(77,139,255,0.5); }

.offer-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 10px; position: relative; }
.offer-desc { font-size: 14px; color: var(--ink-dim); line-height: 1.65; margin-bottom: 28px; flex: 1; position: relative; }

/* Ghost button → filled on hover */
.offer-link {
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
  font-size: 13px; font-weight: 600; text-decoration: none;
  padding: 10px 18px; border-radius: 999px;
  border: 1.5px solid var(--line); color: var(--ink-dim); background: transparent;
  transition: all .32s cubic-bezier(.16,1,.3,1); position: relative;
}
.oc-1 .offer-link:hover { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; border-color: transparent; gap: 12px; box-shadow: 0 4px 18px rgba(255,127,183,0.4); }
.oc-2 .offer-link:hover { background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border-color: transparent; gap: 12px; box-shadow: 0 4px 18px rgba(139,92,246,0.4); }
.oc-3 .offer-link:hover { background: linear-gradient(135deg, var(--blue), var(--pink)); color: #fff; border-color: transparent; gap: 12px; box-shadow: 0 4px 18px rgba(77,139,255,0.4); }

/* ── CTA banner ──────────────────────────────────────── */
.cta-banner {
  border-radius: var(--radius-xl); padding: 72px 64px;
  background: var(--ink); position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: space-between; gap: 40px; flex-wrap: wrap;
}
.cta-orb1 { position: absolute; width: 400px; height: 400px; top: -150px; right: -80px; border-radius: 50%; background: var(--purple); opacity: 0.18; filter: blur(80px); pointer-events: none; }
.cta-orb2 { position: absolute; width: 280px; height: 280px; bottom: -100px; left: -60px; border-radius: 50%; background: var(--pink); opacity: 0.14; filter: blur(64px); pointer-events: none; }
.cta-text { position: relative; z-index: 1; }
.cta-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 14px; }
.cta-title { font-family: var(--font-display); font-size: clamp(28px, 3.5vw, 44px); font-weight: 600; letter-spacing: -0.035em; color: #fff; line-height: 1.06; margin-bottom: 14px; }
.cta-title em { font-style: normal; background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.cta-sub { font-size: 16px; color: rgba(255,255,255,0.50); max-width: 480px; line-height: 1.6; }
.cta-actions { display: flex; gap: 12px; flex-wrap: wrap; position: relative; z-index: 1; flex-shrink: 0; }
.btn-cta-primary { display: inline-flex; align-items: center; gap: 8px; padding: 15px 28px; border-radius: 999px; font-size: 15px; font-weight: 600; text-decoration: none; background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; box-shadow: 0 8px 28px rgba(139,92,246,0.3); transition: transform .15s, box-shadow .15s; white-space: nowrap; }
.btn-cta-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(139,92,246,0.4); }
.btn-cta-ghost { display: inline-flex; align-items: center; gap: 8px; padding: 15px 28px; border-radius: 999px; font-size: 15px; font-weight: 500; text-decoration: none; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.16); transition: background .2s, color .2s; white-space: nowrap; }
.btn-cta-ghost:hover { background: rgba(255,255,255,0.14); color: #fff; }

/* ── Footer ──────────────────────────────────────────── */
.footer { padding: 40px 0; border-top: 1px solid var(--line); }
.footer-inner { display: flex; flex-direction: row; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-socials { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.footer-socials a { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; background: var(--bg-soft); color: var(--ink-dim); border: 1px solid var(--line); text-decoration: none; transition: background .28s cubic-bezier(.4,0,.2,1), color .28s, transform .28s cubic-bezier(.34,1.15,.64,1), border-color .28s; }
.footer-socials a:hover { background: var(--purple); color: #fff; border-color: var(--purple); transform: translateY(-3px); }
.footer-socials a svg { display: block; width: 22px; height: 22px; }
.footer-copy { font-size: 12px; color: var(--ink-soft); letter-spacing: .02em; }
.footer-email { font-size: 12px; color: var(--ink-dim); text-decoration: none; letter-spacing: .02em; transition: color .2s; }
.footer-email:hover { color: var(--purple); }

/* Responsive */
@media (max-width: 1024px) {
  .channel-grid { grid-template-columns: repeat(2, 1fr); }
.offer-grid { grid-template-columns: repeat(2, 1fr); }
  .cta-banner { padding: 48px 40px; }
}
@media (max-width: 768px) {
  :root { --section-pad: 64px; }
  .channel-grid { grid-template-columns: 1fr; }
  .offer-grid { grid-template-columns: 1fr; }
  .nav-links { display: none; }
  .cta-banner { flex-direction: column; align-items: flex-start; padding: 40px 28px; }
}

/* YouTube wiggle */
@keyframes yt-wiggle {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-1.5deg); }
  45%  { transform: rotate(1deg); }
  68%  { transform: rotate(-0.5deg); }
  85%  { transform: rotate(0.2deg); }
  100% { transform: rotate(0deg); }
}
a[href*="youtube"]:hover svg, a[href*="youtu.be"]:hover svg {
  animation: yt-wiggle 0.6s cubic-bezier(.4,0,.2,1);
}
/* ── Mobile hamburger menu ──────────────────────────── */
.nav-hamburger { display: none; flex-direction: column; gap: 5px; align-items: center; justify-content: center; width: 40px; height: 40px; border: none; background: none; cursor: pointer; border-radius: 8px; transition: background .2s; flex-shrink: 0; padding: 0; }
.nav-hamburger:hover { background: rgba(139,92,246,0.08); }
.nav-hamburger span { display: block; width: 22px; height: 2px; border-radius: 2px; background: var(--ink); transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .2s; }
.nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu { position: fixed; top: 86px; left: 0; right: 0; z-index: 49; background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--line); padding: 12px 16px 24px; display: flex; flex-direction: column; gap: 2px; transform: translateY(-10px); opacity: 0; pointer-events: none; transition: transform .28s cubic-bezier(.4,0,.2,1), opacity .22s ease; box-shadow: 0 8px 32px rgba(20,16,43,0.08); }
.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
.mobile-menu-link { display: block; padding: 13px 16px; border-radius: 10px; font-size: 15px; font-weight: 600; color: var(--ink-dim); text-decoration: none; letter-spacing: .04em; text-transform: uppercase; transition: background .18s, color .18s; }
.mobile-menu-link:hover, .mobile-menu-link.active { background: rgba(139,92,246,0.08); color: var(--purple); }
.mobile-menu-divider { height: 1px; background: var(--line); margin: 10px 4px; }
.mobile-menu-actions { display: flex; flex-direction: column; gap: 8px; }
.mobile-menu-actions .btn-nav-signin, .mobile-menu-actions .btn-nav-signup { display: flex !important; justify-content: center; width: 100%; border-radius: 10px; padding: 13px 22px; }
.mobile-menu-contact { display: block; text-align: center; padding: 11px 16px; font-size: 13px; font-weight: 500; color: var(--ink-dim); text-decoration: none; border-radius: 10px; transition: color .18s, background .18s; }
.mobile-menu-contact:hover { color: var(--purple); background: rgba(139,92,246,0.06); }
@media (max-width: 768px) { .nav-hamburger { display: flex; } .nav-cta { display: none; } }

  return <img src="logo.png" alt="TAAI" style={{ height: 150, width: 'auto' }} />;

function Nav() {
  const linksRef = React.useRef(null);
  const [pill, setPill] = React.useState({ left: 0, width: 0, visible: false });
  const resetTimer = React.useRef(null);
  const moveTo = React.useCallback((el) => {
    if (resetTimer.current) { clearTimeout(resetTimer.current); resetTimer.current = null; }
    if (!el) return;
    setPill({ left: el.offsetLeft - 10, width: el.offsetWidth + 20, visible: true });
  }, []);
  const reset = React.useCallback(() => {
    resetTimer.current = setTimeout(() => {
      const active = linksRef.current && linksRef.current.querySelector('a.active');
      if (active) moveTo(active); else setPill(p => ({ ...p, visible: false }));
    }, 60);
  }, [moveTo]);
  React.useEffect(() => { reset(); }, [reset]);
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    if (!menuOpen) return;
    const close = e => { if (!e.target.closest('.nav') && !e.target.closest('.mobile-menu')) setMenuOpen(false); };
    document.addEventListener('pointerdown', close);
    return () => document.removeEventListener('pointerdown', close);
  }, [menuOpen]);
  return (
    <>
    <nav className="nav">
      <div className="nav-inner" onMouseLeave={reset}>
        <a href="index.html" className="nav-logo"><TAAILogo /></a>
        <div className="nav-links" ref={linksRef}>
          <div className="nav-pill" style={{ left: pill.left, width: pill.width, opacity: pill.visible ? 1 : 0 }} />
          {NAV_LINKS.map((l) => (
            <a key={l.href} href={l.href} className={l.active ? 'active' : ''}
               onMouseEnter={(e) => moveTo(e.currentTarget)}>{l.label}</a>
          ))}
        </div>
        <div className="nav-cta">
          <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signin" className="btn-nav-signin">Sign In</a>
          <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signup" className="btn-nav-signup">Sign Up</a>
          <a href="contact.html" className="btn-nav-contact">
            <span className="phone-icon"><Icon.Phone /></span>Contact Us
          </a>
        </div>
        <button className={`nav-hamburger${menuOpen ? ' open' : ''}`} onClick={() => setMenuOpen(o => !o)} aria-label="Toggle menu">
          <span /><span /><span />
        </button>
      </div>
    </nav>
    <div className={`mobile-menu${menuOpen ? ' open' : ''}`}>
      {NAV_LINKS.map(l => (
        <a key={l.href} href={l.href} className={`mobile-menu-link${l.active ? ' active' : ''}`} onClick={() => setMenuOpen(false)}>{l.label}</a>
      ))}
      <div className="mobile-menu-divider" />
      <div className="mobile-menu-actions">
        <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signin" className="btn-nav-signin">Sign In</a>
        <a target="_blank" rel="noopener noreferrer" href="https://www.taai.live/learn/account/signup" className="btn-nav-signup">Sign Up</a>
      </div>
      <a href="contact.html" className="mobile-menu-contact">Contact Us</a>
    </div>
    </>
  );
}
