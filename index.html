<!DOCTYPE html>
<html lang="en" data-hero="asym" data-density="normal" data-cards="shadowed" data-decos="on">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAAI · One-stop for all your GATE DA 2027 needs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;1,500&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* TAAI Landing Page — Pink / Purple / Blue on white */
:root {
  --bg: #FFFFFF;
  --bg-soft: #FBF9FF;
  --ink: #14102B;
  --ink-dim: #4A4270;
  --ink-soft: #857CAE;
  --line: #ECE6F8;
  --card: #FFFFFF;

  --pink: #FF7FB7;
  --pink-soft: #FFD6E8;
  --purple: #8B5CF6;
  --purple-soft: #E6DCFF;
  --blue: #4D8BFF;
  --blue-soft: #D6E4FF;
  --lilac: #C4B0FF;
  --mint: #CDEBDD;

  --primary: #6B4BFF;
  --primary-contrast: #FFFFFF;

  --radius-md: 18px;
  --radius-lg: 26px;
  --radius-xl: 36px;

  --shadow-sm: 0 1px 0 rgba(20,16,43,0.04), 0 2px 6px rgba(20,16,43,0.04);
  --shadow-md: 0 2px 0 rgba(20,16,43,0.03), 0 12px 32px rgba(107,75,255,0.08);
  --shadow-lg: 0 24px 60px rgba(107,75,255,0.16);

  --font-display: 'Fraunces', ui-serif, serif;
  --font-body: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;

  --gutter: 32px;
  --section-pad: 96px;
}

[data-density="compact"] { --gutter: 20px; --section-pad: 56px; --radius-md: 14px; --radius-lg: 20px; }
[data-density="airy"] { --gutter: 40px; --section-pad: 128px; }

[data-cards="flat"] .card { box-shadow: none; border: 1px solid var(--line); }
[data-cards="shadowed"] .card { box-shadow: var(--shadow-md); border: 1px solid transparent; }
[data-cards="bordered"] .card { box-shadow: none; border: 1.5px solid var(--ink); }
[data-cards="hard"] .card { box-shadow: 5px 5px 0 var(--ink); border: 1.5px solid var(--ink); }

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg); color: var(--ink);
  -webkit-font-smoothing: antialiased; font-size: 16px; line-height: 1.5;
}
.display { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.03em; line-height: 1; }
.mono { font-family: var(--font-mono); font-size: .78rem; letter-spacing: .02em; text-transform: uppercase; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 max(var(--gutter), 24px); }

/* Nav */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  overflow: visible;
  transition: background .25s ease, backdrop-filter .25s ease;
}
.nav.menu-open { background: rgba(248,246,255,0.72); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 86px; padding: 0 32px 0 20px; overflow: visible; }
.nav-logo {
  display: flex; align-items: center; text-decoration: none;
  transition: transform .22s ease-out, opacity .22s ease;
}
.nav-logo svg, .nav-logo img { width: 180px; height: auto; }
.nav-logo:hover { transform: translateY(-2px); opacity: 0.82; }
.nav-logo:active { transform: translateY(1px); opacity: 1; transition-duration: .08s; }
@media (hover: hover) {
  .nav-logo { position: relative; }
  .nav-logo::after { content: 'Home'; position: absolute; bottom: -34px; left: 50%; transform: translateX(-50%) translateY(8px) scale(0.88); font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--purple); background: linear-gradient(135deg, rgba(249,247,255,0.97), rgba(241,237,255,0.97)); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(139,92,246,0.22); border-radius: 20px; padding: 4px 13px; opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .24s cubic-bezier(.34,1.15,.64,1); white-space: nowrap; box-shadow: 0 4px 18px rgba(139,92,246,0.13), 0 1px 4px rgba(0,0,0,0.05); }
  .nav-logo:hover::after { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}
.nav-links { display: flex; gap: 36px; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; position: relative;}
.nav-links a { color: var(--ink-dim); text-decoration: none; transition: color .2s; position: relative; z-index: 1; cursor: pointer; }
.nav-links a::after { content: ''; position: absolute; inset: -14px -10px; z-index: 0; }
.nav-links a:hover, .nav-links a.active { color: var(--purple); }
.nav-pill {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 34px; border-radius: 10px; pointer-events: none; z-index: 0;
  overflow: hidden;
  background: linear-gradient(
    150deg,
    rgba(255,255,255,0.36) 0%,
    rgba(180,155,255,0.14) 40%,
    rgba(139,92,246,0.10) 68%,
    rgba(255,255,255,0.24) 100%
  );
  background-size: 300% 300%;
  border: 1px solid rgba(255,255,255,0.55);
  backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  -webkit-backdrop-filter: blur(14px) saturate(200%) brightness(1.05);
  box-shadow:
    0 2px 12px rgba(139,92,246,0.10),
    inset 0 1.5px 0 rgba(255,255,255,0.82),
    inset 0 -1px 0 rgba(100,80,200,0.08),
    inset 1px 0 0 rgba(255,255,255,0.32),
    inset -1px 0 0 rgba(255,255,255,0.32);
  animation: water-flow 4s ease-in-out infinite;
  transition: left .3s cubic-bezier(0.34,1.2,0.64,1), width .28s cubic-bezier(0.34,1.15,0.64,1), opacity .2s ease;
}
.nav-pill::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: linear-gradient(125deg, rgba(255,255,255,0.62) 0%, rgba(255,255,255,0.0) 52%);
  animation: glass-shine 5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes water-flow {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
@keyframes glass-shine {
  0%, 100% { opacity: 1; transform: translateX(0); }
  50% { opacity: 0.35; transform: translateX(10px); }
}
.nav-cta { display: flex; gap: 10px; align-items: center; }
.btn-nav-signin { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: rgba(139,92,246,0.07); color: var(--ink); border: 1px solid rgba(139,92,246,0.22); backdrop-filter: blur(10px) saturate(150%); -webkit-backdrop-filter: blur(10px) saturate(150%); box-shadow: 0 1px 2px rgba(139,92,246,0.06), inset 0 1px 0 rgba(255,255,255,0.7); transition: background .2s, transform .18s, box-shadow .2s; white-space: nowrap; }
.btn-nav-signin:hover { background: rgba(139,92,246,0.13); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,0.7); }
.btn-nav-signup { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; cursor: pointer; background: linear-gradient(160deg, rgba(147,105,255,0.92), rgba(107,75,255,0.88)); color: #fff; border: 1px solid rgba(255,255,255,0.22); backdrop-filter: blur(10px) saturate(140%); -webkit-backdrop-filter: blur(10px) saturate(140%); box-shadow: 0 2px 10px rgba(107,75,255,0.28), inset 0 1px 0 rgba(255,255,255,0.28); transition: transform .18s, box-shadow .2s; white-space: nowrap; }
.btn-nav-signup:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(107,75,255,0.38), inset 0 1px 0 rgba(255,255,255,0.28); }
.btn-nav-contact { font-size: 14px; font-weight: 500; color: var(--ink-dim); text-decoration: none; padding: 10px 20px; border-radius: 8px; background: none; border: none; box-shadow: none; transition: color .2s, transform .18s; white-space: nowrap; }
.btn-nav-contact:hover { color: var(--purple); background: rgba(139,92,246,0.07); transform: translateY(-1px); }
.phone-icon { display: inline-flex; align-items: center; margin-right: 5px; transform-origin: 50% 55%; }
.btn-nav-contact:hover .phone-icon { animation: phone-ring 0.52s ease-in-out; }
@keyframes phone-ring {
  0%,100% { transform: rotate(0); }
  12%     { transform: rotate(-22deg); }
  28%     { transform: rotate(18deg); }
  44%     { transform: rotate(-12deg); }
  60%     { transform: rotate(8deg); }
  76%     { transform: rotate(-4deg); }
  90%     { transform: rotate(2deg); }
}
/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 20px; border-radius: 999px;
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  text-decoration: none; border: none; cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease, background .15s, color .15s;
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 55%, var(--blue) 100%);
  color: #fff; box-shadow: 0 8px 24px rgba(139,92,246,0.25);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(139,92,246,0.35); }
.btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink); }
.btn-ghost:hover { background: var(--ink); color: #fff; }
.btn-swap { position: relative; overflow: hidden; }
.btn-swap.btn-ghost:hover { background: linear-gradient(135deg, #FF416C 0%, #FF0000 55%, #CC0022 100%); border-color: transparent; color: #fff; box-shadow: 0 8px 28px rgba(255,0,0,0.38), 0 2px 8px rgba(255,65,108,0.22); }
.btn-swap .swap-default,
.btn-swap .swap-hover {
  display: block;
  transition: transform .32s cubic-bezier(.16,1,.3,1), opacity .24s ease;
}
.btn-swap .swap-hover {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  transform: translateY(100%); opacity: 0;
}
.btn-swap:hover .swap-default { transform: translateY(-100%); opacity: 0; }
.btn-swap:hover .swap-hover   { transform: translateY(0);     opacity: 1; }
.btn-soft { background: var(--purple-soft); color: var(--ink); border: 1px solid transparent; }
.btn-soft:hover { background: var(--lilac); }
.btn-lg { padding: 15px 28px; font-size: 16px; }

/* Hero */
.hero { padding: 72px 0 var(--section-pad); position: relative; overflow: hidden; }
.hero::before {
  content: ''; position: absolute; top: -140px; right: -100px;
  width: 680px; height: 680px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,127,183,0.22) 0%, rgba(139,92,246,0.1) 45%, transparent 68%);
  pointer-events: none; z-index: 0;
  animation: hero-orb 10s ease-in-out infinite;
}
.hero::after {
  content: ''; position: absolute; bottom: -180px; left: -130px;
  width: 620px; height: 620px; border-radius: 50%;
  background: radial-gradient(circle, rgba(77,139,255,0.2) 0%, rgba(139,92,246,0.1) 45%, transparent 68%);
  pointer-events: none; z-index: 0;
  animation: hero-orb 13s ease-in-out 3s infinite reverse;
}
@keyframes hero-orb { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-18px)} }
.hero-inner { display: grid; gap: 48px; position: relative; z-index: 1; }
[data-hero="asym"] .hero-inner { grid-template-columns: 1.15fr 1fr; align-items: center; }
[data-hero="centered"] .hero-inner { grid-template-columns: 1fr; text-align: center; max-width: 920px; margin: 0 auto; }
[data-hero="centered"] .hero-visual { display: none; }
[data-hero="centered"] .hero-cta, [data-hero="centered"] .hero-meta { justify-content: center; }
[data-hero="bento"] .hero-inner { grid-template-columns: 2fr 1fr 1fr; grid-template-rows: auto auto; gap: 20px; }
[data-hero="bento"] .hero-text { grid-column: 1; grid-row: 1 / 3; }
[data-hero="bento"] .hero-visual { grid-column: 2 / 4; grid-row: 1; }
[data-hero="bento"] .hero-bento-1 { grid-column: 2; grid-row: 2; }
[data-hero="bento"] .hero-bento-2 { grid-column: 3; grid-row: 2; }

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 7px 16px; border-radius: 999px;
  background: linear-gradient(90deg, rgba(255,127,183,0.1) 0%, rgba(139,92,246,0.13) 100%);
  color: var(--ink); font-size: 13px; font-weight: 500; margin-bottom: 28px;
  border: 1px solid rgba(139,92,246,0.22);
  box-shadow: 0 2px 12px rgba(139,92,246,0.08);
}
.hero-eyebrow-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--purple); animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{transform:scale(1); opacity:1} 50%{transform:scale(1.4); opacity:.55} }

.hero h1 {
  font-family: var(--font-display); font-weight: 600;
  font-size: clamp(44px, 6.2vw, 88px);
  line-height: 0.95; letter-spacing: -0.04em; margin-bottom: 26px;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(120deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.hero h1 .underline {
  display: inline-block; position: relative; padding: 0 .06em;
}
.hero h1 .underline::after {
  content: ''; position: absolute; left: 0; right: 0; bottom: 0.06em; height: 0.18em;
  background: var(--pink-soft); z-index: -1; border-radius: 4px;
}

.hero-sub { font-size: 18px; color: var(--ink-dim); max-width: 500px; margin-bottom: 24px; line-height: 1.55; }
.hero-checks { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.hero-check { display: flex; align-items: center; gap: 11px; font-size: 14.5px; color: var(--ink); font-weight: 450; }
.hero-check-icon { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
[data-hero="centered"] .hero-sub { margin-left: auto; margin-right: auto; }
.hero-cta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 32px; }
.hero-meta { display: flex; gap: 32px; align-items: center; font-size: 14px; color: var(--ink-soft); flex-wrap: wrap; }
.hero-meta-item { display: flex; align-items: center; gap: 8px; }
.hero-avatars { display: flex; }
.hero-avatar {
  width: 34px; height: 34px; border-radius: 50%; border: 2px solid #fff;
  margin-left: -10px; display: grid; place-items: center;
  font-size: 13px; font-weight: 600; color: var(--ink);
}
.hero-avatar:first-child { margin-left: 0; }
.hero-rating { display: flex; flex-direction: column; gap: 4px; cursor: default; }
.hero-rating-top { display: flex; align-items: center; gap: 8px; }
.hero-rating-num {
  font-family: var(--font-display); font-size: 19px; font-weight: 700;
  letter-spacing: -0.03em; color: var(--ink); line-height: 1;
}
.hero-rating-stars { display: flex; gap: 2px; }
.hero-rating-star {
  color: #F59E0B; display: flex; align-items: center;
  animation: starIn .42s cubic-bezier(.34,1.3,.64,1) calc(var(--i) * 70ms + 900ms) both;
  transition: transform .18s cubic-bezier(.34,1.3,.64,1), filter .18s;
}
.hero-rating-star:hover {
  transform: scale(1.45) translateY(-2px);
  filter: drop-shadow(0 2px 6px rgba(245,158,11,0.75));
}
@keyframes starIn {
  from { opacity: 0; transform: scale(0.2) rotate(-30deg); }
  to   { opacity: 1; transform: scale(1)   rotate(0deg);   }
}
.hero-rating-label { font-size: 11.5px; color: var(--ink-soft); letter-spacing: .01em; white-space: nowrap; }

/* Hero visual card */
.hero-visual { position: relative; aspect-ratio: 4 / 5; max-width: 460px; justify-self: end; width: 100%; }
.hero-card {
  position: absolute; inset: 0; border-radius: var(--radius-xl);
  background: linear-gradient(150deg, #14102B 0%, #1e1152 55%, #170e45 100%);
  border: 1.5px solid rgba(139,92,246,0.28);
  overflow: hidden;
  box-shadow: 0 28px 72px rgba(139,92,246,0.32), 0 8px 24px rgba(0,0,0,0.18);
}
.hero-card::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,127,183,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.hero-card-inner { padding: 32px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 1; }
.hero-card-label {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(139,92,246,0.2); color: var(--lilac);
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 500; align-self: flex-start;
  border: 1px solid rgba(139,92,246,0.3);
}
.hero-card-stat {
  font-family: var(--font-display); font-size: clamp(44px, 7vw, 72px); font-weight: 600;
  letter-spacing: -0.05em; line-height: 0.9;
  background: linear-gradient(120deg, var(--pink), var(--lilac), var(--blue));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.hero-card-caption { font-size: 14px; color: rgba(255,255,255,0.48); max-width: 240px; margin-top: 6px; }
.hero-card-progress { margin-top: 22px; display: flex; flex-direction: column; gap: 12px; }
.hero-rank-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.hero-rank-row:last-child { border-bottom: none; }
.hero-rank-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
.hero-rank-label { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: .04em; }
.hero-rank-count { font-family: var(--font-display); font-size: 20px; font-weight: 600; letter-spacing: -0.02em; background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero-rank-bar-track { height: 4px; background: rgba(255,255,255,0.09); border-radius: 999px; overflow: hidden; }
.hero-rank-bar-fill {
  height: 100%; border-radius: 999px;
  width: calc(var(--pct, 0) * 100%);
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 55%, var(--blue) 100%);
  transform-origin: left; transform: scaleX(0);
  animation: bar-grow .95s cubic-bezier(.22,1,.36,1) var(--bar-delay, 0ms) both;
}
@keyframes bar-grow { to { transform: scaleX(1); } }
.hero-progress-fill {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%);
  transform-origin: left; animation: grow 1.4s cubic-bezier(.4,0,.2,1) forwards; transform: scaleX(0);
}
@keyframes grow { to { transform: scaleX(var(--scale, 0.8)); } }

/* Hero staggered entrance */
@keyframes heroIn {
  from { opacity: 0; transform: translateY(26px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1);    }
}
.hero-eyebrow { animation: heroIn .65s cubic-bezier(.34,1.12,.64,1) .08s both; }
.hero h1      { animation: heroIn .72s cubic-bezier(.34,1.12,.64,1) .20s both; }
.hero-sub     { animation: heroIn .62s cubic-bezier(.34,1.12,.64,1) .34s both; }
.hero-checks  { animation: heroIn .60s cubic-bezier(.34,1.12,.64,1) .48s both; }
.hero-cta     { animation: heroIn .60s cubic-bezier(.34,1.12,.64,1) .58s both; }
.hero-meta    { animation: heroIn .58s cubic-bezier(.34,1.12,.64,1) .66s both; }
.hero-visual  { animation: heroIn .78s cubic-bezier(.34,1.12,.64,1) .42s both; }
.hero-bento-1 { animation: heroIn .65s cubic-bezier(.34,1.12,.64,1) .54s both; }
.hero-bento-2 { animation: heroIn .65s cubic-bezier(.34,1.12,.64,1) .62s both; }

.hero-sticker {
  position: absolute; width: 120px; height: 120px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
  color: #fff;
  display: grid; place-items: center;
  font-family: var(--font-display); font-size: 14px; font-weight: 600; text-align: center;
  transform: rotate(-10deg); top: -32px; right: -28px; z-index: 2;
  line-height: 1.15; padding: 14px;
  box-shadow: 0 16px 44px rgba(139,92,246,0.48), 0 4px 12px rgba(255,127,183,0.3);
  border: 2px solid rgba(255,255,255,0.3);
  animation: wobble 6s ease-in-out infinite;
}
@keyframes wobble { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(-4deg) translateY(-5px)} }

.hero-bento-card {
  border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--line);
  display: flex; flex-direction: column; gap: 6px; min-height: 160px;
  transition: transform .28s cubic-bezier(.34,1.05,.64,1), box-shadow .28s ease;
}
.bento-icon-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }

/* ── Calendar animation ── */
.cal-day { animation: cal-day-seq 2.45s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
@keyframes cal-day-seq {
  0%, 100% { fill: rgba(255,127,183,0.18); transform: scale(1); }
  8%        { fill: rgba(255,127,183,0.95); transform: scale(1.45); filter: drop-shadow(0 0 3px rgba(255,127,183,0.8)); }
  22%       { fill: rgba(255,127,183,0.18); transform: scale(1); filter: none; }
}
.cal-ping { animation: cal-ping-out 1.8s ease-out infinite; transform-box: fill-box; transform-origin: center; }
.cal-ping-2 { animation: cal-ping-out 1.8s ease-out 0.9s infinite; transform-box: fill-box; transform-origin: center; }
@keyframes cal-ping-out { 0%{transform:scale(1);opacity:0.9} 100%{transform:scale(3.2);opacity:0} }
.cal-live { animation: cal-live-pulse 1.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
@keyframes cal-live-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.35);opacity:0.5} }

/* ── Pen/paper animation ── */
.pen-line { stroke-dasharray: 28; stroke-dashoffset: 28; animation: pen-write 3.6s ease-in-out infinite; }
.pen-line-1 { animation-delay: 0s; }
.pen-line-2 { animation-delay: 0.45s; }
.pen-line-3 { animation-delay: 0.9s; }
@keyframes pen-write {
  0%    { stroke-dashoffset: 28; }
  22%   { stroke-dashoffset: 0; }
  78%   { stroke-dashoffset: 0; }
  100%  { stroke-dashoffset: 28; }
}
.pen-body { animation: pen-move 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: bottom left; }
@keyframes pen-move { 0%,15%{transform:translate(0,0)} 22%,78%{transform:translate(6px,6px)} 93%,100%{transform:translate(0,0)} }
.hero-bento-card:hover { transform: translateY(-4px); }
.hero-bento-1 { background: linear-gradient(135deg, rgba(139,92,246,0.07) 0%, rgba(77,139,255,0.05) 100%); border-color: rgba(139,92,246,0.18); }
.hero-bento-1:hover { box-shadow: 0 12px 36px rgba(139,92,246,0.14); }
.hero-bento-2 { background: linear-gradient(135deg, rgba(255,127,183,0.08) 0%, rgba(139,92,246,0.05) 100%); border-color: rgba(255,127,183,0.2); }
.hero-bento-2:hover { box-shadow: 0 12px 36px rgba(255,127,183,0.14); }

/* Stats strip */
.stats {
  padding: 48px 0;
  background: linear-gradient(90deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%);
  color: #fff; overflow: hidden;
}
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gutter); }
.stat-item { border-left: 1px solid rgba(255,255,255,0.22); padding-left: 24px; }
.stat-item:first-child { border-left: none; padding-left: 0; }
.stat-num { font-family: var(--font-display); font-size: clamp(36px, 8vw, 56px); font-weight: 600; letter-spacing: -0.04em; line-height: 1; margin-bottom: 6px; }
.stat-label { font-size: 13px; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: .08em; }
.stat-sub { font-size: 11px; color: rgba(255,255,255,0.42); letter-spacing: .05em; margin-top: 4px; font-style: italic; }

/* Sections */
.section { padding: var(--section-pad) 0; position: relative; }
.section-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 56px; gap: 24px; flex-wrap: wrap; }
.section-head-left { max-width: 720px; }
.section-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 12px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--purple);
  margin-bottom: 16px;
}
.section-eyebrow::before {
  content: ''; display: inline-block; width: 20px; height: 2px;
  background: linear-gradient(90deg, var(--pink), var(--purple));
  border-radius: 2px;
}
.section h2 { font-family: var(--font-display); font-size: clamp(34px, 4.3vw, 60px); font-weight: 600; letter-spacing: -0.035em; line-height: 1; margin-bottom: 16px; }
.section h2 em {
  font-style: normal;
  background: linear-gradient(120deg, var(--pink), var(--purple), var(--blue));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.section-sub { font-size: 18px; color: var(--ink-dim); line-height: 1.5; max-width: 580px; }

/* Three ways — offer cards */
.offer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.offer-card {
  border-radius: var(--radius-xl); min-height: 400px;
  padding: 36px; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .32s cubic-bezier(.4,0,.2,1), box-shadow .32s ease;
  color: var(--ink); text-decoration: none;
}
.offer-card:hover { transform: translateY(-8px); box-shadow: 0 32px 72px rgba(107,75,255,0.18); }
.offer-1 { background: linear-gradient(160deg, var(--pink-soft) 0%, #fff 60%); border: 1px solid rgba(255,127,183,0.2); }
.offer-2 { background: linear-gradient(160deg, var(--purple-soft) 0%, #fff 60%); border: 1px solid rgba(139,92,246,0.18); }
.offer-3 { background: linear-gradient(160deg, var(--blue-soft) 0%, #fff 60%); border: 1px solid rgba(77,139,255,0.18); }
.offer-card::before {
  content: ''; position: absolute; inset: 0; border-radius: inherit;
  opacity: 0; transition: opacity .38s ease; z-index: 0;
}
.offer-1::before { background: linear-gradient(160deg, #FF7FB7 0%, #9333ea 100%); }
.offer-2::before { background: linear-gradient(160deg, #8B5CF6 0%, #3B82F6 100%); }
.offer-3::before { background: linear-gradient(160deg, #4D8BFF 0%, #8B5CF6 100%); }
.offer-card:hover::before { opacity: 1; }
.offer-num {
  position: absolute; bottom: -8px; right: 22px; z-index: 0;
  font-family: var(--font-display); font-size: clamp(56px, 12vw, 88px); font-weight: 700;
  letter-spacing: -0.06em; line-height: 1; pointer-events: none;
  opacity: 0.07; transition: opacity .32s ease, color .32s ease;
}
.offer-card:hover .offer-num { opacity: 0.14; color: #fff; }
.offer-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: grid; place-items: center; color: #fff;
  position: relative; z-index: 1;
  transition: transform .28s cubic-bezier(.4,0,.2,1), box-shadow .28s ease;
}
.offer-card:hover .offer-icon { transform: scale(1.12) rotate(-4deg); box-shadow: 0 8px 24px rgba(0,0,0,0.22); }
.offer-1 .offer-icon { background: linear-gradient(135deg, var(--pink), var(--purple)); }
.offer-2 .offer-icon { background: linear-gradient(135deg, var(--purple), var(--blue)); }
.offer-3 .offer-icon { background: linear-gradient(135deg, var(--blue), #7FA8FF); }
.offer-body { flex: 1; position: relative; z-index: 1; margin-top: 22px; }
.offer-tagline { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; color: var(--ink-soft); transition: color .28s ease; }
.offer-card:hover .offer-tagline { color: rgba(255,255,255,0.6); }
.offer-title { font-family: var(--font-display); font-size: clamp(22px, 5vw, 30px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 12px; transition: color .28s ease; }
.offer-card:hover .offer-title { color: #fff; }
.offer-desc { font-size: 14px; color: var(--ink-dim); line-height: 1.55; transition: color .28s ease; }
.offer-card:hover .offer-desc { color: rgba(255,255,255,0.65); }
.offer-detail { max-height: 0; overflow: hidden; opacity: 0; position: relative; z-index: 1; transition: max-height .4s cubic-bezier(.4,0,.2,1), opacity .32s ease; }
.offer-card:hover .offer-detail { max-height: 160px; opacity: 1; }
.offer-bullets { list-style: none; margin: 14px 0 0; display: flex; flex-direction: column; gap: 7px; }
.offer-bullets li { font-size: 13px; color: rgba(255,255,255,0.78); display: flex; align-items: center; gap: 9px; }
.offer-bullets li::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.55); flex-shrink: 0; }
.offer-footer { position: relative; z-index: 1; margin-top: 24px; }
.offer-link { display: inline-flex; align-items: center; gap: 7px; font-weight: 600; font-size: 14px; color: var(--purple); transition: color .28s ease, gap .2s ease; }
.offer-card:hover .offer-link { color: #fff; gap: 12px; }
.offer-top { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }
.offer-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  padding: 5px 11px; border-radius: 999px;
  transition: background .28s ease, color .28s ease, border-color .28s ease;
}
.offer-badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.offer-badge-hot { background: #FFF3D0; color: #92640A; border: 1px solid rgba(180,120,0,0.15); }
.offer-badge-hot .offer-badge-dot { background: #E8A000; }
.offer-badge-cs { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(139,92,246,0.18); }
.offer-badge-cs .offer-badge-dot { background: var(--purple); }
.offer-card:hover .offer-badge { background: rgba(255,255,255,0.16); color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.2); }
.offer-card:hover .offer-badge-dot { background: rgba(255,255,255,0.7); }

/* Why TAAI — interactive tabs */
.whyus-layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: stretch; }
.whyus-tabs { display: flex; flex-direction: column; gap: 6px; }
.whyus-tab {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 16px; border-radius: var(--radius-md);
  cursor: pointer; text-align: left; width: 100%;
  background: none; border: 1.5px solid transparent;
  border-left: 3px solid transparent;
  transition: background .2s, border-color .2s, box-shadow .2s, transform .22s cubic-bezier(.34,1.1,.64,1);
  font-family: inherit; position: relative; overflow: hidden;
  animation: tabSlideIn .38s cubic-bezier(.34,1.1,.64,1) calc(var(--i,0) * 55ms + 100ms) both;
}
@keyframes tabSlideIn { from { opacity: 0; transform: translateX(-14px); } to { opacity: 1; transform: translateX(0); } }
.whyus-tab:hover { background: #fff; border-color: var(--line); border-left-color: var(--tab-color, var(--purple)); transform: translateX(3px); }
.whyus-tab.active { background: #fff; border-color: var(--line); border-left-color: var(--tab-color, var(--purple)); box-shadow: var(--shadow-md); transform: translateX(5px); }
.whyus-tab-icon { width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0; display: grid; place-items: center; color: #fff; transition: transform .22s cubic-bezier(.34,1.2,.64,1); }
.whyus-tab.active .whyus-tab-icon { transform: scale(1.12) rotate(-4deg); }
.whyus-tab:hover:not(.active) .whyus-tab-icon { transform: scale(1.06); }
.whyus-tab-info { min-width: 0; flex: 1; }
.whyus-tab-label { font-family: var(--font-display); font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); line-height: 1.2; }
.whyus-tab-sub { font-size: 12px; color: var(--ink-soft); margin-top: 2px; transition: color .2s; }
.whyus-tab.active .whyus-tab-sub { color: var(--tab-color, var(--purple)); }
.whyus-tab-chevron { margin-left: auto; flex-shrink: 0; opacity: 0; transform: translateX(-4px); transition: opacity .2s, transform .22s cubic-bezier(.34,1.1,.64,1); color: var(--tab-color, var(--purple)); }
.whyus-tab.active .whyus-tab-chevron { opacity: 1; transform: translateX(0); }
.whyus-tab-progress {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--tab-color, var(--purple)), rgba(139,92,246,0.4));
  transform-origin: left; transform: scaleX(0);
  animation: wyProgress var(--dur, 4500ms) linear forwards;
}
@keyframes wyProgress { to { transform: scaleX(1); } }

.whyus-panel {
  border-radius: var(--radius-xl); background: var(--ink);
  padding: 48px; position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
  min-height: 440px;
}
.whyus-orb1, .whyus-orb2 { position: absolute; border-radius: 50%; pointer-events: none; transition: background .55s ease; }
.whyus-orb1 { width: 340px; height: 340px; top: -100px; right: -70px; opacity: 0.22; filter: blur(72px); }
.whyus-orb2 { width: 200px; height: 200px; bottom: -60px; left: -30px; opacity: 0.14; filter: blur(56px); }
.whyus-icon-bg { position: absolute; top: 36px; right: 36px; pointer-events: none; color: #fff; }
.whyus-icon-bg svg { width: 108px; height: 108px; opacity: 0.05; }
@keyframes wyIn { from { opacity: 0; transform: translateY(18px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.whyus-content { position: relative; z-index: 1; animation: wyIn .38s cubic-bezier(.34,1.1,.64,1) both; }
.whyus-eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,0.38); margin-bottom: 14px; }
.whyus-ptitle { font-family: var(--font-display); font-size: clamp(26px,3vw,40px); font-weight: 600; letter-spacing: -0.035em; line-height: 1.06; color: #fff; margin-bottom: 16px; }
.whyus-pdesc { font-size: 15px; color: rgba(255,255,255,0.56); line-height: 1.66; margin-bottom: 32px; max-width: 400px; }
.whyus-pstat { display: flex; align-items: baseline; gap: 10px; }
.whyus-pstat-num { font-family: var(--font-display); font-size: 52px; font-weight: 600; letter-spacing: -0.05em; line-height: 1; }
.whyus-pstat-lbl { font-size: 13px; color: rgba(255,255,255,0.42); }
/* Dot indicators */
.whyus-dots { display: flex; gap: 6px; position: absolute; bottom: 20px; right: 24px; z-index: 2; }
.whyus-dot { width: 6px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.22); transition: background .3s, width .3s cubic-bezier(.34,1.1,.64,1); cursor: pointer; }
.whyus-dot.active { width: 18px; background: #fff; }
@media (max-width: 1024px) { .whyus-layout { grid-template-columns: 1fr; } }

/* Results highlight row */
.results-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.result-card {
  border-radius: var(--radius-md); padding: 24px;
  border: 1px solid var(--line);
  background: #fff; text-align: left;
  transition: transform .2s ease;
}
.result-card:hover { transform: translateY(-3px); }
.result-card .big {
  font-family: var(--font-display); font-size: clamp(32px, 5vw, 48px); font-weight: 600;
  letter-spacing: -0.04em; line-height: 1;
  background: linear-gradient(120deg, var(--pink), var(--purple), var(--blue));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.result-card .lbl { font-size: 13px; color: var(--ink-dim); margin-top: 8px; }

/* Instructor */
.instructor-section { padding: var(--section-pad) 0; background: var(--ink); overflow: hidden; position: relative; }
.instructor-section::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(139,92,246,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.instructor-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 72px; align-items: center; position: relative; z-index: 1;
}
.instructor-photo-wrap { position: relative; border-radius: var(--radius-xl); overflow: hidden; }
.instructor-photo { width: 100%; display: block; border-radius: var(--radius-xl); }
@keyframes play-pulse-ring {
  0%   { box-shadow: 0 4px 20px rgba(255,0,0,0.42), 0 2px 8px rgba(0,0,0,0.22), 0 0 0 0px  rgba(255,65,108,0.55); }
  65%  { box-shadow: 0 4px 20px rgba(255,0,0,0.42), 0 2px 8px rgba(0,0,0,0.22), 0 0 0 14px rgba(255,65,108,0);   }
  100% { box-shadow: 0 4px 20px rgba(255,0,0,0.42), 0 2px 8px rgba(0,0,0,0.22), 0 0 0 0px  rgba(255,65,108,0);   }
}
.instructor-play-btn {
  position: absolute; bottom: 16px; right: 16px;
  height: 50px; width: 50px; border-radius: 999px;
  background: linear-gradient(135deg, #FF416C 0%, #FF0000 55%, #CC0022 100%);
  display: flex; align-items: center; justify-content: flex-end;
  overflow: hidden; text-decoration: none; color: #fff; z-index: 2; cursor: pointer;
  animation: play-pulse-ring 2.2s ease-out infinite;
  transition: width 0.46s cubic-bezier(.34,1.08,.64,1), box-shadow 0.3s ease;
}
.instructor-play-btn:hover {
  width: 252px;
  box-shadow: 0 6px 28px rgba(255,0,0,0.58), 0 2px 8px rgba(0,0,0,0.25);
  animation: none;
}
.instructor-play-label {
  font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
  padding-left: 18px;
  opacity: 0; transform: translateX(10px);
  transition: opacity 0.22s ease 0.16s, transform 0.32s cubic-bezier(.34,1.1,.64,1) 0.1s;
}
.instructor-play-btn:hover .instructor-play-label { opacity: 1; transform: translateX(0); }
.instructor-play-icon {
  width: 50px; height: 50px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.instructor-text { color: #fff; }
.instructor-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--lilac); margin-bottom: 18px; }
.instructor-name { font-family: var(--font-display); font-size: clamp(36px,4.5vw,62px); font-weight: 600; letter-spacing: -0.04em; line-height: 0.95; margin-bottom: 20px; }
.instructor-name span { background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.instructor-bio { font-size: 16px; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 32px; }
.instructor-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 36px; }
.instructor-stat { border-left: 2px solid rgba(255,255,255,0.1); padding-left: 16px; }
.instructor-stat-num { font-family: var(--font-display); font-size: 30px; font-weight: 600; letter-spacing: -0.04em; background: linear-gradient(120deg, var(--pink), var(--lilac)); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; margin-bottom: 4px; }
.instructor-stat-label { font-size: 12px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: .07em; }
.instructor-creds { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.instructor-cred-card {
  border-radius: 14px; padding: 18px 20px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
  display: flex; flex-direction: column; gap: 3px;
  cursor: default;
  transition: transform 0.32s cubic-bezier(.34,1.2,.64,1), background 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
}
.instructor-cred-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.09);
  border-color: rgba(255,255,255,0.2);
  box-shadow: 0 8px 28px rgba(0,0,0,0.25);
}
.instructor-cred-card-title {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.9); line-height: 1.3;
  transition: color 0.24s ease;
}
.instructor-cred-card:hover .instructor-cred-card-title { color: #fff; }
.instructor-cred-card-sub {
  font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: .02em;
  transition: color 0.24s ease;
}
.instructor-cred-card:hover .instructor-cred-card-sub { color: rgba(255,255,255,0.6); }
.instructor-cred-card-air {
  grid-column: span 2;
  background: linear-gradient(135deg, rgba(255,127,183,0.12), rgba(139,92,246,0.14));
  border-color: rgba(196,176,255,0.22);
  flex-direction: row; align-items: center; gap: 18px; padding: 20px 24px;
}
.instructor-cred-card-air:hover {
  background: linear-gradient(135deg, rgba(255,127,183,0.2), rgba(139,92,246,0.22));
  border-color: rgba(196,176,255,0.42);
  box-shadow: 0 10px 36px rgba(139,92,246,0.28);
}
.instructor-cred-air-num {
  font-family: var(--font-display); font-size: clamp(38px,4vw,52px); font-weight: 600;
  letter-spacing: -0.04em; line-height: 1;
  background: linear-gradient(120deg, var(--pink), var(--lilac));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  flex-shrink: 0; display: inline-block;
  transition: transform 0.36s cubic-bezier(.34,1.3,.64,1);
}
.instructor-cred-card-air:hover .instructor-cred-air-num { transform: scale(1.08); }
.instructor-cred-air-text { display: flex; flex-direction: column; gap: 2px; }
.instructor-cred-air-label { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); }
.instructor-cred-air-sub { font-size: 11px; color: rgba(255,255,255,0.38); letter-spacing: .02em; }

/* Testimonials */
.testimonials { position: relative; overflow: hidden; }
.testi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: start; }
.testi-grid .gitem { grid-column: span 2; }
.testi {
  background: #fff;
  border-radius: var(--radius-lg); padding: 30px;
  display: flex; flex-direction: column; min-height: 320px;
  border: 1px solid var(--line);
  transition: transform .45s cubic-bezier(.16,1,.3,1), box-shadow .45s ease;
}
.testi:hover { transform: translateY(-6px); box-shadow: 0 4px 12px rgba(20,16,43,0.08), 0 14px 38px rgba(255,127,183,0.28), 0 28px 68px rgba(139,92,246,0.20); }
.testi-rank {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-display); font-size: 13px; font-weight: 500;
  padding: 6px 12px; border-radius: 999px;
  background: linear-gradient(90deg, var(--pink-soft), var(--purple-soft));
  align-self: flex-start; margin-bottom: 20px;
}
.testi-quote { font-family: var(--font-display); font-size: clamp(16px, 4.5vw, 20px); font-weight: 500; letter-spacing: -0.015em; line-height: 1.3; margin-bottom: 24px; flex: 1; }
.testi-author { display: flex; align-items: center; gap: 12px; padding-top: 20px; border-top: 1px solid var(--line); }
.testi-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: grid; place-items: center; color: #fff;
  font-family: var(--font-display); font-weight: 600; font-size: 16px;
  flex-shrink: 0;
}
.testi-name { font-weight: 600; font-size: 15px; }
.testi-role { font-size: 13px; color: var(--ink-soft); }
.gitem { border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 2px 8px rgba(20,16,43,0.06), 0 8px 28px rgba(255,127,183,0.18), 0 18px 52px rgba(139,92,246,0.12); transition: transform .45s cubic-bezier(.16,1,.3,1), box-shadow .45s ease; }
.gitem:hover { transform: translateY(-6px); box-shadow: 0 4px 12px rgba(20,16,43,0.08), 0 14px 38px rgba(255,127,183,0.28), 0 28px 68px rgba(139,92,246,0.20); }
.gitem img { width: 100%; display: block; }
.gitem-badge { display: inline-flex; align-items: center; background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 4px 11px; border-radius: 999px; margin-top: 8px; }

/* Play overlay — image testimonials */
.gitem { position: relative; }
.gitem-play {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background: rgba(14,10,30,0.28);
  backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  opacity: 0; transition: opacity 0.28s ease;
  text-decoration: none; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.gitem:hover .gitem-play { opacity: 1; }
.gitem-play-icon {
  display: grid; place-items: center;
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.45));
  transform: scale(0.75); transition: transform 0.34s cubic-bezier(.34,1.35,.64,1);
}
.gitem:hover .gitem-play-icon { transform: scale(1); }

/* Watch interview — quote testimonials */
.testi { position: relative; }
.testi-watch {
  position: absolute; bottom: 26px; right: 26px;
  display: flex; align-items: center; gap: 6px;
  background: var(--purple-soft);
  border: 1.5px solid rgba(139,92,246,0.22);
  border-radius: 999px; padding: 7px 14px 7px 11px;
  font-size: 12px; font-weight: 600; color: var(--purple);
  text-decoration: none; white-space: nowrap;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.24s ease, transform 0.32s cubic-bezier(.34,1.35,.64,1), background 0.2s ease;
  box-shadow: 0 2px 10px rgba(139,92,246,0.14);
}
.testi-watch svg { flex-shrink: 0; }
.testi:hover .testi-watch { opacity: 1; transform: translateY(0); }
.testi-watch:hover { background: rgba(139,92,246,0.18); }

/* FAQ */
.faq-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 64px; }
.faq-list { display: flex; flex-direction: column; gap: 12px; }
.faq-item {
  background: #fff; border-radius: var(--radius-md);
  border: 1px solid var(--line); border-left: 3px solid transparent;
  overflow: hidden;
  transition: border-color .26s ease, border-left-color .34s cubic-bezier(.34,1.1,.64,1), box-shadow .26s ease;
}
.faq-item.open { border-color: rgba(139,92,246,0.25); border-left-color: var(--purple); box-shadow: 0 6px 28px rgba(139,92,246,0.1); }
.faq-q {
  width: 100%; padding: 20px 24px;
  display: flex; justify-content: space-between; align-items: center;
  background: none; border: none; font: inherit; cursor: pointer;
  text-align: left; font-size: 16px; font-weight: 500; color: inherit; gap: 12px;
  transition: color .18s ease;
}
.faq-q:hover { color: var(--purple); }
.faq-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff;
  display: grid; place-items: center; flex-shrink: 0;
  transition: transform .44s cubic-bezier(.34,1.6,.64,1);
}
.faq-item.open .faq-icon { transform: rotate(45deg); }
.faq-a { overflow: hidden; height: 0; will-change: height; transition: height .38s cubic-bezier(.4,0,.2,1); }
.faq-a-inner { padding: 0 24px 20px; font-size: 15px; color: var(--ink-dim); line-height: 1.55; opacity: 0; transition: opacity .24s ease .08s; }
.faq-item.open .faq-a-inner { opacity: 1; }
.faq-a-inner ul { padding-left: 18px; margin: 10px 0; }
.faq-a-inner li { margin-bottom: 6px; }

/* CTA */
.cta { padding: var(--section-pad) 0; }
.cta-card {
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 50%, var(--blue) 100%);
  color: #fff; border-radius: var(--radius-xl);
  padding: 80px 64px; position: relative; overflow: hidden; text-align: center;
}
.cta-card::before, .cta-card::after {
  content: ''; position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.12); pointer-events: none;
}
.cta-card::before { top: -80px; right: -80px; width: 280px; height: 280px; }
.cta-card::after { bottom: -100px; left: -100px; width: 320px; height: 320px; }
.cta-card h2 { font-family: var(--font-display); font-size: clamp(38px, 4.8vw, 68px); font-weight: 600; letter-spacing: -0.035em; line-height: 1; margin-bottom: 20px; position: relative; }
.cta-card h2 em { font-style: normal; color: #fff; border-bottom: 4px solid rgba(255,255,255,0.6); padding-bottom: 4px; }
.cta-card p { font-size: 18px; opacity: 0.9; max-width: 560px; margin: 0 auto 36px; position: relative; }
.cta-btn-white { background: #fff; color: var(--purple); font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.15); position: relative; }
.cta-btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.22); color: var(--purple); }

/* Footer */
.footer { padding: 40px 0; border-top: 1px solid var(--line); }
.footer-inner { display: flex; flex-direction: row; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
.footer-socials { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.footer-socials a {
  width: 54px; height: 54px; border-radius: 50%;
  display: grid; place-items: center;
  background: var(--bg-soft); color: var(--ink-dim);
  border: 1px solid var(--line); text-decoration: none;
  transition: background .28s cubic-bezier(.4,0,.2,1), color .28s cubic-bezier(.4,0,.2,1), transform .28s cubic-bezier(.34,1.15,.64,1), border-color .28s;
}
.footer-socials a:hover { background: var(--purple); color: #fff; border-color: var(--purple); transform: translateY(-3px); }
.footer-socials a svg { display: block; width: 22px; height: 22px; }
.footer-copy { font-size: 12px; color: var(--ink-soft); letter-spacing: .02em; }
.footer-email { font-size: 12px; color: var(--ink-dim); text-decoration: none; letter-spacing: .02em; transition: color .2s; }
.footer-email:hover { color: var(--purple); }

/* Scroll fade-in */
.fade-in { opacity: 0; transform: translateY(24px); transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1); }
.fade-in.visible { opacity: 1; transform: translateY(0); }
@media (max-width: 768px) {
  .fade-in { transform: translateY(36px) scale(0.96); transition: opacity .58s cubic-bezier(.34,1.1,.64,1), transform .58s cubic-bezier(.34,1.1,.64,1); }
  .fade-in.visible { transform: translateY(0) scale(1); }
}

[data-decos="off"] .hero-sticker,
[data-decos="off"] .hero::before,
[data-decos="off"] .hero::after { display: none; }

/* Responsive */
@media (max-width: 1024px) {

  .hero-inner { gap: 32px; }

}

  .section-head { margin-bottom: 36px; }
  .footer-inner { flex-direction: column; align-items: center; text-align: center; }
  .footer-socials a { width: 44px; height: 44px; }
  .footer-socials a svg { width: 18px; height: 18px; }
  .cta-card { padding: 56px 24px; }
  .results-grid { grid-template-columns: 1fr 1fr; }
  /* Swipe carousel */
  .testi-grid {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    gap: 16px;
    margin-left: -32px; margin-right: -32px;
    padding: 4px 32px 8px;
    -ms-overflow-style: none; scrollbar-width: none;
    align-items: flex-start;
  }
  .testi-grid::-webkit-scrollbar { display: none; }
  .testi-grid .gitem { display: none; }
  .testi-grid .testi {
    flex: 0 0 88%; min-width: 0; scroll-snap-align: start;
    min-height: 0; padding: 24px;
  }
  .testi-quote { flex: 0; margin-bottom: 16px; }
  .testi-watch {
    position: static; opacity: 1; transform: none;
    align-self: flex-start; margin-top: 14px;
  }

  .gitem-play-icon { transform: scale(1); }
}
@media (max-width: 480px) {
  :root { --section-pad: 40px; }
  .stats-grid { grid-template-columns: 1fr; }
  .results-grid { grid-template-columns: 1fr; }

}
/* Why TAAI mobile accordion */
.whyus-acc { display: flex; flex-direction: column; gap: 8px; }
.whyus-acc-item .whyus-tab {

}

.whyus-acc-panel {

/* Touch device offer-card overrides */
@media (hover: none) {

  .offer-card:hover { transform: none; box-shadow: var(--shadow-md); }

}

/* YouTube link wiggle */
@keyframes yt-wiggle {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(-1.5deg); }
  45%  { transform: rotate(1deg); }
  68%  { transform: rotate(-0.5deg); }
  85%  { transform: rotate(0.2deg); }
  100% { transform: rotate(0deg); }
}
a[href*="youtube"]:hover svg, a[href*="youtu.be"]:hover svg {

}
/* ── Auto-animate hover-only elements on touch devices ── */
@keyframes pill-auto-expand {
  0%   { width: 50px; }

}

}

@media (hover: none) {

  }
}
/* ── Mobile hamburger menu ──────────────────────────── */
.nav-hamburger { display: none; flex-direction: column; gap: 5px; align-items: center; justify-content: center; width: 40px; height: 40px; border: none; background: none; cursor: pointer; border-radius: 8px; transition: background .2s; flex-shrink: 0; padding: 0; }

.mobile-menu { position: fixed; top: 86px; left: 0; right: 0; z-index: 49; background: rgba(248,246,255,0.72); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border-bottom: 1px solid rgba(139,92,246,0.15); padding: 8px 12px 20px; display: flex; flex-direction: column; gap: 2px; transform: translateY(-10px); opacity: 0; pointer-events: none; transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .22s ease; box-shadow: 0 8px 40px rgba(20,16,43,0.12); overflow: hidden; }
.mobile-menu::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--purple), rgba(139,92,246,0.15)); pointer-events: none; }

.mobile-menu-link:hover .mobile-menu-link-chevron, .mobile-menu-link.active .mobile-menu-link-chevron { opacity: 0.65; transform: translateX(3px); }
.mobile-menu-divider { height: 1px; background: linear-gradient(90deg, rgba(139,92,246,0.25), rgba(139,92,246,0.06), transparent); margin: 8px 4px; }

.mobile-menu-actions .btn-nav-signin:hover { background: rgba(139,92,246,0.13); border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); transform: none; }
.mobile-menu-actions .btn-nav-signin:active { transform: scale(0.97); background: rgba(139,92,246,0.18); }
.mobile-menu-actions .btn-nav-signup { display: flex; justify-content: space-between; align-items: center; width: 100%; border-radius: 12px; padding: 14px 18px; font-size: 15px; position: relative; overflow: hidden; background: linear-gradient(135deg, #9333ea, #7c3aed, #6d28d9); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 20px rgba(109,40,217,0.38), inset 0 1px 0 rgba(255,255,255,0.18); transition: box-shadow .2s, transform .12s; }
.mobile-menu-actions .btn-nav-signup::after { content: ''; position: absolute; top: -50%; left: -75%; width: 50%; height: 200%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent); transform: skewX(-15deg); transition: left .55s ease; pointer-events: none; }
.mobile-menu-actions .btn-nav-signup:hover::after, .mobile-menu-actions .btn-nav-signup:active::after { left: 130%; }

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

// ============ ICONS ============
const Icon = {

// ============ ANIMATED NUMBER ============
function AnimatedNum({ to, suffix = '', duration = 1400 }) {
  const [val, setVal] = React.useState(0);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    let started = false;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting && !started) {
          started = true;
          const start = performance.now();
          const tick = (now) => {
            const t = Math.min(1, (now - start) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            setVal(Math.round(to * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.3 });
    io.observe(el);
    return () => io.disconnect();
  }, [to, duration]);
  return <span ref={ref} style={{ fontVariantNumeric: 'tabular-nums' }}>{val}{suffix}</span>;
}

function WhyUs() {
  const DURATION = 4500;
  const [active, setActive] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [isMobile, setIsMobile] = React.useState(window.matchMedia('(max-width: 1024px)').matches);

  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 1024px)');
    const fn = e => setIsMobile(e.matches);
    mq.addEventListener('change', fn);
    return () => mq.removeEventListener('change', fn);
  }, []);

  // Auto-advance — resets whenever active changes or paused toggles
  React.useEffect(() => {
    if (paused || isMobile) return;
    const id = setInterval(() => setActive(a => (a + 1) % WHY_FEATURES.length), DURATION);
    return () => clearInterval(id);
  }, [paused, isMobile, active]);

  // Keyboard navigation
  React.useEffect(() => {
    const onKey = e => {
      if (e.key === 'ArrowUp')   setActive(a => Math.max(0, a - 1));
      if (e.key === 'ArrowDown') setActive(a => Math.min(WHY_FEATURES.length - 1, a + 1));
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const go = i => { setActive(i); setPaused(true); setTimeout(() => setPaused(false), 8000); };
  const toggle = i => setActive(prev => prev === i ? -1 : i);
  const f = WHY_FEATURES[Math.max(0, active)];

  const PanelContent = ({ feat }) => (
    <>
      <div className="whyus-eyebrow">{feat.eyebrow}</div>
      <div className="whyus-ptitle">{feat.title}</div>
      <div className="whyus-pdesc">{feat.desc}</div>
      <div className="whyus-pstat">
        <div className="whyus-pstat-num" style={{ color: feat.color }}>{feat.stat.num}</div>
        <div className="whyus-pstat-lbl">{feat.stat.lbl}</div>
      </div>
    </>
  );

  const header = (
    <div className="section-head fade-in">
      <div className="section-head-left">
        <div className="section-eyebrow">Why TAAI</div>
        <h2>Not coaching.<br />Your <em>unfair advantage.</em></h2>
      </div>
    </div>
  );

  if (isMobile) return (
    <section className="section" id="why" style={{ background: 'var(--bg-soft)' }}>
      <div className="container">
        {header}
        <div className="whyus-acc fade-in">
          {WHY_FEATURES.map((feat, i) => (
            <div key={i} className={`whyus-acc-item${active === i ? ' open' : ''}`}>
              <button className="whyus-tab" style={{ '--tab-color': feat.color }} onClick={() => toggle(i)}>
                <div className="whyus-tab-icon" style={{ background: feat.grad }}>{feat.icon}</div>
                <div className="whyus-tab-info">
                  <div className="whyus-tab-label">{feat.label}</div>
                  <div className="whyus-tab-sub">{feat.sub}</div>
                </div>
                <svg className="whyus-acc-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
              <div className="whyus-acc-panel">
                <div className="whyus-acc-panel-inner">
                  <div className="whyus-content"><PanelContent feat={feat} /></div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );

  return (
    <section className="section" id="why" style={{ background: 'var(--bg-soft)' }}
      onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      <div className="container">
        {header}
        <div className="whyus-layout fade-in">
          <div className="whyus-tabs">
            {WHY_FEATURES.map((feat, i) => (
              <button key={i}
                className={`whyus-tab${active === i ? ' active' : ''}`}
                style={{ '--tab-color': feat.color, '--i': i }}
                onClick={() => go(i)}>
                <div className="whyus-tab-icon" style={{ background: feat.grad }}>{feat.icon}</div>
                <div className="whyus-tab-info">
                  <div className="whyus-tab-label">{feat.label}</div>
                  <div className="whyus-tab-sub">{feat.sub}</div>
                </div>
                <svg className="whyus-tab-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <path d="M6 4l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                {active === i && <div key={`p-${active}`} className="whyus-tab-progress" style={{ '--dur': `${DURATION}ms`, animationPlayState: paused ? 'paused' : 'running' }} />}
              </button>
            ))}
          </div>
          <div className="whyus-panel">
            <div className="whyus-orb1" style={{ background: f.color }} />
            <div className="whyus-orb2" style={{ background: f.color }} />
            <div className="whyus-icon-bg">{React.cloneElement(f.icon, { style: { width: 108, height: 108 } })}</div>
            <div className="whyus-content" key={active}><PanelContent feat={f} /></div>
            <div className="whyus-dots">
              {WHY_FEATURES.map((_, i) => (
                <div key={i} className={`whyus-dot${active === i ? ' active' : ''}`} onClick={() => go(i)} />
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ============ APP ============
function App() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.fade-in');
    const mobile = window.matchMedia('(max-width: 768px)').matches;
    const io = new IntersectionObserver((entries) => {
      const hit = entries.filter(e => e.isIntersecting);
      hit.sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      hit.forEach((e, i) => {
        io.unobserve(e.target);
        const delay = Math.min(i, 5) * (mobile ? 80 : 40);
        if (delay) setTimeout(() => e.target.classList.add('visible'), delay);
        else e.target.classList.add('visible');
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <Stats />
      <Offer />
      <Instructor />
      <WhyUs />
      <Testimonials />
      <FAQ />
      <CTA />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
